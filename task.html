<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ground Control | Fluid Scheduler</title>
    
    <!-- Google Fonts for High Readability -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Firebase Core SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --bg-base: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.7);
            --border-glow: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-muted: #8a8a98;
            --accent-green: #4ade80;
            --accent-orange: #fb923c;
            --accent-red: #f87171;
            --font-display: 'Cinzel', serif;
            --font-sans: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            margin-bottom: 25px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-orange);
            box-shadow: 0 0 8px var(--accent-orange);
            transition: all 0.4s ease;
        }

        .dot.connected {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .creator-card, .edit-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .edit-card {
            border-color: var(--accent-orange);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .label-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: -6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, button, textarea {
            font-family: var(--font-sans);
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: rgba(255, 255, 255, 0.20);
        }

        .row-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .button-row {
            display: flex;
            gap: 12px;
        }

        button.btn-add {
            background: var(--text-primary);
            color: var(--bg-base);
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-top: 5px;
            flex: 1;
        }

        button.btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }

        button:active {
            transform: scale(0.98);
        }

        .bucket-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin: 15px 0 5px 5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .task-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .task-name {
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .task-reminder {
            font-size: 0.85rem;
            color: var(--accent-orange);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-body {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-note {
            font-size: 0.95rem;
            color: rgba(240, 240, 245, 0.85);
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .task-img-container {
            width: 100%;
            max-height: 260px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0,0,0,0.2);
        }

        .task-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .task-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

        .action-btn {
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            flex: 1;
            min-width: 75px;
            text-align: center;
        }

        .btn-bump {
            background: rgba(251, 146, 60, 0.15);
            color: var(--accent-orange);
            border: 1px solid rgba(251, 146, 60, 0.2);
        }

        .btn-done {
            background: rgba(74, 222, 128, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-delete {
            background: rgba(248, 113, 113, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(248, 113, 113, 0.15);
        }

        /* Postpone Inline Submenu Layout */
        .postpone-overlay {
            background: rgba(15, 15, 20, 0.95);
            border: 1px solid var(--accent-orange);
            border-radius: 12px;
            padding: 14px;
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .postpone-selectors {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 8px;
        }

        .empty-notice {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Schedule</h1>
        <div class="sync-badge">
            <div id="sync-dot" class="dot"></div>
            <span id="sync-text">Connecting</span>
        </div>
    </header>

    <main>
        <!-- Inline Editing Target Area Container -->
        <div id="edit-workspace-anchor"></div>

        <!-- Task Creation Workspace Panel -->
        <section class="creator-card" id="creator-workspace">
            <div class="input-group">
                <span class="label-text">Task Header</span>
                <input type="text" id="task-title" placeholder="What requires your focus?" autocomplete="off">
                
                <div class="row-inputs">
                    <div>
                        <span class="label-text">Cadence</span>
                        <select id="task-cadence" style="width: 100%; margin-top: 6px;">
                            <option value="One-Off">One-Off Action</option>
                            <option value="Recurring">Recurring Routine</option>
                        </select>
                    </div>
                    <div>
                        <span class="label-text">Energy Tier</span>
                        <select id="task-energy" style="width: 100%; margin-top: 6px;">
                            <option value="High Energy">⚡ High Energy</option>
                            <option value="Low Energy">🕯️ Low Energy</option>
                        </select>
                    </div>
                </div>

                <div>
                    <span class="label-text">Target Reminder Window</span>
                    <input type="datetime-local" id="task-reminder" style="width: 100%; margin-top: 6px;">
                </div>

                <div>
                    <span class="label-text">Contextual Notes</span>
                    <textarea id="task-notes" placeholder="Drop thoughts, URLs, or processing anchor steps here..." style="width: 100%; margin-top: 6px;"></textarea>
                </div>

                <div>
                    <span class="label-text">Reference Image URL</span>
                    <input type="url" id="task-image" placeholder="https://example.com/image.jpg" style="width: 100%; margin-top: 6px;">
                </div>

                <button class="btn-add" id="add-task-btn">Commit to Canvas</button>
            </div>
        </section>

        <!-- Dynamic Live Bucket Displays -->
        <div>
            <div class="bucket-title">Current Focus Stack</div>
            <div id="active-tasks" class="task-list">
                <div class="empty-notice">Your space is clear. No active tasks detected.</div>
            </div>
        </div>
    </main>

    <script>
        // Europe-West Project Database Configuration Link
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "task-5e6d4.firebaseapp.com",
            databaseURL: "https://task-5e6d4-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "task-5e6d4",
            storageBucket: "task-5e6d4.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app();
        }

        const db = firebase.database();
        const tasksRef = db.ref("schedule_items");

        const syncDot = document.getElementById('sync-dot');
        const syncText = document.getElementById('sync-text');
        const activeTasksContainer = document.getElementById('active-tasks');
        const addTaskBtn = document.getElementById('add-task-btn');
        const editWorkspaceAnchor = document.getElementById('edit-workspace-anchor');
        const creatorWorkspace = document.getElementById('creator-workspace');

        // Monitor Realtime Sync States Across All Connected Matrices
        db.ref('.info/connected').on('value', (snapshot) => {
            if (snapshot.val() === true) {
                syncDot.classList.add('connected');
                syncText.textContent = "Live-Synced";
            } else {
                syncDot.classList.remove('connected');
                syncText.textContent = "Connecting";
            }
        });

        // Commit Task Event Handler Action
        addTaskBtn.addEventListener('click', () => {
            const titleInput = document.getElementById('task-title');
            const cadenceSelect = document.getElementById('task-cadence');
            const energySelect = document.getElementById('task-energy');
            const reminderInput = document.getElementById('task-reminder');
            const notesInput = document.getElementById('task-notes');
            const imageInput = document.getElementById('task-image');

            if (!titleInput.value.trim()) {
                alert("Please declare a title for your task.");
                return;
            }

            const newTask = {
                title: titleInput.value.trim(),
                cadence: cadenceSelect.value,
                energy: energySelect.value,
                reminder: reminderInput.value || "",
                notes: notesInput.value.trim() || "",
                imageUrl: imageInput.value.trim() || "",
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            tasksRef.push(newTask)
                .then(() => {
                    titleInput.value = '';
                    reminderInput.value = '';
                    notesInput.value = '';
                    imageInput.value = '';
                })
                .catch((err) => console.error("Database Error: ", err));
        });

        // Dynamic Realtime Render Pipeline
        tasksRef.on('value', (snapshot) => {
            activeTasksContainer.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                activeTasksContainer.innerHTML = `<div class="empty-notice">Your space is clear. No active tasks detected.</div>`;
                return;
            }

            // Order by timestamp desc so bumps push things visually upward smoothly
            const sortedKeys = Object.keys(data).sort((a, b) => b.timestamp - a.timestamp);

            sortedKeys.forEach((key) => {
                const task = data[key];
                
                const taskCard = document.createElement('div');
                taskCard.className = 'task-card';
                taskCard.id = `card-${key}`;
                
                let reminderHTML = '';
                if (task.reminder) {
                    const dateObj = new Date(task.reminder);
                    reminderHTML = `
                        <div class="task-reminder">
                            ⏳ Alert: ${dateObj.toLocaleDateString()} ${dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </div>
                    `;
                }

                let bodyHTML = '';
                if (task.notes || task.imageUrl) {
                    bodyHTML = `<div class="task-body">`;
                    if (task.notes) {
                        bodyHTML += `<div class="task-note">${escapeHTML(task.notes)}</div>`;
                    }
                    if (task.imageUrl) {
                        bodyHTML += `
                            <div class="task-img-container">
                                <img src="${escapeHTML(task.imageUrl)}" class="task-img" onerror="this.parentNode.style.display='none'" alt="Task attachment">
                            </div>
                        `;
                    }
                    bodyHTML += `</div>`;
                }

                taskCard.innerHTML = `
                    <div class="task-header">
                        <div class="task-info">
                            <div class="task-name">${escapeHTML(task.title)}</div>
                            <div class="task-meta">${task.cadence} • ${task.energy}</div>
                            ${reminderHTML}
                        </div>
                    </div>
                    ${bodyHTML}
                    <div class="task-actions">
                        <button class="action-btn btn-bump" onclick="togglePostponePanel('${key}')">Postpone</button>
                        <button class="action-btn btn-done" onclick="completeTask('${key}')">Done</button>
                        <button class="action-btn btn-edit" onclick="initiateEditMode('${key}')">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteTask('${key}')">Delete</button>
                    </div>
                    <div id="postpone-panel-${key}" style="display: none;"></div>
                `;
                activeTasksContainer.appendChild(taskCard);
            });
        });

        // Postpone Interface Dynamic Generation Engine
        window.togglePostponePanel = function(id) {
            const panel = document.getElementById(`postpone-panel-${id}`);
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                panel.innerHTML = '';
                return;
            }

            panel.innerHTML = `
                <div class="postpone-overlay">
                    <span class="label-text" style="color: var(--accent-orange)">Shift Frame Configuration</span>
                    <div class="postpone-selectors">
                        <input type="number" id="postpone-val-${id}" value="1" min="1" style="padding: 8px;">
                        <select id="postpone-unit-${id}" style="padding: 8px;">
                            <option value="hour">Hour(s)</option>
                            <option value="day">Day(s)</option>
                            <option value="week">Week(s)</option>
                            <option value="month">Month(s)</option>
                        </select>
                    </div>
                    <div class="button-row">
                        <button class="action-btn btn-bump" onclick="executePostpone('${id}')" style="margin-top:0;">Confirm Shift</button>
                        <button class="action-btn btn-edit" onclick="togglePostponePanel('${id}')" style="margin-top:0;">Cancel</button>
                    </div>
                </div>
            `;
            panel.style.display = 'block';
        };

        window.executePostpone = function(id) {
            const value = parseInt(document.getElementById(`postpone-val-${id}`).value) || 1;
            const unit = document.getElementById(`postpone-unit-${id}`).value;
            
            let currentTime = new Date();
            if (unit === 'hour') currentTime.setHours(currentTime.getHours() + value);
            else if (unit === 'day') currentTime.setDate(currentTime.getDate() + value);
            else if (unit === 'week') currentTime.setDate(currentTime.getDate() + (value * 7));
            else if (unit === 'month') currentTime.setMonth(currentTime.getMonth() + value);

            // ISO string clean slicing to keep target format matching local input masks
            const targetISO = currentTime.toISOString().slice(0, 16);

            tasksRef.child(id).update({
                reminder: targetISO,
                timestamp: firebase.database.ServerValue.TIMESTAMP // Soft sorting prioritization reset
            }).then(() => {
                alert(`Task repositioned safely.`);
            });
        };

        // Master Inline Editor Interface Implementation
        window.initiateEditMode = function(id) {
            tasksRef.child(id).once('value', (snapshot) => {
                const task = snapshot.val();
                if (!task) return;

                creatorWorkspace.style.display = 'none';
                
                editWorkspaceAnchor.innerHTML = `
                    <section class="edit-card">
                        <div class="input-group">
                            <span class="label-text" style="color: var(--accent-orange)">Modifying: ${escapeHTML(task.title)}</span>
                            
                            <div>
                                <span class="label-text">Task Title</span>
                                <input type="text" id="edit-title" value="${escapeHTML(task.title)}" style="width: 100%; margin-top:6px;">
                            </div>

                            <div class="row-inputs">
                                <div>
                                    <span class="label-text">Cadence</span>
                                    <select id="edit-cadence" style="width: 100%; margin-top: 6px;">
                                        <option value="One-Off" ${task.cadence === 'One-Off' ? 'selected' : ''}>One-Off Action</option>
                                        <option value="Recurring" ${task.cadence === 'Recurring' ? 'selected' : ''}>Recurring Routine</option>
                                    </select>
                                </div>
                                <div>
                                    <span class="label-text">Energy Tier</span>
                                    <select id="edit-energy" style="width: 100%; margin-top: 6px;">
                                        <option value="High Energy" ${task.energy === 'High Energy' ? 'selected' : ''}>⚡ High Energy</option>
                                        <option value="Low Energy" ${task.energy === 'Low Energy' ? 'selected' : ''}>🕯️ Low Energy</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <span class="label-text">Target Reminder Window</span>
                                <input type="datetime-local" id="edit-reminder" value="${task.reminder || ''}" style="width: 100%; margin-top: 6px;">
                            </div>

                            <div>
                                <span class="label-text">Contextual Notes</span>
                                <textarea id="edit-notes" style="width: 100%; margin-top: 6px;">${task.notes || ''}</textarea>
                            </div>

                            <div>
                                <span class="label-text">Reference Image URL</span>
                                <input type="url" id="edit-image" value="${task.imageUrl || ''}" style="width: 100%; margin-top: 6px;">
                            </div>

                            <div class="button-row">
                                <button class="btn-add" onclick="saveTaskEdits('${id}')">Save Adjustments</button>
                                <button class="btn-cancel" onclick="closeEditWorkspace()">Cancel</button>
                            </div>
                        </div>
                    </section>
                `;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        };

        window.saveTaskEdits = function(id) {
            const updatedTitle = document.getElementById('edit-title').value.trim();
            if (!updatedTitle) {
                alert("Task must maintain a structural header.");
                return;
            }

            const updates = {
                title: updatedTitle,
                cadence: document.getElementById('edit-cadence').value,
                energy: document.getElementById('edit-energy').value,
                reminder: document.getElementById('edit-reminder').value || "",
                notes: document.getElementById('edit-notes').value.trim() || "",
                imageUrl: document.getElementById('edit-image').value.trim() || ""
            };

            tasksRef.child(id).update(updates)
                .then(() => {
                    closeEditWorkspace();
                })
                .catch((err) => console.error("Update processing error: ", err));
        };

        window.closeEditWorkspace = function() {
            editWorkspaceAnchor.innerHTML = '';
            creatorWorkspace.style.display = 'block';
        };

        // Complete Execution Logic
        window.completeTask = function(id) {
            tasksRef.child(id).remove();
        };

        // Explicit Destruction Layer with Guardrail Gate
        window.deleteTask = function(id) {
            if (confirm("Are you absolutely sure you want to permanently discard this task target profile?")) {
                tasksRef.child(id).remove();
            }
        };

        // Safety Sanitization Engine
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
