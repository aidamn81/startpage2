<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Snooze Sentinel Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --accent-gold: #c5a059;
            --text-main: #c5c6c7;
            --text-bright: #ffffff;
            --accent-red: #8b0000;
            --accent-green: #2e7d32;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            font-family: 'Cinzel', serif;
            color: var(--accent-gold);
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--accent-gold);
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        .controls {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-sizing: border-box;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input, select, button {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #45f3ff;
            background: #0b0c10;
            color: var(--text-bright);
            font-size: 16px;
        }

        input, select {
            border: 1px solid rgba(197, 160, 89, 0.4);
        }

        button {
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-add {
            background-color: var(--accent-gold);
            color: #0b0c10;
            border: none;
            font-family: 'Cinzel', serif;
        }

        .btn-add:hover {
            opacity: 0.9;
        }

        .task-list {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-card {
            background: var(--card-bg);
            border-left: 5px solid var(--accent-gold);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .task-card.recurring {
            border-left-color: #4b0082; /* Indigo for routine recurring habits */
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-bright);
        }

        .task-meta {
            font-size: 12px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-action {
            flex: 1;
            font-size: 14px;
            padding: 8px;
        }

        .btn-done {
            background: var(--accent-green);
            border: none;
        }

        .btn-postpone {
            background: var(--accent-red);
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Snooze Sentinel</h1>
    </header>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="taskName" placeholder="What must be done?">
            <select id="taskType">
                <option value="one-off">One-off Task</option>
                <option value="recurring">Recurring Routine</option>
            </select>
            <button class="btn-add" onclick="createNewTask()">Enlist Task</button>
        </div>
    </div>

    <div class="task-list" id="taskList"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('adhd_tasks')) || [];

        function saveTasks() {
            localStorage.setItem('adhd_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function createNewTask() {
            const nameInput = document.getElementById('taskName');
            const typeInput = document.getElementById('taskType');
            
            if (!nameInput.value.trim()) return;

            const newTask = {
                id: Date.now().toString(),
                name: nameInput.value.trim(),
                type: typeInput.value,
                created: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            tasks.push(newTask);
            nameInput.value = '';
            saveTasks();
        }

        // Native iOS Share Sheet Integration Protocol
        async function triggerSnoozeSentinel(taskName, actionType) {
            const transmissionPayload = `[SENTINEL_CMD] | ACTION: ${actionType} | ITEM: ${taskName}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Snooze Sentinel Event',
                        text: transmissionPayload
                    });
                } catch (err) {
                    console.log('Share dismissed or failed:', err);
                }
            } else {
                // Fallback for non-supported browsers
                alert(`Pipeline Fallback:\n${transmissionPayload}`);
            }
        }

        function completeTask(id) {
            const targetTask = tasks.find(t => t.id === id);
            if (!targetTask) return;
            
            if (confirm(`Mark "${targetTask.name}" as fully completed?`)) {
                // Trigger Shortcut to log success if needed
                triggerSnoozeSentinel(targetTask.name, 'COMPLETE');
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
            }
        }

        function postponeTask(id) {
            const targetTask = tasks.find(t => t.id === id);
            if (!targetTask) return;

            // Instantly activate the native data pipeline to launch your Shortcut
            triggerSnoozeSentinel(targetTask.name, 'POSTPONE');
        }

        function renderTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = '';

            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = `task-card ${task.type}`;
                card.innerHTML = `
                    <div class="task-header">
                        <div>
                            <span class="task-meta">${task.type}</span>
                            <div class="task-title">${task.name}</div>
                        </div>
                        <span style="font-size: 12px; opacity: 0.6;">${task.created}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-action btn-done" onclick="completeTask('${task.id}')">✓ Done</button>
                        <button class="btn-action btn-postpone" onclick="postponeTask('${task.id}')">⏳ Postpone</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Initial render execution
        renderTasks();
    </script>
</body>
</html>
