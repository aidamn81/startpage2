<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Companion & Task Ground Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(15, 15, 22, 0.55);
            --glass-bg-hover: rgba(22, 22, 32, 0.7);
            --glass-bg-expanded: rgba(25, 25, 35, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold-accent: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --text-main: #f5f5f7;
            --text-muted: rgba(245, 245, 247, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #08080c;
            background-image: radial-gradient(circle at 50% 0%, #141420 0%, #08080c 70%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 768px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 10px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: var(--text-main);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Control Panel / Actions bar */
        .control-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }

        .input-box {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        .input-box:focus {
            outline: none;
            border-color: var(--gold-accent);
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0 20px;
            color: var(--text-main);
            font-family: 'Cinzel', serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: var(--gold-accent);
            box-shadow: 0 0 10px var(--gold-glow);
            color: var(--gold-accent);
        }
