<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ground Control: Minimal Deck</title>
    <style>
        :root {
            /* Pure Dark Ambient Base */
            --base-bg: #000000;
            --gradient-deep: radial-gradient(at 50% 0%, rgba(25, 15, 45, 0.8) 0%, transparent 50%),
                             radial-gradient(at 50% 100%, rgba(10, 20, 45, 0.8) 0%, transparent 50%);

            /* Sleek Translucent Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-blur: blur(30px) saturate(200%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-glow: 0 15px 35px rgba(0, 0, 0, 0.7);

            /* Main Text Colors */
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            
            /* Neon Priority Accents */
            --neon-high: #ff0080;   /* Crimson Fuchsia */
            --neon-med: #ffaa00;    /* Amber */
            --neon-low: #66fcf1;    /* Cyan */
            
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--base-bg);
            background-image: var(--gradient-deep);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        /* Center-aligned Master Column */
        .workspace-container {
            width: 100%;
            max-width: 680px; /* Perfect scanning width for both phone & large tablet viewports */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Minimal Header */
        header {
            text-align: center;
            letter-spacing: 2px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Minimal Translucent Input Panel */
        .creator-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: var(--glass-blur);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            box-shadow: var(--glass-glow);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
        }

        input, select, button.commit-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            text-align: center;
            width: 100%;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
        }

        button.commit-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
        button.commit-btn:active { transform: scale(0.98); }

        /* Board Section Setup */
        .deck-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 5px;
        }

        /* Center-Aligned Task List */
        .task-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        /* Glass Task Cards */
        .task-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: var(--glass-blur);
            backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            box-shadow: var(--glass-glow);
            border-radius: 18px;
            width: 100%;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .task-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* --- SIZING BY PRIORITY --- */
        
        /* High Priority - Dominant Size */
        .task-card.p-high {
            padding: 35px 25px;
            border-top: 3px solid var(--neon-high);
            background: linear-gradient(180deg, rgba(255, 0, 128, 0.03) 0%, transparent 100%), var(--glass-bg);
        }
        .task-card.p-high .task-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(255, 0, 128, 0.3);
        }

        /* Medium Priority - Standard Balanced Size */
        .task-card.p-medium {
            padding: 22px 20px;
            border-top: 3px solid var(--neon-med);
        }
        .task-card.p-medium .task-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        /* Low Priority - Tiny & Highly Compact */
        .task-card.p-low {
            padding: 12px 15px;
            border-top: 2px solid var(--neon-low);
            opacity: 0.75;
        }
        .task-card.p-low .task-title {
            font-size: 0.95rem;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
        }

        /* Meta Indicators */
        .task-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .p-low .task-meta { display: none; } /* Completely hidden meta on low for ultra-minimalism */

        /* Inline Glass Controls */
        .task-controls {
            margin-top: 15px;
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 280px;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: all 0.25s ease;
        }
        .task-card.expanded .task-controls {
            opacity: 1;
            height: auto;
            margin-top: 20px;
        }
        .p-low .task-controls { max-width: 220px; }

        .control-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
        }
        .control-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .btn-complete:hover { color: #00e673; border-color: #00e673; }
        .btn-postpone:hover { color: var(--neon-med); border-color: var(--neon-med); }

        /* --- Minimal Subtasks Panel --- */
        .subtask-container {
            width: 100%;
            max-width: 320px;
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }
        .task-card.expanded .subtask-container { display: block; }

        .sub-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        .sub-item input {
            width: 16px;
            height: 16px;
            accent-color: var(--neon-low);
            cursor: pointer;
        }
        .sub-item.done span {
            text-decoration: line-through;
            opacity: 0.3;
        }
    </style>
</head>
<body>

<div class="workspace-container">
    <header>// GROUND CONTROL // DECK STATUS</header>

    <!-- Center Add Interface -->
    <div class="creator-card">
        <input type="text" id="taskTitle" placeholder="Target Description...">
        <div class="input-row">
            <select id="taskPriority">
                <option value="high">HIGH PRIORITY</option>
                <option value="medium" selected>MEDIUM PRIORITY</option>
                <option value="low">LOW PRIORITY</option>
            </select>
            <select id="taskType">
                <option value="oneoff">ONE-OFF</option>
                <option value="recurring">LOOP</option>
            </select>
            <button class="commit-btn" onclick="addNewTask()">Commit</button>
        </div>
    </div>

    <!-- Active Section -->
    <div class="deck-section">
        <div class="section-title">Active Deck</div>
        <div class="task-list" id="activeTaskList"></div>
    </div>

    <!-- Postponed Section -->
    <div class="deck-section" style="margin-top: 20px;">
        <div class="section-title">Postponed / Shifted</div>
        <div class="task-list" id="postponedTaskList"></div>
    </div>
</div>

<script>
    const storeKey = 'adhd_minimal_glass_v3';
    let state = {
        tasks: JSON.parse(localStorage.getItem(storeKey)) || [
            { id: 't1', title: 'Live Performance Audio Mixing', priority: 'high', type: 'recurring', status: 'active', subs: [{id:'s1', text: 'Clean primary leads stems', done: true}, {id:'s2', text: 'Check bus compression parameters', done: false}] },
            { id: 't2', title: 'Refine Web App Interface Styles', priority: 'medium', type: 'oneoff', status: 'active', subs: [] },
            { id: 't3', title: 'Clear desktop caches', priority: 'low', type: 'oneoff', status: 'active', subs: [] }
        ]
    };

    function saveState() {
        localStorage.setItem(storeKey, JSON.stringify(state.tasks));
        renderBoard();
    }

    function addNewTask() {
        const titleInput = document.getElementById('taskTitle');
        if (!titleInput.value.trim()) return;

        state.tasks.push({
            id: 'task-' + Date.now(),
            title: titleInput.value.trim(),
            priority: document.getElementById('taskPriority').value,
            type: document.getElementById('taskType').value,
            status: 'active',
            subs: []
        });
        titleInput.value = '';
        saveState();
    }

    function completeTask(taskId) {
        const task = state.tasks.find(t => t.id === taskId);
        if (!task) return;

        if (task.type === 'recurring') {
            task.subs.forEach(s => s.done = false);
            task.status = 'active';
        } else {
            state.tasks = state.tasks.filter(t => t.id !== taskId);
        }
        saveState();
    }

    function postponeTask(taskId) {
        const task = state.tasks.find(t => t.id === taskId);
        if (task) {
            task.status = 'postponed';
            saveState();
        }
    }

    function resetTask(taskId) {
        const task = state.tasks.find(t => t.id === taskId);
        if (task) {
            task.status = 'active';
            saveState();
        }
    }

    function toggleCard(e, taskId) {
        if (e.target.closest('.task-controls') || e.target.closest('.subtask-container')) return;
        document.getElementById(`card-${taskId}`).classList.toggle('expanded');
    }

    function toggleSubItem(taskId, subId) {
        const task = state.tasks.find(t => t.id === taskId);
        if (task) {
            const sub = task.subs.find(s => s.id === subId);
            if (sub) sub.done = !sub.done;
            saveState();
        }
    }

    function renderBoard() {
        const activeList = document.getElementById('activeTaskList');
        const postponedList = document.getElementById('postponedTaskList');
        activeList.innerHTML = '';
        postponedList.innerHTML = '';

        const priorityWeights = { high: 3, medium: 2, low: 1 };
        const sortedTasks = [...state.tasks].sort((a, b) => priorityWeights[b.priority] - priorityWeights[a.priority]);

        sortedTasks.forEach(task => {
            const card = document.createElement('div');
            card.id = `card-${task.id}`;
            card.className = `task-card p-${task.priority}`;
            card.setAttribute('onclick', `toggleCard(event, '${task.id}')`);

            const actionButtons = task.status === 'active' ? `
                <button class="control-btn btn-postpone" onclick="event.stopPropagation(); postponeTask('${task.id}')">⏳ Defer</button>
                <button class="control-btn btn-complete" onclick="event.stopPropagation(); completeTask('${task.id}')">✓ Clear</button>
            ` : `
                <button class="control-btn" onclick="event.stopPropagation(); resetTask('${task.id}')">↩ Return</button>
            `;

            card.innerHTML = `
                <div class="task-title">${task.title}</div>
                <div class="task-meta">${task.type}</div>
                
                <div class="task-controls">${actionButtons}</div>

                <div class="subtask-container">
                    ${task.subs.map(sub => `
                        <div class="sub-item ${sub.done ? 'done' : ''}">
                            <input type="checkbox" ${sub.done ? 'checked' : ''} onclick="toggleSubItem('${task.id}', '${sub.id}')">
                            <span>${sub.text}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            if (task.status === 'active') activeList.appendChild(card);
            else if (task.status === 'postponed') activeList.appendChild(card), postponedList.appendChild(card);
        });
    }

    renderBoard();
</script>
</body>
</html>
