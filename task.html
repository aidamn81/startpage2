<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ground Control | Fluid Scheduler</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --bg-base: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.7);
            --border-glow: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-muted: #8a8a98;
            --accent-green: #4ade80;
            --accent-orange: #fb923c;
            --accent-red: #f87171;
            --font-display: 'Cinzel', serif;
            --font-sans: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Top Header Control panel */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            margin-bottom: 25px;
        }

        h1 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Status Indicator Indicator */
        .sync-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-orange);
            box-shadow: 0 0 8px var(--accent-orange);
            transition: all 0.4s ease;
        }

        .dot.connected {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        /* Task Engine Container Grid */
        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .creator-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input, select, button {
            font-family: var(--font-sans);
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: rgba(255, 255, 255, 0.20);
        }

        .row-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button.btn-add {
            background: var(--text-primary);
            color: var(--bg-base);
            font-weight: 600;
            cursor: pointer;
            border: none;
            margin-top: 5px;
        }

        button.btn-add:active {
            transform: scale(0.98);
        }

        /* Fluid Schedule Bucket List display */
        .bucket-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin: 15px 0 5px 5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 65%;
        }

        .task-name {
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-word;
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-bump {
            background: rgba(251, 146, 60, 0.15);
            color: var(--accent-orange);
            border: 1px solid rgba(251, 146, 60, 0.2);
        }

        .btn-bump:active {
            background: rgba(251, 146, 60, 0.3);
        }

        .btn-done {
            background: rgba(74, 222, 128, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .btn-done:active {
            background: rgba(74, 222, 128, 0.3);
        }

        /* Empty State text styling */
        .empty-notice {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Schedule</h1>
        <div class="sync-badge">
            <div id="sync-dot" class="dot"></div>
            <span id="sync-text">Connecting</span>
        </div>
    </header>

    <main>
        <section class="creator-card">
            <div class="input-group">
                <input type="text" id="task-title" placeholder="What requires your focus?" autocomplete="off">
                <div class="row-inputs">
                    <select id="task-cadence">
                        <option value="One-Off">One-Off Action</option>
                        <option value="Recurring">Recurring Routine</option>
                    </select>
                    <select id="task-energy">
                        <option value="High Energy">⚡ High Energy</option>
                        <option value="Low Energy">🕯️ Low Energy</option>
                    </select>
                </div>
                <button class="btn-add" id="add-task-btn">Commit to Canvas</button>
            </div>
        </section>

        <div>
            <div class="bucket-title">Current Focus Stack</div>
            <div id="active-tasks" class="task-list">
                <div class="empty-notice">Your space is clear. No active tasks detected.</div>
            </div>
        </div>
    </main>

    <script>
        // 1. Updated Europe-West Project Database Routing Configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", 
            authDomain: "task-5e6d4.firebaseapp.com",
            databaseURL: "https://task-5e6d4-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "task-5e6d4",
            storageBucket: "task-5e6d4.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize App Instance Safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app();
        }

        const db = firebase.database();
        const tasksRef = db.ref("schedule_items");

        // UI Reference Handles
        const syncDot = document.getElementById('sync-dot');
        const syncText = document.getElementById('sync-text');
        const activeTasksContainer = document.getElementById('active-tasks');
        const addTaskBtn = document.getElementById('add-task-btn');

        // Monitor Realtime Sync States
        db.ref('.info/connected').on('value', (snapshot) => {
            if (snapshot.val() === true) {
                syncDot.classList.add('connected');
                syncText.textContent = "Live-Synced";
            } else {
                syncDot.classList.remove('connected');
                syncText.textContent = "Connecting";
            }
        });

        // 2. Commit Task Event Handler Action
        addTaskBtn.addEventListener('click', () => {
            const titleInput = document.getElementById('task-title');
            const cadenceSelect = document.getElementById('task-cadence');
            const energySelect = document.getElementById('task-energy');

            if (!titleInput.value.trim()) {
                alert("Please declare a title for your task.");
                return;
            }

            const newTask = {
                title: titleInput.value.trim(),
                cadence: cadenceSelect.value,
                energy: energySelect.value,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            tasksRef.push(newTask)
                .then(() => {
                    titleInput.value = ''; // Flush input clean
                })
                .catch((err) => {
                    console.error("Database Write Error: ", err);
                });
        });

        // 3. Render Dashboard Data Stream Engine
        tasksRef.on('value', (snapshot) => {
            activeTasksContainer.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                activeTasksContainer.innerHTML = `<div class="empty-notice">Your space is clear. No active tasks detected.</div>`;
                return;
            }

            // Loop and compile task nodes dynamically
            Object.keys(data).forEach((key) => {
                const task = data[key];
                
                const taskCard = document.createElement('div');
                taskCard.className = 'task-card';
                taskCard.innerHTML = `
                    <div class="task-info">
                        <div class="task-name">${escapeHTML(task.title)}</div>
                        <div class="task-meta">${task.cadence} • ${task.energy}</div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn btn-bump" onclick="bumpTask('${key}')">Bump</button>
                        <button class="action-btn btn-done" onclick="completeTask('${key}')">Done</button>
                    </div>
                `;
                activeTasksContainer.appendChild(taskCard);
            });
        });

        // 4. Fluid Processing Action Closures
        window.bumpTask = function(id) {
            // Guilt-Free Bump: Simulates push priority rearrangement by refreshing the positioning timestamp
            tasksRef.child(id).update({
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        };

        window.completeTask = function(id) {
            // Banish item cleanly from the live tracking tree upon confirmation
            if (confirm("Clear this item from your current visual stack?")) {
                tasksRef.child(id).remove();
            }
        };

        // Clean Injection String Escaper Utility
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
