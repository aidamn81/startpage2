<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Gothic Archive: Task Command</title>
    <style>
        :root { --accent: #d4af37; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; font-family: 'Cinzel', serif; padding: 20px; }
        .task-card { background: rgba(25, 25, 35, 0.9); border: 1px solid var(--accent); padding: 15px; margin-bottom: 10px; }
        .subtask { margin-left: 30px; font-size: 0.9em; color: #aaa; }
        button { cursor: pointer; background: var(--accent); border: none; padding: 5px 10px; margin: 5px; }
    </style>
</head>
<body>

    <h1>The Gothic Archive</h1>
    <div id="controls">
        <button onclick="addTask()">Add Task</button>
        <button onclick="exportData()">Archive Data</button>
        <input type="file" id="importFile" onchange="importData(event)">
    </div>

    <div id="taskList"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function save() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
        }

        function addTask() {
            const title = prompt("Task Name:");
            if (title) {
                tasks.push({ id: Date.now(), title, subtasks: [], priority: 'Normal' });
                save();
            }
        }

        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.map(t => `
                <div class="task-card">
                    <strong>${t.title}</strong> (${t.priority})
                    <button onclick="addSubtask(${t.id})">+ Sub</button>
                    <button onclick="deleteTask(${t.id})">Delete</button>
                    <div class="subtasks">${t.subtasks.map(s => `<div class="subtask">• ${s}</div>`).join('')}</div>
                </div>
            `).join('');
        }

        function addSubtask(id) {
            const sub = prompt("Subtask Name:");
            const task = tasks.find(t => t.id === id);
            if (sub) task.subtasks.push(sub);
            save();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(tasks)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'archive.json';
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                tasks = JSON.parse(e.target.result);
                save();
            };
            reader.readAsText(file);
        }

        render();
    </script>
</body>
</html>
