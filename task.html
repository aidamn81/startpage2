<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --grid-size: 20px; --accent: #d4af37; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; margin: 0; overflow: hidden; font-family: 'Cinzel', serif; }
        #canvas { width: 3000px; height: 3000px; position: relative; }
        .grid-guide { position: absolute; top:0; left:0; width:100%; height:100%; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: var(--grid-size) var(--grid-size); pointer-events: none; display: none; }
        .edit-mode .grid-guide { display: block; }
        .note { position: absolute; width: 220px; min-height: 200px; background: rgba(25, 25, 35, 0.9); border: 1px solid var(--accent); padding: 15px; box-sizing: border-box; touch-action: none; }
        .controls { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; }
        button { cursor: pointer; background: var(--accent); border: none; padding: 5px 10px; margin: 2px; }
        input { width: 100%; background: #1a1a20; color: white; border: 1px solid #333; margin-top: 5px; }
    </style>
</head>
<body class="edit-mode">

<div class="controls">
    <button onclick="toggleEditMode()">Toggle Edit Mode</button>
    <button onclick="addNote()">Add Note</button>
</div>

<div id="canvas">
    <div class="grid-guide"></div>
</div>

<script>
    // Request permission for system notifications
    if (Notification.permission !== "granted") Notification.requestPermission();

    function toggleEditMode() { document.body.classList.toggle('edit-mode'); }

    function addNote() {
        const note = document.createElement('div');
        note.className = 'note';
        note.style.left = '50px';
        note.style.top = '50px';
        note.innerHTML = `
            <input type="text" placeholder="Title" class="note-title">
            <input type="datetime-local" class="note-time">
            <button onclick="scheduleNotification(this)">Set Alarm</button>
            <button onclick="if(confirm('Delete this note?')) this.parentElement.remove()">Delete</button>
        `;
        document.getElementById('canvas').appendChild(note);
    }

    function scheduleNotification(btn) {
        const title = btn.parentElement.querySelector('.note-title').value;
        const timeInput = btn.parentElement.querySelector('.note-time').value;
        const alarmTime = new Date(timeInput).getTime();
        const delay = alarmTime - Date.now();

        if (delay < 0) return alert("Time already passed.");

        setTimeout(() => {
            const n = new Notification("Reminder: " + title, {
                body: "Click to postpone or dismiss.",
                requireInteraction: true
            });
            n.onclick = () => {
                const newTime = prompt("Postpone to (YYYY-MM-DDTHH:MM):");
                if (newTime) {
                    // Logic to re-schedule
                    alert("Rescheduled to " + newTime);
                }
            };
        }, delay);
        alert("Alarm set!");
    }
</script>
</body>
</html>
