<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive</title>
    <style>
        :root { --grid-size: 20px; --accent: #d4af37; --bg: #0a0a0c; }
        body { background: var(--bg); color: #fff; margin: 0; overflow: hidden; font-family: 'Cinzel', serif; }
        #canvas { width: 3000px; height: 3000px; position: relative; }
        .grid-guide { position: absolute; top:0; left:0; width:100%; height:100%; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: var(--grid-size) var(--grid-size); pointer-events: none; display: none; }
        .edit-mode .grid-guide { display: block; }
        .note { position: absolute; width: 200px; height: 200px; background: rgba(25, 25, 35, 0.9); border: 1px solid var(--accent); cursor: grab; padding: 10px; box-sizing: border-box; touch-action: none; }
        .controls { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; }
        .menu-btn { cursor: pointer; color: var(--accent); margin-right: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <button onclick="toggleEditMode()">Toggle Edit Mode</button>
    <button onclick="addNote()">Add Note</button>
</div>

<div id="canvas">
    <div class="grid-guide"></div>
    <!-- Notes will be injected here -->
</div>

<script>
    let isEditMode = false;

    // Trigger for the iOS Shortcut Reminder
    function triggerReminder(title, date) {
        const payload = encodeURIComponent(`${title} at ${date}`);
        // Ensure you have an iOS Shortcut named 'Sync Fluid Scheduler'
        window.location.href = `shortcuts://run-shortcut?name=Sync%20Fluid%20Scheduler&input=${payload}`;
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
    }

    function addNote() {
        const note = document.createElement('div');
        note.className = 'note';
        note.style.left = '50px';
        note.style.top = '50px';
        note.innerHTML = `
            <input type="text" placeholder="Title" class="note-title">
            <input type="datetime-local" class="note-date">
            <button onclick="saveNote(this)">Save & Set Reminder</button>
            <button onclick="deleteNote(this)">Delete</button>
        `;
        document.getElementById('canvas').appendChild(note);
    }

    function saveNote(btn) {
        const parent = btn.parentElement;
        const title = parent.querySelector('.note-title').value;
        const date = parent.querySelector('.note-date').value;
        
        if (date) {
            triggerReminder(title, date);
        }
        alert("Note Saved and Reminder Sent.");
    }

    function deleteNote(btn) {
        if(confirm("Are you sure you want to delete this note?")) {
            btn.parentElement.remove();
        }
    }
</script>
</body>
</html>
