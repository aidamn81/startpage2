<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Estimating Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #050505; --gold: #8c7340; --crimson: #7a0000; --text: #a19a89; }
        body {
            background: var(--obsidian); color: var(--text);
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
        }
        .oracle-container {
            width: 100%; max-width: 500px; border: 2px solid var(--gold);
            padding: 30px; border-radius: 15px; background: rgba(10,10,10,0.95);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        h1 { font-family: 'Cinzel'; color: var(--gold); text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-family: 'Cinzel'; font-size: 0.8rem; color: var(--gold); }
        input, select {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 5px; box-sizing: border-box;
        }
        .btn-prophesy {
            width: 100%; padding: 15px; background: var(--crimson); color: white;
            border: none; font-family: 'Cinzel'; cursor: pointer; border-radius: 5px;
            margin-top: 10px; transition: 0.3s;
        }
        .btn-prophesy:hover { background: #a00000; box-shadow: 0 0 15px var(--crimson); }
        #result {
            margin-top: 30px; padding: 20px; border-top: 1px dashed var(--gold);
            text-align: center; display: none;
        }
        .time-value { font-size: 2rem; color: var(--gold); font-family: 'Cinzel'; display: block; }
        .back-link { margin-top: 20px; color: var(--gold); text-decoration: none; font-size: 0.8rem; font-family: 'Cinzel'; }
    </style>
</head>
<body>

    <div class="oracle-container">
        <h1>The Oracle</h1>
        
        <div class="input-group">
            <label>Raw Coding Estimate (Hours)</label>
            <input type="number" id="raw-hours" placeholder="Be honest...">
        </div>

        <div class="input-group">
            <label>Complexity Level</label>
            <select id="complexity">
                <option value="1.2">Minor Incantation (Simple)</option>
                <option value="1.5">Standard Ritual (Moderate)</option>
                <option value="2.0">Dark Magic (Complex)</option>
                <option value="3.0">Forbidden Knowledge (Unknown Tech)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Interruption Frequency</label>
            <select id="interruptions">
                <option value="1.1">Solitude (Low)</option>
                <option value="1.3">Occasional Spirits (Medium)</option>
                <option value="1.6">Chaos Realm (High)</option>
            </select>
        </div>

        <button class="btn-prophesy" onclick="consultOracle()">Consult Fate</button>

        <div id="result">
            <label>The Prophecy Foretells:</label>
            <span class="time-value" id="final-time">0 Hours</span>
            <p id="oracle-advice" style="font-size: 0.85rem; font-style: italic;"></p>
        </div>
    </div>

    <a href="index.html" class="back-link">← Return to Archive</a>

    <script>
        function consultOracle() {
            const raw = parseFloat(document.getElementById('raw-hours').value);
            if (isNaN(raw)) return alert("The Oracle requires a number to speak.");

            const complexity = parseFloat(document.getElementById('complexity').value);
            const interruptions = parseFloat(document.getElementById('interruptions').value);
            
            // The Original Formula: Raw * Complexity * Interruptions + 20% Buffer
            let total = raw * complexity * interruptions;
            total = total * 1.2; 

            document.getElementById('final-time').innerText = Math.ceil(total) + " Hours";
            
            const advice = document.getElementById('oracle-advice');
            if (total > 40) advice.innerText = "A journey of many moons. Prepare your soul.";
            else if (total > 10) advice.innerText = "The stars align, but effort is required.";
            else advice.innerText = "A swift victory is within reach.";

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
