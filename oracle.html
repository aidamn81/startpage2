<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Journey Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #050505; --gold: #8c7340; --crimson: #7a0000; --text: #a19a89; }
        body {
            background: var(--obsidian); color: var(--text);
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
        }
        .oracle-container {
            width: 100%; max-width: 500px; border: 2px solid var(--gold);
            padding: 30px; border-radius: 15px; background: rgba(10,10,10,0.95);
            box-shadow: 0 0 50px rgba(0,0,0,1); box-sizing: border-box;
        }
        h1 { font-family: 'Cinzel'; color: var(--gold); text-align: center; margin-top: 0; font-size: 1.4rem; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-family: 'Cinzel'; font-size: 0.75rem; color: var(--gold); }
        input {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 5px; box-sizing: border-box; font-family: inherit;
        }
        .map-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .map-btn { 
            padding: 10px 5px; font-size: 0.65rem; font-family: 'Cinzel';
            background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold);
            cursor: pointer; border-radius: 4px; text-decoration: none; text-align: center;
        }
        .prep-box {
            display: flex; align-items: center; gap: 12px; margin: 20px 0;
            padding: 15px; background: rgba(122, 0, 0, 0.1); border: 1px solid #300; border-radius: 8px;
        }
        .prep-box input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--crimson); }
        .btn-prophesy {
            width: 100%; padding: 15px; background: var(--crimson); color: white;
            border: none; font-family: 'Cinzel'; cursor: pointer; border-radius: 5px;
            transition: 0.3s; font-size: 1rem;
        }
        #result {
            margin-top: 25px; padding: 20px; border-top: 1px dashed var(--gold);
            text-align: center; display: none;
        }
        .time-value { font-size: 2.2rem; color: var(--gold); font-family: 'Cinzel'; display: block; margin: 10px 0; }
        .back-link { margin-top: 30px; color: var(--gold); text-decoration: none; font-size: 0.8rem; font-family: 'Cinzel'; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="oracle-container">
        <h1>The Journey Oracle</h1>
        
        <div class="input-group">
            <label>What time do I start work?</label>
            <input type="time" id="start-time">
        </div>

        <div class="input-group">
            <label>Where is the location?</label>
            <input type="text" id="location-input" placeholder="Enter destination address...">
            <div class="map-grid">
                <div class="map-btn" onclick="openMap('citymapper')">Citymapper</div>
                <div class="map-btn" onclick="openMap('google')">Google Maps</div>
                <div class="map-btn" onclick="openMap('tfl')">TfL Go</div>
            </div>
        </div>

        <div class="input-group" style="margin-top: 25px;">
            <label>Calculated Journey Time (Minutes)</label>
            <input type="number" id="travel-duration" placeholder="e.g. 45">
        </div>

        <div class="prep-box">
            <input type="checkbox" id="prep-toggle">
            <label style="margin:0; cursor:pointer;">2 Hours Preparation Ritual</label>
        </div>

        <button class="btn-prophesy" onclick="calculateDeparture()">Consult Fate</button>

        <div id="result">
            <label>You must leave home at:</label>
            <span class="time-value" id="departure-time">--:--</span>
            <p id="oracle-summary" style="font-size: 0.8rem; font-style: italic; opacity: 0.8;"></p>
        </div>
    </div>

    <a href="index.html" class="back-link">← Return to Archive</a>

    <script>
        function openMap(type) {
            const loc = encodeURIComponent(document.getElementById('location-input').value);
            if (!loc) { alert("The location is hidden in shadow. Please type a destination."); return; }

            let url = "";
            switch(type) {
                case 'citymapper': url = `https://citymapper.com/directions?endaddress=${loc}`; break;
                case 'google': url = `https://www.google.com/maps/dir/?api=1&destination=${loc}`; break;
                case 'tfl': url = `https://tfl.gov.uk/plan-a-journey/results?to=${loc}`; break;
            }
            window.open(url, '_blank');
        }

        function calculateDeparture() {
            const startTimeStr = document.getElementById('start-time').value;
            const travelMins = parseInt(document.getElementById('travel-duration').value) || 0;
            const needsPrep = document.getElementById('prep-toggle').checked;

            if (!startTimeStr) { alert("Tell the Oracle when your labor begins."); return; }

            // Create date object for today at the start time
            const [hours, mins] = startTimeStr.split(':');
            let date = new Date();
            date.setHours(parseInt(hours), parseInt(mins), 0);

            // Subtract Travel Time
            date.setMinutes(date.getMinutes() - travelMins);

            // Subtract Prep Time (120 mins)
            if (needsPrep) {
                date.setMinutes(date.getMinutes() - 120);
            }

            // Format for display
            const finalH = date.getHours().toString().padStart(2, '0');
            const finalM = date.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('departure-time').innerText = `${finalH}:${finalM}`;
            
            let summary = `Journey: ${travelMins}m.`;
            if (needsPrep) summary += ` Prep: 2h.`;
            document.getElementById('oracle-summary').innerText = summary;
            
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
