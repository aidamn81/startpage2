<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Journey Oracle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display&display=swap" rel="stylesheet">
    <style>
        :root { --obsidian: #050505; --gold: #8c7340; --crimson: #7a0000; --text: #a19a89; }
        body {
            background: var(--obsidian); color: var(--text);
            font-family: 'Playfair Display', serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
        }
        .oracle-container {
            width: 100%; max-width: 500px; border: 2px solid var(--gold);
            padding: 30px; border-radius: 15px; background: rgba(10,10,10,0.95);
            box-shadow: 0 0 50px rgba(0,0,0,1); box-sizing: border-box;
        }
        h1 { font-family: 'Cinzel'; color: var(--gold); text-align: center; margin-top: 0; font-size: 1.4rem; letter-spacing: 2px; }
        
        /* Saved Locations Styling */
        #saved-altars {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
            padding: 10px; border: 1px solid #222; border-radius: 8px; background: #080808;
        }
        .altar-btn {
            background: #111; border: 1px solid var(--gold); color: var(--gold);
            padding: 6px 12px; font-family: 'Cinzel'; font-size: 0.65rem;
            border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .altar-btn:active { background: var(--gold); color: #000; }
        .delete-altar { color: var(--crimson); font-weight: bold; margin-left: 5px; padding: 0 4px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--gold); }
        input {
            width: 100%; padding: 12px; background: #111; border: 1px solid #333;
            color: #fff; border-radius: 5px; box-sizing: border-box; font-family: inherit;
        }
        input:focus { border-color: var(--gold); outline: none; }
        
        .map-action { 
            margin-top: 10px; padding: 12px; font-size: 0.8rem; font-family: 'Cinzel';
            background: #1a1a1a; color: var(--gold); border: 1px solid var(--gold);
            cursor: pointer; border-radius: 4px; text-decoration: none; text-align: center;
            display: block; width: 100%; box-sizing: border-box;
        }

        .prep-box {
            display: flex; align-items: center; gap: 12px; margin: 20px 0;
            padding: 15px; background: rgba(122, 0, 0, 0.05); border: 1px solid #200; border-radius: 8px;
        }
        .prep-box input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--crimson); }
        
        .btn-prophesy {
            width: 100%; padding: 16px; background: var(--crimson); color: white;
            border: none; font-family: 'Cinzel'; cursor: pointer; border-radius: 5px;
            transition: 0.3s; font-size: 1rem; letter-spacing: 1px;
        }
        #result {
            margin-top: 25px; padding: 20px; border-top: 1px double var(--gold);
            text-align: center; display: none;
        }
        .time-value { font-size: 2.8rem; color: var(--gold); font-family: 'Cinzel'; display: block; margin: 10px 0; }
        .back-link { margin-top: 30px; color: var(--gold); text-decoration: none; font-size: 0.8rem; font-family: 'Cinzel'; opacity: 0.6; }
    </style>
</head>
<body onload="renderAltars()">

    <div class="oracle-container">
        <h1>The Journey Oracle</h1>

        <label style="text-align: center; display: block; margin-bottom: 5px;">Saved Altars</label>
        <div id="saved-altars">
            </div>
        
        <div class="input-group">
            <label>Work Start Time</label>
            <input type="time" id="start-time">
        </div>

        <div class="input-group">
            <label>Starting Point (Home)</label>
            <input type="text" id="start-location" placeholder="Address or Station...">
        </div>

        <div class="input-group">
            <label>Destination (Work)</label>
            <input type="text" id="end-location" placeholder="Address or Company...">
            <button class="map-action" onclick="consultMaps()">Check Public Transport</button>
        </div>

        <div class="input-group" style="margin-top: 25px;">
            <label>Journey Duration (Minutes)</label>
            <input type="number" id="travel-duration" placeholder="Enter minutes from Maps">
        </div>

        <div class="prep-box">
            <input type="checkbox" id="prep-toggle">
            <label style="margin:0; cursor:pointer; font-size: 0.85rem;">Include 2h Preparation Time</label>
        </div>

        <button class="btn-prophesy" onclick="calculateDeparture()">Calculate Departure</button>

        <div id="result">
            <label>You must depart at:</label>
            <span class="time-value" id="departure-time">--:--</span>
            <p id="oracle-summary" style="font-size: 0.8rem; font-style: italic; opacity: 0.7;"></p>
        </div>
    </div>

    <a href="index.html" class="back-link">← Return to Archive</a>

    <script>
        let savedRoutes = JSON.parse(localStorage.getItem('oracle_routes') || '[]');

        function renderAltars() {
            const container = document.getElementById('saved-altars');
            if (savedRoutes.length === 0) {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.5; width:100%; text-align:center;">No saved routes yet.</div>';
                return;
            }
            container.innerHTML = '';
            savedRoutes.forEach((route, index) => {
                const btn = document.createElement('div');
                btn.className = 'altar-btn';
                btn.innerHTML = `
                    <span onclick="loadRoute(${index})">${route.start.substring(0,6)} → ${route.end.substring(0,6)}</span>
                    <span class="delete-altar" onclick="deleteRoute(${index})">×</span>
                `;
                container.appendChild(btn);
            });
        }

        function loadRoute(index) {
            const route = savedRoutes[index];
            document.getElementById('start-location').value = route.start;
            document.getElementById('end-location').value = route.end;
        }

        function deleteRoute(index) {
            savedRoutes.splice(index, 1);
            localStorage.setItem('oracle_routes', JSON.stringify(savedRoutes));
            renderAltars();
        }

        function consultMaps() {
            const startVal = document.getElementById('start-location').value;
            const endVal = document.getElementById('end-location').value;
            
            if (!startVal || !endVal) { 
                alert("Both locations must be known to the Oracle."); 
                return; 
            }

            // Save the route if it's new
            const exists = savedRoutes.find(r => r.start === startVal && r.end === endVal);
            if (!exists) {
                savedRoutes.push({ start: startVal, end: endVal });
                localStorage.setItem('oracle_routes', JSON.stringify(savedRoutes));
                renderAltars();
            }

            const origin = encodeURIComponent(startVal);
            const destination = encodeURIComponent(endVal);
            const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=transit`;
            window.open(url, '_blank');
        }

        function calculateDeparture() {
            const startTimeStr = document.getElementById('start-time').value;
            const travelMins = parseInt(document.getElementById('travel-duration').value) || 0;
            const needsPrep = document.getElementById('prep-toggle').checked;

            if (!startTimeStr) { 
                alert("Please enter a start time."); 
                return; 
            }

            const [hours, mins] = startTimeStr.split(':');
            let date = new Date();
            date.setHours(parseInt(hours), parseInt(mins), 0);

            date.setMinutes(date.getMinutes() - travelMins);
            if (needsPrep) date.setMinutes(date.getMinutes() - 120);

            const finalH = date.getHours().toString().padStart(2, '0');
            const finalM = date.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('departure-time').innerText = `${finalH}:${finalM}`;
            document.getElementById('oracle-summary').innerText = `Transit: ${travelMins}m. ${needsPrep ? 'Ritual: 2h.' : ''}`;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
