<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Calendar Engine</title>
    <style>
        :root {
            --bg-color: #000000; /* Locked Pure Black Site Base */
            --container-bg: #16161a; /* Base solid color for calendar backing */
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #2d2d34;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --today-bg: rgba(99, 102, 241, 0.18);
            --modal-bg: rgba(30, 30, 36, 0.95);
            --dropdown-hover: #2d2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color) !important; /* Forces site background to remain plain black */
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
        }

        /* Fully Fluid Adaptive Container with Custom Background Mechanics */
        .calendar-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            background-color: var(--container-bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            transition: background-image 0.3s ease;
        }

        /* Semi-transparent overlay shields over the headers and grids to preserve visibility when text overlaps images */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
            background-color: rgba(26, 26, 32, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 10;
        }

        .title-dropdown-container {
            position: relative;
        }

        .current-month-year {
            font-size: 1.35rem;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .current-month-year:hover {
            background-color: var(--border-color);
        }

        .current-month-year::after {
            content: '▾';
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Picker Popup Menu Panel */
        .picker-menu {
            position: absolute;
            top: 110%;
            left: 0;
            background-color: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            padding: 16px;
            display: none;
            grid-template-columns: 120px 90px;
            gap: 12px;
            z-index: 500;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .picker-menu.active {
            display: grid;
        }

        .picker-column {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .picker-column::-webkit-scrollbar {
            width: 4px;
        }
        .picker-column::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .picker-item {
            padding: 6px 10px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.15s ease;
        }

        .picker-item:hover {
            background-color: var(--dropdown-hover);
        }

        .picker-item.selected {
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        button, .file-upload-label {
            background-color: #27272a;
            color: var(--text-color);
            border: 1px solid #3f3f46;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            height: 36px;
        }

        button:hover, .file-upload-label:hover {
            background-color: #3f3f46;
            border-color: #52525b;
        }

        button:active, .file-upload-label:active {
            transform: scale(0.98);
        }

        button.primary-btn {
            background-color: var(--accent-color);
            border-color: #4f46e5;
        }

        button.primary-btn:hover {
            background-color: var(--accent-hover);
        }

        .year-nav {
            font-weight: bold;
        }

        .bg-input-hidden {
            display: none;
        }

        /* Grid Architecture - Responsive Height Scaling with Alpha Blended Backdrops */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background-color: rgba(12, 12, 14, 0.4);
            width: 100%;
        }

        .weekday-label {
            text-align: center;
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 10px 0;
            background-color: rgba(17, 17, 21, 0.85);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 5;
        }

        .calendar-day {
            min-height: clamp(85px, 11vw, 140px);
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
            background-color: rgba(22, 22, 26, 0.75);
            overflow: hidden;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .calendar-grid .calendar-day:nth-child(7n) {
            border-right: none;
        }

        .day-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            align-self: flex-start;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 2;
        }

        .calendar-day.current-month .day-number {
            color: var(--text-color);
        }

        .calendar-day.today {
            background-color: rgba(99, 102, 241, 0.25);
            border: 1px solid var(--accent-color);
        }

        .calendar-day.today .day-number {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .calendar-day.adjacent-month {
            background-color: rgba(15, 15, 18, 0.85);
            opacity: 0.35;
        }

        /* Event Elements Layout */
        .events-wrapper {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow-y: auto;
            flex-grow: 1;
            padding: 2px;
            max-height: calc(100% - 24px);
            border-radius: 4px;
            z-index: 2;
        }

        .events-wrapper::-webkit-scrollbar {
            width: 3px;
        }
        .events-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .event-item {
            font-size: 0.72rem;
            padding: 3px 5px;
            border-radius: 4px;
            background-color: rgba(99, 102, 241, 0.3);
            color: #f1f5f9;
            border-left: 3px solid var(--accent-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            font-weight: 500;
            line-height: 1.2;
            transition: transform 0.1s ease;
        }

        .event-item:hover {
            transform: translateX(2px);
        }

        /* Custom Color Picker Input Form adjustments */
        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .color-swatch-input {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 40px !important;
            height: 36px !important;
            padding: 0 !important;
            border: none !important;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        .color-swatch-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-swatch-input::-webkit-color-swatch { border: 1px solid var(--border-color); border-radius: 6px; }

        /* Modal Sheet Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: var(--modal-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            width: 100%;
            max-width: 445px;
            padding: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background-color: #121214;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: 1px solid var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Push status sync button formatting styles */
        .cloud-sync-btn {
            background-color: #064e3b;
            color: #d1fae5;
            border: 1px solid #059669;
            font-weight: 600;
        }
        .cloud-sync-btn:hover {
            background-color: #047857;
        }

        /* Adaptivity Breakpoints */
        @media (max-width: 900px) {
            .calendar-container { max-width: 100%; }
            .current-month-year { font-size: 1.2rem; }
            button, .file-upload-label { padding: 4px 10px; font-size: 0.8rem; height: 34px; }
        }

        @media (max-width: 600px) {
            body { padding: 6px; }
            .calendar-header { padding: 12px; flex-direction: column; align-items: flex-start; gap: 10px; }
            .nav-buttons { width: 100%; justify-content: space-between; }
            button, .file-upload-label { flex-grow: 1; font-size: 0.78rem; padding: 4px 6px; }
            .weekday-label { font-size: 0.65rem; padding: 6px 0; }
            .calendar-day { min-height: 75px; padding: 3px; gap: 2px; }
            .day-number { font-size: 0.75rem; width: 18px; height: 18px; }
            .event-item { font-size: 0.65rem; padding: 2px 3px; border-left-width: 2px; }
            .modal-actions { justify-content: space-between; width: 100%; }
            .modal-actions button { flex-grow: 1; }
        }
    </style>
</head>
<body>

    <div class="calendar-container" id="calendarContainer">
        <div class="calendar-header">
            <div class="title-dropdown-container">
                <h2 class="current-month-year" id="monthYearDisplay">June 2026</h2>
                
                <div class="picker-menu" id="pickerMenu">
                    <div class="picker-column" id="monthPickerCol"></div>
                    <div class="picker-column" id="yearPickerCol"></div>
                </div>
            </div>

            <div class="nav-buttons">
                <label for="bgImageInput" class="file-upload-label" title="Upload Background to Calendar Box">🖼️ Box Bg</label>
                <input type="file" id="bgImageInput" class="bg-input-hidden" accept="image/*">

                <button id="prevYearBtn" class="year-nav" title="Previous Year">«</button>
                <button id="prevBtn" title="Previous Month">Prev</button>
                <button id="todayBtn">Today</button>
                <button id="nextBtn" title="Next Month">Next</button>
                <button id="nextYearBtn" class="year-nav" title="Next Year">»</button>
                <button id="syncBtn" class="primary-btn">Sync Google</button>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="modal-overlay" id="eventModal">
        <div class="modal-card">
            <h3 class="modal-title" id="modalTitle">Manage Item</h3>
            <input type="hidden" id="eventDate">
            <input type="hidden" id="eventId">
            <input type="hidden" id="eventSource">
            
            <div class="form-group" id="destinationSelectorGroup">
                <label for="eventDestination">Save Target Location</label>
                <select id="eventDestination">
                    <option value="google">Google Calendar (Cloud Event)</option>
                    <option value="google_task">Google Tasks (Cloud Task List)</option>
                    <option value="local">Local Private Memory (Offline)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="eventTitle">Title</label>
                <input type="text" id="eventTitle" placeholder="e.g., Show Setup Rehearsal">
            </div>
            
            <div class="form-group">
                <label for="eventDesc">Description (Optional)</label>
                <textarea id="eventDesc" rows="2" placeholder="Details..."></textarea>
            </div>

            <div class="form-group">
                <label for="eventColor">Highlight Custom Color</label>
                <div class="color-picker-group">
                    <input type="color" id="eventColor" class="color-swatch-input" value="#6366f1">
                    <span id="colorHexLabel" style="font-size: 0.85rem; color: var(--text-muted);">#6366f1</span>
                </div>
            </div>

            <div class="modal-actions">
                <button id="deleteEventBtn" style="background-color: #991b1b; color: #fef2f2; display: none; margin-right: auto;">Delete</button>
                <button id="modalCloudSyncBtn" class="cloud-sync-btn" style="display: none;">Sync to GC Now</button>
                <button id="closeModalBtn">Cancel</button>
                <button id="saveEventBtn" class="primary-btn">Save Local</button>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>

    <script>
        const CLIENT_ID = '742531361262-9a9u4aafopc14qa5jccste4j3htagvec.apps.googleusercontent.com'; 
        const API_KEY = 'AIzaSyDUp9V5jx0OeWp0mV5oLC7Gfu5m_qPK7AA';
        
        const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/tasks';
        const DISCOVERY_DOC_CALENDAR = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const DISCOVERY_DOC_TASKS = 'https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest';

        let tokenClient;
        let gapiInited = false;
        let gisiInited = false;
        let googleAccessToken = null;

        let currentDate = new Date();
        let events = JSON.parse(localStorage.getItem('local_calendar_events')) || {};
        let googleEvents = JSON.parse(localStorage.getItem('cached_google_events')) || {}; 

        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const months = [
            'January', 'February', 'March', 'April', 'May', 'June', 
            'July', 'August', 'September', 'October', 'November', 'December'
        ];
        
        const calendarContainer = document.getElementById('calendarContainer');
        const monthYearDisplay = document.getElementById('monthYearDisplay');
        const pickerMenu = document.getElementById('pickerMenu');
        const monthPickerCol = document.getElementById('monthPickerCol');
        const yearPickerCol = document.getElementById('yearPickerCol');
        const calendarGrid = document.getElementById('calendarGrid');
        const bgImageInput = document.getElementById('bgImageInput');
        
        const prevYearBtn = document.getElementById('prevYearBtn');
        const prevBtn = document.getElementById('prevBtn');
        const todayBtn = document.getElementById('todayBtn');
        const nextBtn = document.getElementById('nextBtn');
        const nextYearBtn = document.getElementById('nextYearBtn');
        const syncBtn = document.getElementById('syncBtn');
        
        const eventModal = document.getElementById('eventModal');
        const modalTitle = document.getElementById('modalTitle');
        const eventDateInput = document.getElementById('eventDate');
        const eventIdInput = document.getElementById('eventId');
        const eventSourceInput = document.getElementById('eventSource');
        const eventDestinationSelect = document.getElementById('eventDestination');
        const destinationSelectorGroup = document.getElementById('destinationSelectorGroup');
        const eventTitleInput = document.getElementById('eventTitle');
        const eventDescInput = document.getElementById('eventDesc');
        const eventColorInput = document.getElementById('eventColor');
        const colorHexLabel = document.getElementById('colorHexLabel');
        
        const saveEventBtn = document.getElementById('saveEventBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const deleteEventBtn = document.getElementById('deleteEventBtn');
        const modalCloudSyncBtn = document.getElementById('modalCloudSyncBtn');

        function initCalendar() {
            loadSavedBackground();
            renderGrid();
            setupEventListeners();
            verifyGoogleScriptsPresence();
        }

        function loadSavedBackground() {
            const storedBg = localStorage.getItem('calendar_container_custom_bg');
            if (storedBg) {
                calendarContainer.style.backgroundImage = `url('${storedBg}')`;
            }
        }

        function handleBackgroundUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const imgBase64 = event.target.result;
                localStorage.setItem('calendar_container_custom_bg', imgBase64);
                calendarContainer.style.backgroundImage = `url('${imgBase64}')`;
            };
            reader.readAsDataURL(file);
        }

        function verifyGoogleScriptsPresence() {
            let attemptCount = 0;
            const maxAttempts = 30;

            const scriptCheckInterval = setInterval(() => {
                attemptCount++;
                if (typeof gapi !== 'undefined' && typeof gapi.load === 'function' && typeof google !== 'undefined' && typeof google.accounts !== 'undefined') {
                    clearInterval(scriptCheckInterval);
                    gapiLoad();
                    gisLoad();
                } else if (attemptCount >= maxAttempts) {
                    clearInterval(scriptCheckInterval);
                    syncBtn.textContent = "Offline Mode";
                }
            }, 250);
        }

        function gapiLoad() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() {
            try {
                await gapi.client.init({ apiKey: API_KEY, clientId: CLIENT_ID });
                await gapi.client.load(DISCOVERY_DOC_CALENDAR);
                await gapi.client.load(DISCOVERY_DOC_TASKS);
                gapiInited = true;
                checkSyncButtonState();
            } catch(e) {
                syncBtn.textContent = "Config Error";
            }
        }
        
        function gisLoad() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (tokenResponse) => {
                        if (tokenResponse.error !== undefined) throw (tokenResponse);
                        googleAccessToken = tokenResponse.access_token;
                        syncBtn.textContent = "🔄 Fetching...";
                        fetchGoogleCalendarEvents();
                    },
                });
                gisiInited = true;
                checkSyncButtonState();
            } catch(e) {
                console.error(e);
            }
        }

        function checkSyncButtonState() {
            if (gapiInited && gisiInited) {
                syncBtn.textContent = "Sync Google";
            } else {
                syncBtn.textContent = "API Loading...";
            }
        }

        async function fetchGoogleCalendarEvents() {
            if (!gapiInited || !googleAccessToken) return;
            try {
                const startOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
                const endOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 0);

                googleEvents = {}; 
                const calendarListResponse = await gapi.client.calendar.calendarList.list();
                const calendarList = calendarListResponse.result.items || [];

                const targetCalendarIds = new Set(['primary']);
                calendarList.forEach(cal => {
                    if (!cal.id) return;
                    const nameLower = (cal.summary || '').toLowerCase();
                    if (!nameLower.includes('holiday') && !cal.id.includes('holiday@group.v.calendar.google.com')) {
                        targetCalendarIds.add(cal.id);
                    }
                });

                for (const calId of targetCalendarIds) {
                    try {
                        const response = await gapi.client.calendar.events.list({
                            calendarId: calId,
                            timeMin: startOfMonth.toISOString(),
                            timeMax: endOfMonth.toISOString(),
                            showDeleted: false,
                            singleEvents: true,
                            maxResults: 150,
                        });

                        (response.result.items || []).forEach(item => {
                            const startRaw = item.start.dateTime || item.start.date;
                            if (!startRaw) return;
                            const dateStr = startRaw.substring(0, 10);
                            if (!googleEvents[dateStr]) googleEvents[dateStr] = [];
                            
                            if (!googleEvents[dateStr].some(e => e.id === item.id)) {
                                googleEvents[dateStr].push({
                                    id: item.id,
                                    title: `⚡ ${item.summary || '(No Title)'}`,
                                    description: item.description || '',
                                    source: 'google',
                                    calendarId: calId,
                                    color: item.description && item.description.includes('__color:') ? item.description.split('__color:')[1].split('__')[0] : '#059669'
                                });
                            }
                        });
                    } catch (innerErr) {}
                }

                try {
                    const taskListsResponse = await gapi.client.tasks.tasklists.list({ maxResults: 5 });
                    for (const list of (taskListsResponse.result.items || [])) {
                        const tasksResponse = await gapi.client.tasks.tasks.list({
                            tasklist: list.id,
                            showCompleted: true,
                            dueMin: startOfMonth.toISOString(),
                            dueMax: endOfMonth.toISOString(),
                        });

                        (tasksResponse.result.items || []).forEach(task => {
                            if (!task.due) return;
                            const dateStr = task.due.substring(0, 10);
                            if (!googleEvents[dateStr]) googleEvents[dateStr] = [];

                            if (!googleEvents[dateStr].some(e => e.id === task.id)) {
                                googleEvents[dateStr].push({
                                    id: task.id,
                                    title: `📋 ${task.title || '(No Task Name)'}`,
                                    description: task.notes || '',
                                    source: 'google_task',
                                    taskListId: list.id,
                                    color: task.notes && task.notes.includes('__color:') ? task.notes.split('__color:')[1].split('__')[0] : '#d97706'
                                });
                            }
                        });
                    }
                } catch (taskErr) {}

                localStorage.setItem('cached_google_events', JSON.stringify(googleEvents));
                syncBtn.textContent = "Synced ✓";
                renderGrid();
            } catch (err) {
                syncBtn.textContent = "Sync Failed";
            }
        }

        function renderGrid() {
            calendarGrid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthYearDisplay.textContent = `${months[month]} ${year}`;

            weekdays.forEach(day => {
                const label = document.createElement('div');
                label.className = 'weekday-label';
                label.textContent = day;
                calendarGrid.appendChild(label);
            });

            const firstDayOfWeekIndex = new Date(year, month, 1).getDay();
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
            const totalDaysInPrevMonth = new Date(year, month, 0).getDate();
            
            for (let i = firstDayOfWeekIndex - 1; i >= 0; i--) {
                createDayBlock(new Date(year, month - 1, totalDaysInPrevMonth - i), false);
            }
            for (let d = 1; d <= totalDaysInMonth; d++) {
                createDayBlock(new Date(year, month, d), true);
            }
            const actualCellsToFill = (calendarGrid.children.length - 7) % 7 === 0 ? 0 : 7 - ((calendarGrid.children.length - 7) % 7);
            for (let i = 1; i <= actualCellsToFill; i++) {
                createDayBlock(new Date(year, month + 1, i), false);
            }
        }

        function createDayBlock(date, isCurrentMonth) {
            const dayBlock = document.createElement('div');
            dayBlock.className = `calendar-day ${isCurrentMonth ? 'current-month' : 'adjacent-month'}`;
            
            if (date.toDateString() === new Date().toDateString()) dayBlock.classList.add('today');

            const dayNumDisplay = document.createElement('div');
            dayNumDisplay.className = 'day-number';
            dayNumDisplay.textContent = date.getDate();
            dayBlock.appendChild(dayNumDisplay);

            const eventsWrapper = document.createElement('div');
            eventsWrapper.className = 'events-wrapper';
            dayBlock.appendChild(eventsWrapper);

            const dateKey = formatDateKey(date);
            if (events[dateKey]) events[dateKey].forEach(ev => appendEventItemElement(eventsWrapper, ev, dateKey));
            if (googleEvents[dateKey]) googleEvents[dateKey].forEach(ev => appendEventItemElement(eventsWrapper, ev, dateKey));

            dayBlock.addEventListener('click', () => openModal(dateKey));
            calendarGrid.appendChild(dayBlock);
        }

        function appendEventItemElement(parentContainer, ev, dateKey) {
            const evEl = document.createElement('div');
            evEl.className = 'event-item';
            evEl.textContent = ev.title;
            
            /* Apply dynamic custom highlight coloring parameters */
            const itemColor = ev.color || '#6366f1';
            evEl.style.borderLeftColor = itemColor;
            evEl.style.backgroundColor = convertHexToRgba(itemColor, 0.25);

            evEl.addEventListener('click', (e) => {
                e.stopPropagation();
                openModal(dateKey, ev);
            });
            parentContainer.appendChild(evEl);
        }

        function convertHexToRgba(hex, alpha) {
            let c;
            if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
                c= hex.substring(1).split('');
                if(c.length== 3){ c= [c[0], c[0], c[1], c[1], c[2], c[2]]; }
                c= '0x'+c.join('');
                return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+','+alpha+')';
            }
            return 'rgba(99,102,241,'+alpha+')';
        }

        function formatDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function buildPickerMenu() {
            monthPickerCol.innerHTML = ''; yearPickerCol.innerHTML = '';
            const currentMonthIdx = currentDate.getMonth();
            const currentYearValue = currentDate.getFullYear();

            months.forEach((mName, index) => {
                const mDiv = document.createElement('div');
                mDiv.className = `picker-item ${index === currentMonthIdx ? 'selected' : ''}`;
                mDiv.textContent = mName.substring(0, 3);
                mDiv.onclick = (e) => {
                    e.stopPropagation(); currentDate.setMonth(index); renderGrid();
                    pickerMenu.classList.remove('active'); if(googleAccessToken) fetchGoogleCalendarEvents(); 
                };
                monthPickerCol.appendChild(mDiv);
            });

            for (let y = currentYearValue - 10; y <= currentYearValue + 10; y++) {
                const yDiv = document.createElement('div');
                yDiv.className = `picker-item ${y === currentYearValue ? 'selected' : ''}`;
                yDiv.textContent = y;
                yDiv.onclick = (e) => {
                    e.stopPropagation(); currentDate.setFullYear(y); renderGrid();
                    pickerMenu.classList.remove('active'); if(googleAccessToken) fetchGoogleCalendarEvents(); 
                };
                yearPickerCol.appendChild(yDiv);
            }
        }

        function openModal(dateKey, eventObj = null) {
            eventDateInput.value = dateKey;
            eventModal.classList.add('active');
            modalCloudSyncBtn.textContent = "Sync to GC Now";

            if (eventObj) {
                modalTitle.textContent = eventObj.source.includes('google') ? "Edit Google Item" : "Edit Local Event";
                eventIdInput.value = eventObj.id;
                eventSourceInput.value = eventObj.source;
                eventTitleInput.value = eventObj.title.replace('⚡ ', '').replace('📋 ', '');
                
                // Strip color tags out from technical descriptions if present
                eventDescInput.value = eventObj.description ? eventObj.description.split('__color:')[0] : '';
                
                const customColor = eventObj.color || '#6366f1';
                eventColorInput.value = customColor;
                colorHexLabel.textContent = customColor;

                destinationSelectorGroup.style.display = 'none'; 
                saveEventBtn.textContent = "Save Changes";
                deleteEventBtn.style.display = 'block';
                modalCloudSyncBtn.style.display = googleAccessToken ? 'block' : 'none';
            } else {
                modalTitle.textContent = "Add New Item";
                eventIdInput.value = '';
                eventSourceInput.value = 'local';
                eventTitleInput.value = '';
                eventDescInput.value = '';
                
                eventColorInput.value = '#6366f1';
                colorHexLabel.textContent = '#6366f1';

                destinationSelectorGroup.style.display = googleAccessToken ? 'block' : 'none';
                eventDestinationSelect.value = googleAccessToken ? 'google' : 'local';
                
                saveEventBtn.textContent = "Save Local";
                deleteEventBtn.style.display = 'none';
                modalCloudSyncBtn.style.display = googleAccessToken ? 'block' : 'none';
            }
        }

        function closeModal() { eventModal.classList.remove('active'); }

        async function triggerImmediateCloudSync() {
            const dateKey = eventDateInput.value;
            const id = eventIdInput.value;
            const title = eventTitleInput.value.trim();
            const description = eventDescInput.value.trim();
            const source = eventSourceInput.value;
            const targetDestination = eventDestinationSelect.value;
            const selectedColor = eventColorInput.value;

            if (!title) { alert("Title is required before executing syncing routing."); return; }
            if (!googleAccessToken) { alert("Please complete Google authentication via main page header first."); return; }

            modalCloudSyncBtn.textContent = "Pushing...";

            const finalDescription = `${description} __color:${selectedColor}__`;

            if (source === 'google' || (id === '' && (targetDestination === 'google'))) {
                const resourceObj = {
                    summary: title,
                    description: finalDescription,
                    start: { date: dateKey },
                    end: { date: dateKey }
                };
                try {
                    if (id && source === 'google') {
                        let foundCalId = 'primary';
                        if (googleEvents[dateKey]) {
                            const match = googleEvents[dateKey].find(e => e.id === id);
                            if (match && match.calendarId) foundCalId = match.calendarId;
                        }
                        await gapi.client.calendar.events.update({ calendarId: foundCalId, eventId: id, resource: resourceObj });
                    } else {
                        await gapi.client.calendar.events.insert({ calendarId: 'primary', resource: resourceObj });
                    }
                    modalCloudSyncBtn.textContent = "Synced to Cloud ✓";
                    setTimeout(async () => { await fetchGoogleCalendarEvents(); closeModal(); }, 600);
                } catch (err) {
                    modalCloudSyncBtn.textContent = "Sync Failed";
                }
            } else if (source === 'google_task' || (id === '' && targetDestination === 'google_task')) {
                try {
                    const listsResponse = await gapi.client.tasks.tasklists.list({ maxResults: 1 });
                    const defaultListId = listsResponse.result.items[0].id;
                    const taskResource = { title: title, notes: finalDescription, due: new Date(dateKey).toISOString() };

                    if (id && source === 'google_task') {
                        let foundListId = defaultListId;
                        if (googleEvents[dateKey]) {
                            const match = googleEvents[dateKey].find(e => e.id === id);
                            if (match && match.taskListId) foundListId = match.taskListId;
                        }
                        await gapi.client.tasks.tasks.update({ tasklist: foundListId, task: id, resource: { id: id, ...taskResource } });
                    } else {
                        await gapi.client.tasks.tasks.insert({ tasklist: defaultListId, resource: taskResource });
                    }
                    modalCloudSyncBtn.textContent = "Synced to Cloud ✓";
                    setTimeout(async () => { await fetchGoogleCalendarEvents(); closeModal(); }, 600);
                } catch (taskErr) {
                    modalCloudSyncBtn.textContent = "Sync Failed";
                }
            } else {
                // If it was local, flip its metadata flag and route it straight into Google database pipelines
                eventSourceInput.value = 'google';
                eventDestinationSelect.value = 'google';
                await triggerImmediateCloudSync();
            }
        }

        function saveEvent() {
            const dateKey = eventDateInput.value;
            const id = eventIdInput.value;
            const title = eventTitleInput.value.trim();
            const description = eventDescInput.value.trim();
            const source = eventSourceInput.value;
            const selectedColor = eventColorInput.value;

            if (!title) return;

            if (source.includes('google')) {
                triggerImmediateCloudSync();
                return;
            }

            if (!events[dateKey]) events[dateKey] = [];

            if (id) {
                const idx = events[dateKey].findIndex(e => e.id === id);
                if (idx !== -1) events[dateKey][idx] = { ...events[dateKey][idx], title, description, color: selectedColor };
            } else {
                events[dateKey].push({ id: 'id_' + Date.now(), title, description, source: 'local', color: selectedColor });
            }

            localStorage.setItem('local_calendar_events', JSON.stringify(events));
            closeModal();
            renderGrid();
        }

        async function deleteEvent() {
            const dateKey = eventDateInput.value;
            const id = eventIdInput.value;
            const source = eventSourceInput.value;

            if (!confirm("Are you sure you want to completely delete this item?")) return;
            deleteEventBtn.textContent = "Deleting...";

            if (source === 'google') {
                let foundCalId = 'primary';
                if (googleEvents[dateKey]) {
                    const match = googleEvents[dateKey].find(e => e.id === id);
                    if (match && match.calendarId) foundCalId = match.calendarId;
                }
                try {
                    await gapi.client.calendar.events.delete({ calendarId: foundCalId, eventId: id });
                    await fetchGoogleCalendarEvents();
                } catch (err) {}
            } else if (source === 'google_task') {
                let foundListId = 'primary';
                if (googleEvents[dateKey]) {
                    const match = googleEvents[dateKey].find(e => e.id === id);
                    if (match && match.taskListId) foundListId = match.taskListId;
                }
                try {
                    await gapi.client.tasks.tasks.delete({ tasklist: foundListId, task: id });
                    await fetchGoogleCalendarEvents();
                } catch (err) {}
            } else {
                if (events[dateKey]) {
                    events[dateKey] = events[dateKey].filter(e => e.id !== id);
                    if (events[dateKey].length === 0) delete events[dateKey];
                }
                localStorage.setItem('local_calendar_events', JSON.stringify(events));
            }

            deleteEventBtn.textContent = "Delete";
            closeModal();
            renderGrid();
        }

        function setupEventListeners() {
            bgImageInput.addEventListener('change', handleBackgroundUpload);
            
            eventColorInput.addEventListener('input', (e) => {
                colorHexLabel.textContent = e.target.value;
            });

            monthYearDisplay.onclick = (e) => {
                e.stopPropagation(); buildPickerMenu(); pickerMenu.classList.toggle('active');
            };

            document.addEventListener('click', () => pickerMenu.classList.remove('active'));

            prevBtn.onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderGrid(); if(googleAccessToken) fetchGoogleCalendarEvents(); };
            nextBtn.onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderGrid(); if(googleAccessToken) fetchGoogleCalendarEvents(); };
            prevYearBtn.onclick = () => { currentDate.setFullYear(currentDate.getFullYear() - 1); renderGrid(); if(googleAccessToken) fetchGoogleCalendarEvents(); };
            nextYearBtn.onclick = () => { currentDate.setFullYear(currentDate.getFullYear() + 1); renderGrid(); if(googleAccessToken) fetchGoogleCalendarEvents(); };
            todayBtn.onclick = () => { currentDate = new Date(); renderGrid(); if(googleAccessToken) fetchGoogleCalendarEvents(); };
            
            closeModalBtn.onclick = closeModal;
            saveEventBtn.onclick = saveEvent;
            deleteEventBtn.onclick = deleteEvent;
            modalCloudSyncBtn.onclick = triggerImmediateCloudSync;

            syncBtn.onclick = () => {
                if (!gapiInited || !gisiInited) { alert("Initialization error. Check network state."); return; }
                if (googleAccessToken) { fetchGoogleCalendarEvents(); } else { tokenClient.requestAccessToken({ prompt: 'consent' }); }
            };
        }

        window.addEventListener('load', initCalendar);
    </script>
</body>
