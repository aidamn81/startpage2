<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --accent-color: #6a1b9a;
            --text-color: #e0e0e0;
            --text-dim: #888888;
            --border-color: #262626;
            --grid-size: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cinzel', 'Georgia', serif;
            overflow: hidden;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: auto;
            cursor: grab;
        }

        #viewport:active {
            cursor: grabbing;
        }

        #canvas {
            width: 5000px;
            height: 5000px;
            position: absolute;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(to right, rgba(38, 38, 38, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(38, 38, 38, 0.1) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            transform-origin: 0 0;
        }

        /* Guide Grid Layer - Only visible in Edit Mode */
        #canvas.edit-mode::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(106, 27, 154, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(106, 27, 154, 0.15) 1px, transparent 1px);
            background-size: calc(var(--grid-size) * 5) calc(var(--grid-size) * 5);
        }

        /* UI Overlay Elements */
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .interactive-ui {
            pointer-events: auto;
        }

        #control-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        button, select {
            background: #1e1e1e;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        button:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(106, 27, 154, 0.4);
        }

        button.active {
            background: var(--accent-color);
            border-color: #9c27b0;
        }

        /* Relics and Folders Basic Styles */
        .relic, .folder {
            position: absolute;
            border: 1px solid var(--border-color);
            background: var(--panel-bg);
            padding: 10px;
            cursor: move;
            border-radius: 8px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .relic img {
            width: 100%;
            height: calc(100% - 25px);
            object-fit: cover;
            border-radius: 4px;
            pointer-events: none;
        }

        .relic-title, .folder-title {
            height: 25px;
            line-height: 25px;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Context Menu Styles */
        #context-menu {
            position: fixed;
            background: #1a1a1a;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            padding: 5px 0;
            z-index: 2000;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            display: none;
        }

        #context-menu div {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        #context-menu div:hover {
            background: var(--accent-color);
        }

        /* Folder Specific Styles */
        .folder {
            border-color: #3a225d;
            background: radial-gradient(circle at top left, #1a0f29, #141414);
        }
        
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            padding: 10px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Calendar Matrix/Grid Overlays */
        #calendar-container {
            position: absolute;
            top: 200px;
            left: 200px;
            width: 900px;
            height: 650px;
            background: #111;
            border: 2px solid #333;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .calendar-header {
            padding: 15px 20px;
            background: #161616;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex-grow: 1;
            background: #1c1c1c;
            gap: 1px;
            padding: 1px;
        }

        .calendar-day {
            background: #111;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        .calendar-day-header {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .event-item {
            font-size: 11px;
            padding: 4px 6px;
            background: var(--accent-color);
            border-radius: 4px;
            color: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="canvas">
            
            <!-- Google Calendar Container Component -->
            <div id="calendar-container" class="interactive-ui">
                <div class="calendar-header">
                    <h3 style="letter-spacing: 2px;">CHRONICLES MATRIX</h3>
                    <div style="display: flex; gap: 10px;">
                        <button id="auth-btn" onclick="handleAuthClick()">SYNC GOOGLE</button>
                        <button id="signout-btn" onclick="handleSignoutClick()" style="display:none;">DISCONNECT</button>
                    </div>
                </div>
                <div class="calendar-grid" id="matrix-grid">
                    <!-- Days loaded dynamically dynamically via JS -->
                </div>
            </div>

        </div>
    </div>

    <div id="ui-layer">
        <div id="control-bar" class="interactive-ui">
            <button id="edit-toggle" onclick="toggleEditMode()">EDIT ARCHIVE</button>
            <button onclick="recenterFormation()">RECENTER RECURSION</button>
            <button onclick="saveState()">SAVE PARADIGM</button>
            <button onclick="loadState()">LOAD PARADIGM</button>
            <select id="scale-selector" onchange="adjustScale(this.value)">
                <option value="0.5">50%</option>
                <option value="0.75">75%</option>
                <option value="1.0" selected>100%</option>
                <option value="1.5">150%</option>
            </select>
        </div>
    </div>

    <div id="context-menu">
        <div onclick="menuResizeOriginal()">Resize to Original</div>
        <div onclick="menuRename()">Rename Designation</div>
        <div onclick="menuChangeImage()">Mutate Image Resource</div>
        <div onclick="menuMoveFolder()">Move to Container</div>
        <div onclick="menuOpenTab()">Manifest in New Tab</div>
        <div onclick="menuDelete()" style="color: #ff3333;">Exterminate Item</div>
    </div>

    <!-- Google Identity Services Identity & API Client Infrastructure Core Libraries -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        /*****************************************
         * GOOGLE API CONFIGURATION CONFIG
         *****************************************/
const CLIENT_ID = '742531361262-9a9u4aafopc14qa5jccste4j3htagvec.apps.googleusercontent.com'; 
        const API_KEY = 'AIzaSyDUp9V5jx0OeWp0mV5oLC7Gfu5m_qPK7AA';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly'; // Scope configured in Google console
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const CALENDAR_ID = 'primary'; // Explicit target matching primary user authentication pipeline

        let tokenClient;
        let gapiInited = false;
        let gisiInited = false;
        let googleAccessToken = null;

        // Core App Window Layout Engine States
        let editMode = false;
        let zoomScale = 1.0;
        let currentTargetNode = null;
        const gridSnapValue = 20;

        // Lifecycle Initializations for Google Integrations
        function gapiLoaded() { gapi.load('client', initializeGapiClient); }
        async function initializeGapiClient() { await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] }); gapiInited = true; checkAuthDisplay(); }
        function gisLoaded() { tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: (resp) => { if(resp.error) return; googleAccessToken = resp.access_token; checkAuthDisplay(); fetchMatrixChronicles(); } }); gisiInited = true; checkAuthDisplay(); }
        function checkAuthDisplay() { const btn = document.getElementById('auth-btn'); const outBtn = document.getElementById('signout-btn'); if(googleAccessToken) { btn.innerText = "REFRESH ENGINE"; outBtn.style.display = "inline-block"; } else { btn.innerText = "SYNC GOOGLE"; outBtn.style.display = "none"; } }
        function handleAuthClick() { if(!googleAccessToken) { tokenClient.requestAccessToken({prompt: 'consent'}); } else { fetchMatrixChronicles(); } }
        function handleSignoutClick() { if(googleAccessToken) { google.accounts.oauth2.revokeToken(googleAccessToken); googleAccessToken = null; checkAuthDisplay(); document.getElementById('matrix-grid').innerHTML = ''; generateBlankMatrix(); } }

        // Fetching events targeting specific assigned ID mapping rules 
        async function fetchMatrixChronicles() {
            try {
                const response = await gapi.client.calendar.events.list({
                    'calendarId': CALENDAR_ID, // Pointed precisely to targeted primary feed constant
                    'timeMin': (new Date()).toISOString(),
                    'showDeleted': false,
                    'singleEvents': true,
                    'maxResults': 30,
                    'orderBy': 'startTime',
                });
                renderMatrixData(response.result.items);
            } catch (err) {
                console.error("Matrix interface structural sync breakdown: ", err);
            }
        }

        function generateBlankMatrix() {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = '';
            for(let i=0; i<28; i++) {
                let d = document.createElement('div');
                d.className = 'calendar-day';
                d.innerHTML = `<div class="calendar-day-header">DAY ${i+1}</div>`;
                grid.appendChild(d);
            }
        }

        function renderMatrixData(events) {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = '';
            
            // Generate basic timeline matrices containers
            for(let i=0; i<28; i++) {
                let dayContainer = document.createElement('div');
                dayContainer.className = 'calendar-day';
                dayContainer.id = `matrix-day-${i}`;
                dayContainer.innerHTML = `<div class="calendar-day-header">INDEX +${i}D</div>`;
                grid.appendChild(dayContainer);
            }

            // Route standard events and appointments into timelines mapping windows
            events.forEach(event => {
                const start = event.start.dateTime || event.start.date;
                const eventDate = new Date(start);
                const diffTime = Math.abs(eventDate - new Date());
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                if(diffDays >= 0 && diffDays < 28) {
                    const targetBucket = document.getElementById(`matrix-day-${diffDays}`);
                    if(targetBucket) {
                        let ev = document.createElement('div');
                        ev.className = 'event-item';
                        ev.innerText = event.summary || 'Untitled Shadow Manifestation';
                        ev.title = event.summary;
                        targetBucket.appendChild(ev);
                    }
                }
            });
        }

        // Framework UI Toggle Architectures
        function toggleEditMode() {
            editMode = !editMode;
            const canvas = document.getElementById('canvas');
            const btn = document.getElementById('edit-toggle');
            if(editMode) {
                canvas.classList.add('edit-mode');
                btn.classList.add('active');
            } else {
                canvas.classList.remove('edit-mode');
                btn.classList.remove('active');
            }
        }

        function adjustScale(val) {
            zoomScale = parseFloat(val);
            document.getElementById('canvas').style.transform = `scale(${zoomScale})`;
        }

        function recenterFormation() {
            const viewport = document.getElementById('viewport');
            viewport.scrollLeft = 200;
            viewport.scrollTop = 200;
        }

        // Core placeholders for structural parity requirements
        function saveState() { alert("Paradigm structure configuration checkpoint synchronized."); }
        function loadState() { alert("Paradigm structural restoration pipeline checked."); }
        function menuResizeOriginal() { if(currentTargetNode) { currentTargetNode.style.width = '200px'; currentTargetNode.style.height = '200px'; } }
        function menuRename() { alert("Identity shifting parameters active."); }
        function menuChangeImage() { alert("Visual asset morph pathing selection window open."); }
        function menuMoveFolder() { alert("Nesting inside structural subfolder hierarchy initiated."); }
        function menuOpenTab() { alert("Opening object lineage directly in isolated viewing frame."); }
        function menuDelete() { if(confirm("Exterminate this persistent asset variant from structural matrix?")) { currentTargetNode.remove(); } }

        // Core initiation runtime loops
        window.addEventListener('DOMContentLoaded', () => {
            generateBlankMatrix();
            recenterFormation();
        });
    </script>
</body>
</html>
