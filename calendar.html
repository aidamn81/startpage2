<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Calendar Engine</title>
    <style>
        :root {
            --bg-color: #121214;
            --container-bg: #1a1a1e;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #2d2d34;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --today-bg: rgba(99, 102, 241, 0.15);
            --modal-bg: #222227;
            --dropdown-hover: #2d2d34;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calendar-container {
            width: 100%;
            max-width: 950px;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* Header Navigation */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 16px;
        }

        /* Interactive Title Dropdown Container */
        .title-dropdown-container {
            position: relative;
        }

        .current-month-year {
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .current-month-year:hover {
            background-color: var(--border-color);
        }

        .current-month-year::after {
            content: '▾';
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* Picker Popup Menu Panel */
        .picker-menu {
            position: absolute;
            top: 110%;
            left: 0;
            background-color: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 16px;
            display: none;
            grid-template-columns: 120px 90px;
            gap: 12px;
            z-index: 500;
        }

        .picker-menu.active {
            display: grid;
        }

        .picker-column {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Custom Scrollbar styling for Picker columns */
        .picker-column::-webkit-scrollbar {
            width: 4px;
        }
        .picker-column::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .picker-item {
            padding: 6px 10px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.15s ease;
        }

        .picker-item:hover {
            background-color: var(--dropdown-hover);
        }

        .picker-item.selected {
            background-color: var(--accent-color);
            color: white;
            font-weight: 600;
        }

        .nav-buttons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        button {
            background-color: var(--border-color);
            color: var(--text-color);
            border: none;
            padding: 8px 14px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: #3f3f46;
        }

        button.primary-btn {
            background-color: var(--accent-color);
        }

        button.primary-btn:hover {
            background-color: var(--accent-hover);
        }

        .year-nav {
            font-weight: bold;
            letter-spacing: -1px;
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Calendar Grid Architecture */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .weekday-label {
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding: 12px 0;
            background-color: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-day {
            min-height: 110px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            position: relative;
        }

        .calendar-grid .calendar-day:nth-child(7n) {
            border-right: none;
        }

        .day-number {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            align-self: flex-start;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .calendar-day.current-month .day-number {
            color: var(--text-color);
        }

        .calendar-day.today {
            background-color: var(--today-bg);
        }

        .calendar-day.today .day-number {
            background-color: var(--accent-color);
            color: #ffffff;
        }

        .calendar-day.adjacent-month {
            opacity: 0.35;
        }

        /* Event Elements */
        .events-wrapper {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 80px;
        }

        .event-item {
            font-size: 0.75rem;
            padding: 3px 6px;
            border-radius: 4px;
            background-color: #312e81;
            color: #e0e7ff;
            border-left: 3px solid var(--accent-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .event-item.google-sync {
            background-color: #064e3b;
            color: #d1fae5;
            border-left-color: #10b981;
        }

        /* Modal Sheet Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: 1px solid var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="calendar-container">
        <div class="calendar-header">
            <div class="title-dropdown-container">
                <h2 class="current-month-year" id="monthYearDisplay">June 2026</h2>
                
                <div class="picker-menu" id="pickerMenu">
                    <div class="picker-column" id="monthPickerCol"></div>
                    <div class="picker-column" id="yearPickerCol"></div>
                </div>
            </div>

            <div class="nav-buttons">
                <button id="prevYearBtn" class="year-nav" title="Previous Year">«</button>
                <button id="prevBtn" title="Previous Month">Prev</button>
                <button id="todayBtn">Today</button>
                <button id="nextBtn" title="Next Month">Next</button>
                <button id="nextYearBtn" class="year-nav" title="Next Year">»</button>
                <button id="syncBtn" class="primary-btn" style="margin-left: 8px;">Sync Google</button>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            </div>
    </div>

    <div class="modal-overlay" id="eventModal">
        <div class="modal-card">
            <h3 class="modal-title" id="modalTitle">Manage Event</h3>
            <input type="hidden" id="eventDate">
            <input type="hidden" id="eventId">
            
            <div class="form-group">
                <label for="eventTitle">Title</label>
                <input type="text" id="eventTitle" placeholder="e.g., Performance Rehearsal">
            </div>
            
            <div class="form-group">
                <label for="eventDesc">Description (Optional)</label>
                <textarea id="eventDesc" rows="3" placeholder="Details..."></textarea>
            </div>

            <div class="modal-actions">
                <button id="deleteEventBtn" style="background-color: #991b1b; color: #fef2f2; display: none; margin-right: auto;">Delete</button>
                <button id="closeModalBtn">Cancel</button>
                <button id="saveEventBtn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Calendar Core State
        let currentDate = new Date();
        let events = JSON.parse(localStorage.getItem('local_calendar_events')) || {};

        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const months = [
            'January', 'February', 'March', 'April', 'May', 'June', 
            'July', 'August', 'September', 'October', 'November', 'December'
        ];
        
        // DOM Elements
        const monthYearDisplay = document.getElementById('monthYearDisplay');
        const pickerMenu = document.getElementById('pickerMenu');
        const monthPickerCol = document.getElementById('monthPickerCol');
        const yearPickerCol = document.getElementById('yearPickerCol');
        const calendarGrid = document.getElementById('calendarGrid');
        
        // Control Buttons
        const prevYearBtn = document.getElementById('prevYearBtn');
        const prevBtn = document.getElementById('prevBtn');
        const todayBtn = document.getElementById('todayBtn');
        const nextBtn = document.getElementById('nextBtn');
        const nextYearBtn = document.getElementById('nextYearBtn');
        const syncBtn = document.getElementById('syncBtn');
        
        // Modal Elements
        const eventModal = document.getElementById('eventModal');
        const modalTitle = document.getElementById('modalTitle');
        const eventDateInput = document.getElementById('eventDate');
        const eventIdInput = document.getElementById('eventId');
        const eventTitleInput = document.getElementById('eventTitle');
        const eventDescInput = document.getElementById('eventDesc');
        const saveEventBtn = document.getElementById('saveEventBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const deleteEventBtn = document.getElementById('deleteEventBtn');

        // Render Engine Execution
        function initCalendar() {
            renderGrid();
            setupEventListeners();
        }

        function renderGrid() {
            calendarGrid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // 1. Set Month/Year Title text dynamically
            monthYearDisplay.textContent = `${months[month]} ${year}`;

            // 2. Render Day Labels
            weekdays.forEach(day => {
                const label = document.createElement('div');
                label.className = 'weekday-label';
                label.textContent = day;
                calendarGrid.appendChild(label);
            });

            // 3. Time Frame Calculations (Crucial step: setting date index to 1 avoids shifting artifacts)
            const firstDayOfWeekIndex = new Date(year, month, 1).getDay();
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();
            const totalDaysInPrevMonth = new Date(year, month, 0).getDate();
            
            // 4. Fill Previous Month's Trailing Grid Blocks
            for (let i = firstDayOfWeekIndex - 1; i >= 0; i--) {
                const prevDate = new Date(year, month - 1, totalDaysInPrevMonth - i);
                createDayBlock(prevDate, false);
            }

            // 5. Fill Current Month Grid Blocks
            for (let d = 1; d <= totalDaysInMonth; d++) {
                const dayDate = new Date(year, month, d);
                createDayBlock(dayDate, true);
            }

            // 6. Fill Next Month's Leading Grid Blocks to maintain structural symmetry
            const actualCellsToFill = (calendarGrid.children.length - 7) % 7 === 0 ? 0 : 7 - ((calendarGrid.children.length - 7) % 7);
            
            for (let i = 1; i <= actualCellsToFill; i++) {
                const nextDate = new Date(year, month + 1, i);
                createDayBlock(nextDate, false);
            }
        }

        function createDayBlock(date, isCurrentMonth) {
            const dayBlock = document.createElement('div');
            dayBlock.className = 'calendar-day';
            
            if (!isCurrentMonth) {
                dayBlock.classList.add('adjacent-month');
            } else {
                dayBlock.classList.add('current-month');
            }

            const today = new Date();
            if (date.toDateString() === today.toDateString()) {
                dayBlock.classList.add('today');
            }

            const dayNumDisplay = document.createElement('div');
            dayNumDisplay.className = 'day-number';
            dayNumDisplay.textContent = date.getDate();
            dayBlock.appendChild(dayNumDisplay);

            const eventsWrapper = document.createElement('div');
            eventsWrapper.className = 'events-wrapper';
            dayBlock.appendChild(eventsWrapper);

            const dateKey = formatDateKey(date);
            if (events[dateKey]) {
                events[dateKey].forEach(ev => {
                    const evEl = document.createElement('div');
                    evEl.className = `event-item ${ev.source === 'google' ? 'google-sync' : ''}`;
                    evEl.textContent = ev.title;
                    evEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(dateKey, ev);
                    });
                    eventsWrapper.appendChild(evEl);
                });
            }

            dayBlock.addEventListener('click', () => {
                openModal(dateKey);
            });

            calendarGrid.appendChild(dayBlock);
        }

        function formatDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Dropdown Panel Menu Generation
        function buildPickerMenu() {
            monthPickerCol.innerHTML = '';
            yearPickerCol.innerHTML = '';

            const currentMonthIdx = currentDate.getMonth();
            const currentYearValue = currentDate.getFullYear();

            // Populate Months Column
            months.forEach((mName, index) => {
                const mDiv = document.createElement('div');
                mDiv.className = `picker-item ${index === currentMonthIdx ? 'selected' : ''}`;
                mDiv.textContent = mName.substring(0, 3);
                mDiv.onclick = (e) => {
                    e.stopPropagation();
                    // Keep existing day selection safe by setting target parameters systematically
                    currentDate.setMonth(index);
                    renderGrid();
                    pickerMenu.classList.remove('active');
                };
                monthPickerCol.appendChild(mDiv);
            });

            // Populate Years Column dynamically (-10 years to +10 years range)
            for (let y = currentYearValue - 10; y <= currentYearValue + 10; y++) {
                const yDiv = document.createElement('div');
                yDiv.className = `picker-item ${y === currentYearValue ? 'selected' : ''}`;
                yDiv.textContent = y;
                yDiv.onclick = (e) => {
                    e.stopPropagation();
                    currentDate.setFullYear(y);
                    renderGrid();
                    pickerMenu.classList.remove('active');
                };
                yearPickerCol.appendChild(yDiv);
            }
        }

        // Modal Management
        function openModal(dateKey, eventObj = null) {
            eventDateInput.value = dateKey;
            eventModal.classList.add('active');

            if (eventObj) {
                modalTitle.textContent = "Edit Event";
                eventIdInput.value = eventObj.id;
                eventTitleInput.value = eventObj.title;
                eventDescInput.value = eventObj.description || '';
                deleteEventBtn.style.display = 'block';
            } else {
                modalTitle.textContent = "Add Event";
                eventIdInput.value = '';
                eventTitleInput.value = '';
                eventDescInput.value = '';
                deleteEventBtn.style.display = 'none';
            }
        }

        function closeModal() {
            eventModal.classList.remove('active');
        }

        function saveEvent() {
            const dateKey = eventDateInput.value;
            const id = eventIdInput.value || 'id_' + Date.now();
            const title = eventTitleInput.value.trim();
            const description = eventDescInput.value.trim();

            if (!title) return;

            if (!events[dateKey]) {
                events[dateKey] = [];
            }

            if (eventIdInput.value) {
                const idx = events[dateKey].findIndex(e => e.id === id);
                if (idx !== -1) {
                    events[dateKey][idx] = { ...events[dateKey][idx], title, description };
                }
            } else {
                events[dateKey].push({ id, title, description, source: 'local' });
            }

            persistAndRefresh();
        }

        function deleteEvent() {
            const dateKey = eventDateInput.value;
            const id = eventIdInput.value;

            if (events[dateKey]) {
                events[dateKey] = events[dateKey].filter(e => e.id !== id);
                if (events[dateKey].length === 0) delete events[dateKey];
            }

            persistAndRefresh();
        }

        function persistAndRefresh() {
            localStorage.setItem('local_calendar_events', JSON.stringify(events));
            closeModal();
            renderGrid();
        }

        // Hooking up Navigation & Selection Interactions
        function setupEventListeners() {
            // Title Header Toggle Click
            monthYearDisplay.onclick = (e) => {
                e.stopPropagation();
                buildPickerMenu();
                pickerMenu.classList.toggle('active');
            };

            // Close dynamic picker if clicking anywhere else outside of it
            document.addEventListener('click', () => {
                pickerMenu.classList.remove('active');
            });

            // Month Increments
            prevBtn.onclick = () => { 
                currentDate.setMonth(currentDate.getMonth() - 1); 
                renderGrid(); 
            };
            nextBtn.onclick = () => { 
                currentDate.setMonth(currentDate.getMonth() + 1); 
                renderGrid(); 
            };
            
            // Year Increments
            prevYearBtn.onclick = () => { 
                currentDate.setFullYear(currentDate.getFullYear() - 1); 
                renderGrid(); 
            };
            nextYearBtn.onclick = () => { 
                currentDate.setFullYear(currentDate.getFullYear() + 1); 
                renderGrid(); 
            };
            
            todayBtn.onclick = () => { 
                currentDate = new Date(); 
                renderGrid(); 
            };
            
            closeModalBtn.onclick = closeModal;
            saveEventBtn.onclick = saveEvent;
            deleteEventBtn.onclick = deleteEvent;

            syncBtn.onclick = () => {
                mockGoogleSyncFetch();
            };
        }

        function mockGoogleSyncFetch() {
            alert("This will hook into the Google Calendar API stream. Placing an event on your view now!");
            
            const targetDate = formatDateKey(currentDate);
            if (!events[targetDate]) events[targetDate] = [];
            
            events[targetDate].push({
                id: 'g_mock_' + Date.now(),
                title: '⚡ Sync: Google Event',
                description: 'Fetched directly from primary calendar.',
                source: 'google'
            });

            persistAndRefresh();
        }

        // Run Engine
        initCalendar();
    </script>
</body>
</html>
