<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Gothic Archive (Formation & Snap-to-Grid)</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --border-color: #3a0007;
            --accent-color: #8b0000;
            --text-color: #e0d0cc;
            --font-family: 'Cinzel', 'Georgia', serif;
            --grid-size: 40px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
        }

        /* Infinite Canvas Wrapper */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #infinite-canvas {
            position: absolute;
            width: 5000px;
            height: 5000px;
            top: -2000px;
            left: -2000px;
            background-color: #090909;
            transform-origin: 0 0;
            transition: transform 0.1s ease-out;
        }

        /* Subtle Guide Grid (Only active in Edit Mode) */
        .edit-mode #infinite-canvas {
            background-size: var(--grid-size) var(--grid-size);
            background-image: 
                linear-gradient(to right, rgba(58, 0, 7, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(58, 0, 7, 0.15) 1px, transparent 1px);
        }

        /* Formatting / Control Bar */
        #control-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn {
            background: #1a0003;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-family);
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn:hover, .btn.active {
            background: var(--accent-color);
            border-color: #ff0015;
            box-shadow: 0 0 8px rgba(139, 0, 0, 0.6);
        }

        /* Scale Indicator */
        #scale-display {
            font-size: 0.85rem;
            min-width: 50px;
            text-align: center;
            color: #888;
        }

        /* Draggable Items (Relics & Folders) */
        .archive-item {
            position: absolute;
            min-width: 100px;
            min-height: 100px;
            background: rgba(15, 5, 5, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
            touch-action: none;
        }

        .archive-item img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            pointer-events: none;
            margin-bottom: 8px;
        }

        .item-title {
            font-size: 0.8rem;
            text-align: center;
            word-break: break-word;
            max-width: 100%;
        }

        /* Content inside boundaries constraint style */
        .archive-item * {
            max-width: 100%;
            overflow: hidden;
        }

        /* Context Menu / Pop-up Menu (Scrollable Fix) */
        .popup-menu {
            position: absolute;
            background: rgba(10, 2, 3, 0.95);
            border: 1px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.95);
            border-radius: 6px;
            z-index: 2000;
            display: none;
            width: 220px;
            max-height: 280px; /* Constraints for scrolling */
            overflow-y: auto;  /* Makes the context menu scrollable */
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) #120204;
        }

        /* Custom scrollbar styling for webkit */
        .popup-menu::-webkit-scrollbar {
            width: 5px;
        }
        .popup-menu::-webkit-scrollbar-track {
            background: #120204;
        }
        .popup-menu::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 3px;
        }

        .menu-item {
            padding: 10px 15px;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(58, 0, 7, 0.4);
            transition: background 0.2s;
            text-align: left;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: var(--accent-color);
            color: #fff;
        }

        /* Folder Overlay View */
        #folder-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.95);
            z-index: 3000;
            display: none;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
        }

        #folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        #folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 25px;
        }

        .nested-note {
            background: #140507;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .delete-nested-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #3a0007;
            color: #ff8888;
            border: none;
            border-radius: 3px;
            width: 20px;
            height: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Formatting Control Bar -->
    <div id="control-bar">
        <button id="toggle-edit" class="btn">Edit Mode: OFF</button>
        <button id="btn-recenter" class="btn">Recenter Formation</button>
        <button id="btn-save" class="btn">Save State</button>
        <button id="btn-load" class="btn">Load State</button>
        <div id="scale-display">100%</div>
    </div>

    <!-- Canvas Container for Zoom/Pan -->
    <div id="canvas-container">
        <div id="infinite-canvas">
            <!-- Dynamic elements spawn here -->
        </div>
    </div>

    <!-- Unified Context Pop-up Menu (Fully Preserved & Now Scrollable) -->
    <div id="context-menu" class="popup-menu">
        <div class="menu-item" id="opt-resize-finger">Resize by Finger</div>
        <div class="menu-item" id="opt-snap-shape">Snap to Original Shape</div>
        <div class="menu-item" id="opt-change-image">Change Image</div>
        <div class="menu-item" id="opt-rename">Rename</div>
        <div class="menu-item" id="opt-open-tab">Open in New Tab</div>
        <div class="menu-item" id="opt-move-folder">Move to Folder</div>
        <div class="menu-item" id="opt-delete">Delete</div>
    </div>

    <!-- Folder Contents Overlay -->
    <div id="folder-overlay">
        <div id="folder-header">
            <h2 id="folder-view-title">Folder Contents</h2>
            <button id="close-folder-btn" class="btn">Close Archive</button>
        </div>
        <div id="folder-grid"></div>
    </div>

    <script>
        // State Properties
        const state = {
            scale: 1,
            panX: window.innerWidth / 2 - 2500,
            panY: window.innerHeight / 2 - 2000,
            isPanning: false,
            startX: 0,
            startY: 0,
            isEditMode: false,
            selectedItem: null,
            gridSize: 40,
            items: [
                { id: '1', type: 'relic', title: 'Gothic Manor Specimen', x: 2400, y: 2300, width: 140, height: 160, img: 'https://via.placeholder.com/60/3a0007/e0d0cc?text=Relic' },
                { id: '2', type: 'folder', title: 'Shadow Chronicles', x: 2600, y: 2300, width: 140, height: 140, img: 'https://via.placeholder.com/60/1a0003/e0d0cc?text=Folder', notes: [{ id: 'n1', title: 'Chapter 1: The Ritual' }, { id: 'n2', title: 'Alchemical Equations' }] }
            ]
        };

        const container = document.getElementById('canvas-container');
        const canvas = document.getElementById('infinite-canvas');
        const controlBar = document.getElementById('control-bar');
        const toggleEditBtn = document.getElementById('toggle-edit');
        const scaleDisplay = document.getElementById('scale-display');
        const contextMenu = document.getElementById('context-menu');

        // Initial Layout Render
        function init() {
            renderItems();
            updateTransform();
            setupCanvasPan();
            setupGlobalEvents();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            scaleDisplay.textContent = `${Math.round(state.scale * 100)}%`;
        }

        // Render Canvas Items
        function renderItems() {
            // Preserve elements currently rendered
            const existingNodes = canvas.querySelectorAll('.archive-item');
            existingNodes.forEach(n => n.remove());

            state.items.forEach(item => {
                const el = document.createElement('div');
                el.className = `archive-item ${item.type}`;
                el.id = `item-${item.id}`;
                el.style.left = `${item.x}px`;
                el.style.top = `${item.y}px`;
                el.style.width = `${item.width}px`;
                el.style.height = `${item.height}px`;

                const img = document.createElement('img');
                img.src = item.img;
                
                const title = document.createElement('div');
                title.className = 'item-title';
                title.textContent = item.title;

                el.appendChild(img);
                el.appendChild(title);
                canvas.appendChild(el);

                setupItemInteraction(el, item);
            });
        }

        // Infinite Drag & Pan & Zoom Setup
        function setupCanvasPan() {
            container.addEventListener('pointerdown', (e) => {
                if (e.target !== container && e.target !== canvas) return;
                state.isPanning = true;
                state.startX = e.clientX - state.panX;
                state.startY = e.clientY - state.panY;
                container.setPointerCapture(e.pointerId);
            });

            container.addEventListener('pointermove', (e) => {
                if (!state.isPanning) return;
                state.panX = e.clientX - state.startX;
                state.panY = e.clientY - state.startY;
                updateTransform();
            });

            container.addEventListener('pointerup', (e) => {
                if (!state.isPanning) return;
                state.isPanning = false;
                container.releasePointerCapture(e.pointerId);
            });

            // Standard Matrix Zoom Tracking
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 1.1;
                const mouseX = e.clientX - container.offsetLeft;
                const mouseY = e.clientY - container.offsetTop;

                const canvasMouseX = (mouseX - state.panX) / state.scale;
                const canvasMouseY = (mouseY - state.panY) / state.scale;

                if (e.deltaY < 0) {
                    state.scale = Math.min(state.scale * zoomFactor, 3);
                } else {
                    state.scale = Math.max(state.scale / zoomFactor, 0.3);
                }

                state.panX = mouseX - canvasMouseX * state.scale;
                state.panY = mouseY - canvasMouseY * state.scale;
                updateTransform();
            }, { passive: false });
        }

        // Draggable Mechanics with Grid Snapping (Soft Snap execution)
        let dragItem = null;
        let dragStartX, dragStartY, itemStartX, itemStartY;

        function setupItemInteraction(el, itemData) {
            el.addEventListener('pointerdown', (e) => {
                if (!state.isEditMode) {
                    // Non-edit mode interaction: open folder or open in new tab variant
                    if (itemData.type === 'folder') {
                        openFolderOverlay(itemData);
                    }
                    return;
                }
                e.stopPropagation();
                dragItem = itemData;
                const node = document.getElementById(`item-${itemData.id}`);
                
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                itemStartX = itemData.x;
                itemStartY = itemData.y;
                
                node.setPointerCapture(e.pointerId);
            });

            el.addEventListener('pointermove', (e) => {
                if (!dragItem || dragItem.id !== itemData.id) return;
                e.stopPropagation();

                const dx = (e.clientX - dragStartX) / state.scale;
                const dy = (e.clientY - dragStartY) / state.scale;

                let targetX = itemStartX + dx;
                let targetY = itemStartY + dy;

                // Soft Snap implementation during Drag Mode
                targetX = Math.round(targetX / state.gridSize) * state.gridSize;
                targetY = Math.round(targetY / state.gridSize) * state.gridSize;

                itemData.x = targetX;
                itemData.y = targetY;

                const node = document.getElementById(`item-${itemData.id}`);
                node.style.left = `${targetX}px`;
                node.style.top = `${targetY}px`;
            });

            el.addEventListener('pointerup', (e) => {
                if (!dragItem || dragItem.id !== itemData.id) return;
                e.stopPropagation();
                const node = document.getElementById(`item-${itemData.id}`);
                node.releasePointerCapture(e.pointerId);
                dragItem = null;
            });

            // Long Press / Right Click Unified Context Handling
            let pressTimer;
            el.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => triggerContextMenu(e.touches[0], itemData), 600);
            });
            el.addEventListener('touchend', () => clearTimeout(pressTimer));
            
            el.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                triggerContextMenu(e, itemData);
            });
        }

        // Unified Pop-Up Menu Handler (Scrollable configuration context matching)
        function triggerContextMenu(eventCoordinates, itemData) {
            state.selectedItem = itemData;
            contextMenu.style.display = 'block';
            
            // Layout styling configuration positioning near selection
            let posX = eventCoordinates.clientX;
            let posY = eventCoordinates.clientY;

            // Ensure constraints within viewport
            if (posX + 220 > window.innerWidth) posX -= 220;
            if (posY + 280 > window.innerHeight) posY -= 280;

            contextMenu.style.left = `${posX}px`;
            contextMenu.style.top = `${posY}px`;
        }

        // Global Automation Hooks
        function setupGlobalEvents() {
            // Close context menu on external click
            document.addEventListener('pointerdown', (e) => {
                if (!contextMenu.contains(e.target)) {
                    contextMenu.style.display = 'none';
                }
            });

            // Edit Mode Toggler
            toggleEditBtn.addEventListener('click', () => {
                state.isEditMode = !state.isEditMode;
                document.body.classList.toggle('edit-mode', state.isEditMode);
                toggleEditBtn.textContent = `Edit Mode: ${state.isEditMode ? 'ON' : 'OFF'}`;
                toggleEditBtn.classList.toggle('active', state.isEditMode);
            });

            // Formation Style Recentering Event
            document.getElementById('btn-recenter').addEventListener('click', () => {
                state.scale = 1;
                state.panX = window.innerWidth / 2 - 2500;
                state.panY = window.innerHeight / 2 - 2000;
                updateTransform();
            });

            // Context Options Functionality Execution Mapping
            document.getElementById('opt-resize-finger').addEventListener('click', () => {
                if (!state.selectedItem) return;
                const newWidth = prompt("Enter targeted display width (px):", state.selectedItem.width);
                const newHeight = prompt("Enter targeted display height (px):", state.selectedItem.height);
                if (newWidth && newHeight) {
                    state.selectedItem.width = parseInt(newWidth);
                    state.selectedItem.height = parseInt(newHeight);
                    renderItems();
                }
                contextMenu.style.display = 'none';
            });

            document.getElementById('opt-snap-shape').addEventListener('click', () => {
                if (!state.selectedItem) return;
                state.selectedItem.width = 140;
                state.selectedItem.height = state.selectedItem.type === 'relic' ? 160 : 140;
                renderItems();
                contextMenu.style.display = 'none';
            });

            document.getElementById('opt-change-image').addEventListener('click', () => {
                if (!state.selectedItem) return;
                const newImg = prompt("Enter asset URL link:", state.selectedItem.img);
                if (newImg) {
                    state.selectedItem.img = newImg;
                    renderItems();
                }
                contextMenu.style.display = 'none';
            });

            document.getElementById('opt-rename').addEventListener('click', () => {
                if (!state.selectedItem) return;
                const newName = prompt("Enter new title context:", state.selectedItem.title);
                if (newName) {
                    state.selectedItem.title = newName;
                    renderItems();
                }
                contextMenu.style.display = 'none';
            });

            document.getElementById('opt-open-tab').addEventListener('click', () => {
                if (!state.selectedItem) return;
                alert(`Opening link source in a decoupled pipeline: ${state.selectedItem.title}`);
                contextMenu.style.display = 'none';
            });

            document.getElementById('opt-move-folder').addEventListener('click', () => {
                alert("Select alternate asset parameters to route path destinations.");
                contextMenu.style.display = 'none';
            });

            document.getElementById('opt-delete').addEventListener('click', () => {
                if (!state.selectedItem) return;
                if (confirm(`Purge entry alignment permanently: "${state.selectedItem.title}"?`)) {
                    state.items = state.items.filter(i => i.id !== state.selectedItem.id);
                    renderItems();
                }
                contextMenu.style.display = 'none';
            });

            // State management buttons
            document.getElementById('btn-save').addEventListener('click', () => {
                localStorage.setItem('gothicArchiveState', JSON.stringify(state.items));
                alert("Archive configurations matched and locked.");
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                const saved = localStorage.getItem('gothicArchiveState');
                if (saved) {
                    state.items = JSON.parse(saved);
                    renderItems();
                } else {
                    alert("No standard historical state logs matching cache index.");
                }
            });

            document.getElementById('close-folder-btn').addEventListener('click', () => {
                document.getElementById('folder-overlay').style.display = 'none';
            });
        }

        // Open Overlay for Folders with Delete option inside
        function openFolderOverlay(folderData) {
            const overlay = document.getElementById('folder-overlay');
            const title = document.getElementById('folder-view-title');
            const grid = document.getElementById('folder-grid');

            title.textContent = folderData.title;
            grid.innerHTML = '';

            if (folderData.notes && folderData.notes.length > 0) {
                folderData.notes.forEach(note => {
                    const el = document.createElement('div');
                    el.className = 'nested-note';
                    el.textContent = note.title;

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-nested-btn';
                    delBtn.textContent = 'X';
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm(`Delete sub-element note alignment: "${note.title}"?`)) {
                            folderData.notes = folderData.notes.filter(n => n.id !== note.id);
                            openFolderOverlay(folderData); // Refresh view layout
                        }
                    });

                    el.appendChild(delBtn);
                    grid.appendChild(el);
                });
            } else {
                grid.innerHTML = '<div style="color: #666; font-style: italic;">Vault currently empty.</div>';
            }

            overlay.style.display = 'flex';
        }

        window.onload = init;
    </script>
</body>
</html>
