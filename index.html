<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Dashboard</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #16161e;
            --accent-color: #7aa2f7;
            --text-color: #c0caf5;
            --text-muted: #565f89;
            --border-color: #24283b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--accent-color);
        }

        .status-bar {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .section-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        .section-card h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item-link {
            display: flex;
            align-items: center;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.2s, background-color 0.2s;
        }

        .item-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .loading, .error-msg, .empty-msg {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
            padding: 10px 0;
        }
        
        .error-msg {
            color: #f7768e;
        }
    </style>

    <!-- Firebase App and Realtime Database SDKs (Compat Version for simple script injection) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <h1>Companion Platform</h1>
        <div id="status" class="status-bar">Connecting to database...</div>
    </header>

    <main class="grid-container">
        <!-- Folders Section -->
        <section class="section-card">
            <h2><span class="icon">📁</span> Folders</h2>
            <div id="folders-list" class="list-container">
                <div class="loading">Loading folders...</div>
            </div>
        </section>

        <!-- Links Section -->
        <section class="section-card">
            <h2><span class="icon">🔗</span> Links</h2>
            <div id="links-list" class="list-container">
                <div class="loading">Loading links...</div>
            </div>
        </section>
    </main>

    <script>
        // Your Firebase configuration using the provided URL
        const firebaseConfig = {
            databaseURL: "https://startpage2-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const statusEl = document.getElementById('status');
            
            statusEl.innerText = "Connected to database. Fetching data...";

            // 1. Fetch and render Folders
            database.ref('folders').on('value', (snapshot) => {
                const foldersList = document.getElementById('folders-list');
                foldersList.innerHTML = ''; // Clear loading/old data
                
                const data = snapshot.val();
                if (!data) {
                    foldersList.innerHTML = '<div class="empty-msg">No folders found.</div>';
                    return;
                }

                // Loop through folders and render them
                Object.keys(data).forEach(key => {
                    const folder = data[key];
                    const name = folder.name || key;
                    
                    const folderItem = document.createElement('a');
                    folderItem.href = folder.url || '#';
                    folderItem.className = 'item-link';
                    folderItem.innerHTML = `<span class="icon">📁</span> <span>${name}</span>`;
                    
                    foldersList.appendChild(folderItem);
                });
                
                statusEl.innerText = "Dashboard data updated.";
            }, (error) => {
                console.error(error);
                document.getElementById('folders-list').innerHTML = `<div class="error-msg">Error loading folders: ${error.message}</div>`;
            });

            // 2. Fetch and render Links
            database.ref('links').on('value', (snapshot) => {
                const linksList = document.getElementById('links-list');
                linksList.innerHTML = ''; // Clear loading/old data
                
                const data = snapshot.val();
                if (!data) {
                    linksList.innerHTML = '<div class="empty-msg">No links found.</div>';
                    return;
                }

                // Loop through links and render them
                Object.keys(data).forEach(key => {
                    const link = data[key];
                    const title = link.title || link.name || key;
                    const url = link.url || '#';
                    
                    const linkItem = document.createElement('a');
                    linkItem.href = url;
                    linkItem.target = '_blank'; // Open links in a new tab
                    linkItem.className = 'item-link';
                    linkItem.innerHTML = `<span class="icon">🔗</span> <span>${title}</span>`;
                    
                    linksList.appendChild(linkItem);
                });
            }, (error) => {
                console.error(error);
                document.getElementById('links-list').innerHTML = `<div class="error-msg">Error loading links: ${error.message}</div>`;
            });

        } catch (e) {
            console.error("Firebase Initialization Error:", e);
            document.getElementById('status').innerText = "Configuration error. Check your database setup.";
            document.getElementById('status').style.color = "#f7768e";
        }
    </script>
</body>
</html>
