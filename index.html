<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Gothic Archive (Formation &amp; Snap-to-Grid)</title>
    <style>
        /* --- DESIGN SYSTEM & SYSTEM PALETTE --- */
        :root {
            --bg-canvas: #09090d;
            --bg-card: #111116;
            --border-muted: #222230;
            --border-focus: #444460;
            --text-main: #d1d1de;
            --text-muted: #666680;
            --accent: #5c4d9a;
            --accent-glow: rgba(92, 77, 154, 0.3);
            --grid-color: rgba(92, 77, 154, 0.04);
            --grid-color-active: rgba(92, 77, 154, 0.12);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --grid-size: 40px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-main);
            font-family: var(--font-family);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- CONTROL INTERFACE BAR --- */
        .control-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 17, 22, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-muted);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-muted);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn:hover {
            background: rgba(255,255,255,0.03);
            border-color: var(--text-muted);
        }

        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-travel {
            border-color: #3d3466;
            background: rgba(92, 77, 154, 0.1);
            color: #bfaeff;
        }
        
        .btn-travel:hover {
            background: rgba(92, 77, 154, 0.25);
            border-color: #5c4d9a;
        }

        /* --- INFINITE CANVAS & STRUCTURAL GRID --- */
        .canvas-viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        .canvas-viewport:active {
            cursor: grabbing;
        }

        .canvas-container {
            position: absolute;
            width: 100000px;
            height: 100000px;
            top: 0;
            left: 0;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            transition: background-image 0.2s ease;
        }

        body.edit-mode-active .canvas-container {
            background-image: 
                linear-gradient(to right, var(--grid-color-active) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color-active) 1px, transparent 1px);
        }

        /* --- RELIC & FOLDER DOM NODES --- */
        .relic {
            position: absolute;
            background: var(--bg-card);
            border: 1px solid var(--border-muted);
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: move;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        body.edit-mode-active .relic {
            border-color: var(--border-focus);
        }

        .relic-frame {
            width: 100%;
            height: calc(100% - 24px);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #000;
        }

        .relic-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .relic-meta {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            height: 18px;
            line-height: 18px;
        }

        /* --- CONTEXTUAL MANAGEMENT CONSOLE MENU --- */
        .context-menu {
            position: fixed;
            background: #161622;
            border: 1px solid var(--border-focus);
            border-radius: 8px;
            padding: 6px 0;
            min-width: 180px;
            z-index: 20000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: none;
        }

        .context-menu-item {
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .context-menu-item:hover {
            background: var(--accent);
            color: #fff;
        }

        /* --- MODAL CONFIRMATION DIALOGUES --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 30000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #121218;
            border: 1px solid var(--border-focus);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }

        .modal-overlay.open .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-body {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* --- DRAG GHOST VISUALIZER --- */
        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, var(--text-muted) 50%);
            display: none;
            z-index: 100;
        }

        body.edit-mode-active .resize-handle {
            display: block;
        }
    </style>
</head>
<body>

    <div class="control-bar">
        <button class="btn" id="toggleEditBtn">Edit Mode</button>
        <button class="btn" id="recenterBtn">Recenter Formation</button>
        <button class="btn" id="saveLayoutBtn">Save State</button>
        <button class="btn" id="loadLayoutBtn">Load State</button>
        <a href="travel.html" class="btn btn-travel" id="travelLinkBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right: 6px; transform: translateY(0.5px);"><rect x="4" y="3" width="16" height="14" rx="2"></rect><path d="M4 11h16"></path><path d="M12 3v8"></path><path d="M8 17l-2 4"></path><path d="M16 17l2 4"></path></svg>
            Travel
        </a>
    </div>

    <div class="canvas-viewport" id="viewport">
        <div class="canvas-container" id="canvas">
            </div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="rename">Rename Item</div>
        <div class="context-menu-item" data-action="change-img">Change Asset Target</div>
        <div class="context-menu-item" data-action="snap-origin">Snap to Original Shape</div>
        <div class="context-menu-item" data-action="move-folder">Move to Folder Container</div>
        <div class="context-menu-item" data-action="delete" style="color: var(--accent-alert);">Delete Entity</div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">Confirm Action</div>
            <div class="modal-body" id="modalBody">Are you sure you want to proceed?</div>
            <div class="modal-actions">
                <button class="btn" id="modalCancelBtn">Cancel</button>
                <button class="btn" id="modalConfirmBtn" style="background: var(--accent); border-color: var(--accent);">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // --- ARCHIVE STATE MATRIX ---
            const state = {
                editMode: false,
                panX: -45000,
                panY: -45000,
                isPanning: false,
                startX: 0,
                startY: 0,
                activeRelic: null,
                isDragging: false,
                isResizing: false,
                relicOffsetX: 0,
                relicOffsetY: 0,
                startW: 0,
                startH: 0,
                contextTarget: null,
                gridSize: 40,
                relics: [
                    { id: "1", type: "relic", name: "Gothic Archway Spire", src: "https://picsum.photos/id/1011/300/400", x: 50200, y: 50200, w: 180, h: 240, origW: 180, origH: 240 },
                    { id: "2", type: "relic", name: "Forgotten Altar Reliquary", src: "https://picsum.photos/id/1043/300/300", x: 50440, y: 50200, w: 220, h: 220, origW: 220, origH: 220 },
                    { id: "3", type: "folder", name: "Catacomb Text Manuscripts", src: "https://picsum.photos/id/1050/300/400", x: 50200, y: 50520, w: 200, h: 200, origW: 200, origH: 200 }
                ]
            };

            // --- DOM SELECTORS ---
            const viewport = document.getElementById('viewport');
            const canvas = document.getElementById('canvas');
            const toggleEditBtn = document.getElementById('toggleEditBtn');
            const recenterBtn = document.getElementById('recenterBtn');
            const saveLayoutBtn = document.getElementById('saveLayoutBtn');
            const loadLayoutBtn = document.getElementById('loadLayoutBtn');
            const contextMenu = document.getElementById('contextMenu');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            const modalConfirmBtn = document.getElementById('modalConfirmBtn');
            const modalCancelBtn = document.getElementById('modalCancelBtn');

            let currentModalAction = null;

            // --- INITIALIZATION ---
            function init() {
                applyPanTransform();
                renderArchiveElements();
                attachViewportPanEngine();
                attachGlobalContextListeners();
                attachControlBarActions();
            }

            function applyPanTransform() {
                canvas.style.transform = `translate(${state.panX}px, ${state.panY}px)`;
            }

            // --- RENDER MATRIX ENGINE ---
            function renderArchiveElements() {
                // Preserving existing elements during dynamic array updates
                const elements = canvas.querySelectorAll('.relic');
                elements.forEach(el => el.remove());

                state.relics.forEach(data => {
                    const el = document.createElement('div');
                    el.className = 'relic';
                    el.id = `relic-${data.id}`;
                    el.style.left = `${data.x}px`;
                    el.style.top = `${data.y}px`;
                    el.style.width = `${data.w}px`;
                    el.style.height = `${data.h}px`;

                    el.innerHTML = `
                        <div class="relic-frame">
                            <img src="${data.src}" alt="${data.name}">
                        </div>
                        <div class="relic-meta">${data.name}</div>
                        <div class="resize-handle"></div>
                    `;

                    attachElementInteractions(el, data);
                    canvas.appendChild(el);
                });
            }

            // --- INTERACTION HOOKS (DRAG, RESIZE, LONG PRESS) ---
            function attachElementInteractions(el, data) {
                let pressTimer = null;

                const startPress = (e) => {
                    if (e.button && e.button !== 0) return;
                    pressTimer = setTimeout(() => {
                        triggerContextInterface(e, data);
                    }, 600);
                };

                const clearPress = () => {
                    if (pressTimer) clearTimeout(pressTimer);
                };

                el.addEventListener('mousedown', startPress);
                el.addEventListener('touchstart', (e) => startPress(e.touches[0]));
                el.addEventListener('mousemove', clearPress);
                el.addEventListener('touchmove', clearPress);
                window.addEventListener('mouseup', clearPress);

                // Primary Mouse Interaction Mapping Splitter
                el.addEventListener('mousedown', (e) => {
                    if (!state.editMode || e.button !== 0) return;
                    e.stopPropagation();
                    
                    const handle = el.querySelector('.resize-handle');
                    const rect = handle.getBoundingClientRect();
                    
                    if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                        state.isResizing = true;
                        state.activeRelic = data;
                        state.startW = data.w;
                        state.startH = data.h;
                        state.startX = e.clientX;
                        state.startY = e.clientY;
                    } else {
                        state.isDragging = true;
                        state.activeRelic = data;
                        state.relicOffsetX = e.clientX - el.offsetLeft;
                        state.relicOffsetY = e.clientY - el.offsetTop;
                    }
                });
            }

            // --- VIEWPORT VIEWPORT DRAG-PAN SYSTEM ---
            function attachViewportPanEngine() {
                viewport.addEventListener('mousedown', (e) => {
                    if (e.target !== viewport && e.target !== canvas) return;
                    state.isPanning = true;
                    state.startX = e.clientX - state.panX;
                    state.startY = e.clientY - state.panY;
                });

                window.addEventListener('mousemove', (e) => {
                    if (state.isPanning) {
                        state.panX = e.clientX - state.startX;
                        state.panY = e.clientY - state.startY;
                        applyPanTransform();
                    } else if (state.isDragging && state.activeRelic) {
                        const targetX = e.clientX - state.relicOffsetX;
                        const targetY = e.clientY - state.relicOffsetY;
                        
                        // Soft Snap-to-Grid Boundary Logic Calculation
                        state.activeRelic.x = Math.round(targetX / state.gridSize) * state.gridSize;
                        state.activeRelic.y = Math.round(targetY / state.gridSize) * state.gridSize;

                        const dom = document.getElementById(`relic-${state.activeRelic.id}`);
                        if (dom) {
                            dom.style.left = `${state.activeRelic.x}px`;
                            dom.style.top = `${state.activeRelic.y}px`;
                        }
                    } else if (state.isResizing && state.activeRelic) {
                        const deltaX = e.clientX - state.startX;
                        const deltaY = e.clientY - state.startY;
                        
                        state.activeRelic.w = Math.max(80, Math.round((state.startW + deltaX) / 20) * 20);
                        state.activeRelic.h = Math.max(80, Math.round((state.startH + deltaY) / 20) * 20);

                        const dom = document.getElementById(`relic-${state.activeRelic.id}`);
                        if (dom) {
                            dom.style.width = `${state.activeRelic.w}px`;
                            dom.style.height = `${state.activeRelic.h}px`;
                        }
                    }
                });

                window.addEventListener('mouseup', () => {
                    state.isPanning = false;
                    state.isDragging = false;
                    state.isResizing = false;
                    state.activeRelic = null;
                });
            }

            // --- TOOLBAR SYSTEMS TRIGGER INTERFACES ---
            function attachControlBarActions() {
                toggleEditBtn.addEventListener('click', () => {
                    state.editMode = !state.editMode;
                    toggleEditBtn.classList.toggle('active', state.editMode);
                    document.body.classList.toggle('edit-mode-active', state.editMode);
                });

                recenterBtn.addEventListener('click', () => {
                    // Formation style central calculations bounding all elements inside visibility
                    if (state.relics.length === 0) return;
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    state.relics.forEach(r => {
                        if (r.x < minX) minX = r.x;
                        if (r.y < minY) minY = r.y;
                        if (r.x + r.w > maxX) maxX = r.x + r.w;
                        if (r.y + r.h > maxY) maxY = r.y + r.h;
                    });

                    const centerX = minX + (maxX - minX) / 2;
                    const centerY = minY + (maxY - minY) / 2;

                    state.panX = -(centerX - window.innerWidth / 2);
                    state.panY = -(centerY - window.innerHeight / 2);
                    applyPanTransform();
                });

                saveLayoutBtn.addEventListener('click', () => {
                    localStorage.setItem('gothic_archive_layout', JSON.stringify(state.relics));
                    alert('State localized safely inside local platform engine memory storage.');
                });

                loadLayoutBtn.addEventListener('click', () => {
                    const loaded = localStorage.getItem('gothic_archive_layout');
                    if (loaded) {
                        state.relics = JSON.stringify(loaded);
                        renderArchiveElements();
                    }
                });
            }

            // --- CONTEXT CONSOLE MANAGEMENT MENU LOGIC ---
            function attachGlobalContextListeners() {
                window.addEventListener('contextmenu', (e) => {
                    const targetNode = e.target.closest('.relic');
                    if (targetNode) {
                        e.preventDefault();
                        const id = targetNode.id.replace('relic-', '');
                        const data = state.relics.find(r => r.id === id);
                        triggerContextInterface(e, data);
                    } else {
                        contextMenu.style.display = 'none';
                    }
                });

                window.addEventListener('click', () => {
                    contextMenu.style.display = 'none';
                });

                contextMenu.addEventListener('click', (e) => {
                    const action = e.target.getAttribute('data-action');
                    if (!action || !state.contextTarget) return;

                    handleMenuAction(action, state.contextTarget);
                });

                modalCancelBtn.addEventListener('click', () => modalOverlay.classList.remove('open'));
                modalConfirmBtn.addEventListener('click', executeConfirmedAction);
            }

            function triggerContextInterface(e, data) {
                state.contextTarget = data;
                contextMenu.style.left = `${e.clientX}px`;
                contextMenu.style.top = `${e.clientY}px`;
                contextMenu.style.display = 'block';
            }

            function handleMenuAction(action, target) {
                currentModalAction = { action, target };

                if (action === 'delete') {
                    openConfirmationDialogue("Delete Entity Assets", `Are you certain you wish to purge "${target.name}"? This operation cannot be undone.`);
                } else if (action === 'snap-origin') {
                    target.w = target.origW;
                    target.h = target.origH;
                    renderArchiveElements();
                } else if (action === 'rename') {
                    const newName = prompt("Assign new designation parameter string:", target.name);
                    if (newName) {
                        target.name = newName;
                        renderArchiveElements();
                    }
                } else if (action === 'change-img') {
                    const newSrc = prompt("Insert resource asset source absolute URL:", target.src);
                    if (newSrc) {
                        target.src = newSrc;
                        renderArchiveElements();
                    }
                } else if (action === 'move-folder') {
                    alert("Relocation container sequence initiated.");
                }
            }

            function openConfirmationDialogue(title, description) {
                modalTitle.textContent = title;
                modalBody.textContent = description;
                modalOverlay.classList.add('open');
            }

            function executeConfirmedAction() {
                if (!currentModalAction) return;
                const { action, target } = currentModalAction;

                if (action === 'delete') {
                    state.relics = state.relics.filter(r => r.id !== target.id);
                    renderArchiveElements();
                }

                modalOverlay.classList.remove('open');
                currentModalAction = null;
            }

            // Ignite System Engines
            init();
        })();
    </script>
</body>
</html>
