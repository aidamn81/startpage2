<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gothic Archive">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/compass--v1.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --obsidian: #050505; --crimson: #7a0000; --gold: #8c7340; --text: #a19a89; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: var(--obsidian); color: var(--text); font-family: 'Playfair Display', serif; overflow-x: hidden; overflow-y: auto; -webkit-user-select: none; user-select: none; }
        body { background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png'); min-height: 100vh; display: flex; flex-direction: column; }
        #top-controls { width: 100%; padding: 10px 15px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #1a1a1a; background: #000; box-sizing: border-box; z-index: 3000; position: sticky; top: 0; padding-top: env(safe-area-inset-top, 10px); }
        #archive-grid { position: relative; width: 100%; flex-grow: 1; box-sizing: border-box; z-index: 5; padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; }
        .relic-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s ease; touch-action: none; }
        .relic-frame, .folder-frame { border-radius: 15%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; border: 1.5px solid #222; position: relative; box-shadow: 0 6px 12px rgba(0,0,0,0.6); pointer-events: none; }
        .folder-frame::after { content: ""; position: absolute; inset: 0; border: 2px solid var(--crimson); border-radius: 15%; opacity: 0.5; }
        .relic-frame img, .folder-frame img { width: 100%; height: 100%; object-fit: cover; }
        .relic-name { margin-top: 6px; font-family: 'Cinzel'; font-size: 0.7rem; color: #fff; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toggle-btn { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 7px 12px; font-family: 'Cinzel'; font-size: 0.75rem; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; }
        
        #admin-modal, #calc-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 6000; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 2px solid var(--gold); width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; font-family: 'Cinzel'; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 5px; box-sizing: border-box; }
        
        #context-menu { position: fixed; display: none; background: #0a0a0a; border: 1px solid var(--gold); border-radius: 8px; z-index: 5000; width: 220px; flex-direction: column; }
        .menu-item { padding: 14px; color: var(--gold); font-family: 'Cinzel'; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; cursor: pointer; text-align: center; }
        .is-editing .relic-wrapper { animation: wiggle 0.3s infinite ease-in-out; }
        @keyframes wiggle { 0% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } 100% { transform: rotate(-1deg); } }
    </style>
</head>
<body onclick="closeMenu()">

    <div id="top-controls">
        <button id="back-btn" class="toggle-btn" style="display:none;" onclick="goBack()">←</button>
        <span id="status-text" style="font-family:'Cinzel'; color:var(--gold); flex-grow: 1;">Gothic Archive</span>
        <button class="toggle-btn" onclick="openCalc()">%</button>
        <a href="oracle.html" class="toggle-btn">Oracle</a>
        <button class="toggle-btn" onclick="openAdmin()">Summon</button>
        <button id="edit-toggle" class="toggle-btn">Edit</button>
    </div>

    <div id="calc-modal" onclick="if(event.target==this) closeCalc()">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--gold)">Tithe</h2>
            <input type="number" id="calc-base" placeholder="Amount" oninput="runCalc()">
            <input type="number" id="calc-percent" value="20" oninput="runCalc()">
            <div id="calc-result" style="text-align:center; font-size:1.5rem; color:var(--gold)">Result: 0</div>
        </div>
    </div>

    <div id="admin-modal" onclick="if(event.target==this) closeAdmin()">
        <div class="modal-content">
            <h2>Manifest</h2>
            <select id="creation-type"><option value="relic">Relic</option><option value="folder">Folder</option></select>
            <input type="text" id="new-name" placeholder="Name">
            <input type="text" id="new-url" placeholder="URL">
            <button class="toggle-btn" style="width:100%;" onclick="createSomething()">Manifest</button>
        </div>
    </div>

    <main id="archive-grid"></main>

    <div id="context-menu">
        <div class="menu-item" onclick="menuRename()">Rename</div>
        <div class="menu-item" onclick="menuDelete()" style="color:var(--crimson)">Banish</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAuNbY1Xv_ZF3kJah20qqPBz-IiiMAR9gE",
            authDomain: "aidenstartpage.firebaseapp.com",
            databaseURL: "https://aidenstartpage-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenstartpage"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();

        let isEditMode = false, currentFolder = 'root', allRelics = {}, activeMenuId = null;

        // Force a fresh login to bridge the Standalone Sandbox gap
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
            return auth.onAuthStateChanged(user => {
                if (user) syncData();
                else auth.signInAnonymously();
            });
        });

        function syncData() {
            // "Value" listener ensures that every time the DB changes, the UI follows
            rtdb.ref('relics').on('value', snap => {
                allRelics = snap.val() || {};
                renderGrid();
            });
        }

        function renderGrid() {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            document.body.classList.toggle('is-editing', isEditMode);
            
            Object.entries(allRelics)
                .filter(([id, r]) => r.parent === currentFolder)
                .forEach(([id, r]) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'relic-wrapper';
                    wrap.style.width = (r.w || 80) + 'px';
                    wrap.innerHTML = `
                        <div class="${r.type === 'folder' ? 'folder-frame' : 'relic-frame'}" style="width:${r.w||80}px; height:${r.h||80}px;">
                            ${r.imgUrl ? `<img src="${r.imgUrl}">` : `<span>${r.type[0]}</span>`}
                        </div>
                        <span class="relic-name">${r.name}</span>
                    `;
                    wrap.onclick = () => {
                        if(isEditMode) { activeMenuId = id; showMenu(); }
                        else if(r.type === 'folder') enterFolder(id, r.name);
                        else window.open(r.url, '_blank');
                    };
                    grid.appendChild(wrap);
                });
        }

        // NAVIGATION & MODALS
        function enterFolder(id, name) { currentFolder = id; document.getElementById('status-text').innerText = name; document.getElementById('back-btn').style.display = 'block'; renderGrid(); }
        function goBack() { currentFolder = 'root'; document.getElementById('status-text').innerText = "Gothic Archive"; document.getElementById('back-btn').style.display = 'none'; renderGrid(); }
        function openCalc() { document.getElementById('calc-modal').style.display = 'flex'; }
        function closeCalc() { document.getElementById('calc-modal').style.display = 'none'; }
        function runCalc() {
            const b = document.getElementById('calc-base').value;
            const p = document.getElementById('calc-percent').value;
            document.getElementById('calc-result').innerText = "Result: " + (b * (p/100)).toFixed(2);
        }
        function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        function createSomething() {
            const type = document.getElementById('creation-type').value;
            const name = document.getElementById('new-name').value;
            const url = document.getElementById('new-url').value;
            rtdb.ref('relics').push({ name, url, type, parent: currentFolder, w:80, h:80 });
            closeAdmin();
        }
        function showMenu() { document.getElementById('context-menu').style.display = 'flex'; }
        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        function menuDelete() { if(confirm("Banish?")) rtdb.ref(`relics/${activeMenuId}`).remove(); }
        document.getElementById('edit-toggle').onclick = () => { isEditMode = !isEditMode; renderGrid(); };
    </script>
</body>
</html>
