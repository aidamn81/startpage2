<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gothic Archive">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="https://r.jina.ai/i/656121408801402998a44b9ef40f80bc">
    <link rel="icon" type="image/png" sizes="192x192" href="https://r.jina.ai/i/656121408801402998a44b9ef40f80bc">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Gothic%20Archive%22,%22short_name%22:%22Archive%22,%22icons%22:[{%22src%22:%22https://r.jina.ai/i/656121408801402998a44b9ef40f80bc%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}],%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23050505%22}">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --obsidian: #050505; --crimson: #7a0000; --gold: #8c7340; --text: #a19a89; --base-size: 80px; }
        @media only screen and (min-width: 768px) { :root { --base-size: 100px; } }
        @media only screen and (max-width: 600px) { :root { --base-size: 70px; } }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background-color: var(--obsidian); color: var(--text); font-family: 'Playfair Display', serif; overflow: hidden; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png'); }
        #status-display { position: absolute; top: 20px; left: 20px; font-family: 'Cinzel'; color: var(--gold); font-size: 0.8rem; z-index: 3000; }
        #top-nav { position: absolute; top: 0; right: 0; padding: 15px; display: flex; gap: 8px; z-index: 4000; padding-top: env(safe-area-inset-top, 15px); }
        .nav-link { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 6px 12px; font-family: 'Cinzel'; font-size: 0.65rem; border-radius: 4px; cursor: pointer; text-decoration: none; text-transform: uppercase; }
        #archive-grid { position: absolute; inset: 0; overflow: auto; z-index: 5; padding: 20px; box-sizing: border-box; }
        .relic-wrapper { position: absolute; display: flex; flex-direction: column; align-items: center; cursor: pointer; z-index: 10; touch-action: none; width: var(--base-size); }
        .relic-frame, .folder-frame { border-radius: 15%; overflow: hidden; background: #111; border: 1.5px solid var(--crimson); position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.6); pointer-events: none; width: 100%; aspect-ratio: 1/1; }
        .relic-frame img, .folder-frame img { width: 100%; height: 100%; object-fit: cover; }
        .relic-name { margin-top: 5px; font-family: 'Cinzel'; font-size: 0.55rem; color: #fff; text-align: center; width: 120%; }
        .resize-handle { position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px; background: var(--gold); border-radius: 50%; z-index: 50; display: none; border: 2px solid #000; pointer-events: auto; }
        body.is-editing .resize-handle { display: block; }
        .dragging { opacity: 0.6; z-index: 5000 !important; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 8px; width: 85%; max-width: 350px; padding: 25px; position: relative; }
        .close-ritual { position: absolute; top: 10px; right: 10px; color: var(--gold); font-family: 'Cinzel'; font-size: 0.7rem; cursor: pointer; border: 1px solid var(--gold); padding: 4px 8px; border-radius: 4px; }
        .modal-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 12px; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .ritual-btn { width: 100%; background: var(--crimson); color: #fff; border: none; padding: 14px; border-radius: 4px; font-family: 'Cinzel'; cursor: pointer; font-weight: bold; }
        
        #context-menu { 
            position: fixed; display: none; background: #0a0a0a; border: 1px solid var(--gold); z-index: 6000; width: 180px; max-height: 220px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--gold) #0a0a0a; -webkit-overflow-scrolling: touch;
        }
        #context-menu::-webkit-scrollbar { width: 4px; }
        #context-menu::-webkit-scrollbar-track { background: #0a0a0a; }
        #context-menu::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
        .menu-item { padding: 10px; color: var(--gold); font-family: 'Cinzel'; border-bottom: 1px solid #1a1a1a; cursor: pointer; text-align: center; font-size: 0.7rem; }

        /* GOTHIC TO-DO PANEL STYLE */
        #todo-container {
            position: absolute; bottom: 30px; left: 20px; width: 260px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid var(--crimson);
            border-radius: 6px; z-index: 4500; display: flex; flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); touch-action: none;
        }
        #todo-header {
            padding: 10px 14px; background: #111; border-bottom: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center;
            cursor: move; font-family: 'Cinzel'; font-size: 0.65rem; letter-spacing: 1px; color: var(--gold);
        }
        .todo-toggle-btn { background: transparent; border: none; color: var(--gold); font-family: 'Cinzel'; cursor: pointer; font-size: 0.65rem; }
        #todo-body { display: flex; flex-direction: column; max-height: 240px; }
        #todo-list { overflow-y: auto; padding: 0; margin: 0; list-style: none; max-height: 180px; scrollbar-width: none; }
        #todo-list::-webkit-scrollbar { display: none; }
        .todo-item {
            padding: 10px 14px; border-bottom: 1px solid #161616; display: flex;
            align-items: center; justify-content: space-between; gap: 8px; font-size: 0.75rem;
        }
        .todo-label-group { display: flex; align-items: center; gap: 8px; width: 100%; overflow: hidden; }
        .todo-checkbox { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1px solid var(--gold); border-radius: 2px; background: transparent; cursor: pointer; position: relative; flex-shrink: 0; }
        .todo-checkbox:checked { background: var(--crimson); border-color: var(--crimson); }
        .todo-checkbox:checked::after { content: '✓'; position: absolute; top: -2px; left: 2px; color: #fff; font-size: 9px; }
        .todo-text { color: #fff; transition: opacity 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: auto; }
        .todo-item.completed .todo-text { text-decoration: line-through; opacity: 0.4; }
        
        .todo-controls { display: none; gap: 4px; flex-shrink: 0; }
        body.is-editing .todo-controls { display: flex; }
        .todo-btn { background: transparent; border: 1px solid #333; color: var(--text); padding: 2px 5px; font-size: 0.55rem; border-radius: 3px; cursor: pointer; font-family: 'Cinzel'; }
        .todo-btn.del { border-color: var(--crimson); color: var(--crimson); }
        
        #todo-form { display: flex; border-top: 1px solid #222; padding: 6px; background: #0d0d0d; }
        #todo-input { flex: 1; background: #141414; border: 1px solid #252525; color: #fff; font-size: 0.7rem; padding: 6px; border-radius: 3px; font-family: 'Playfair Display'; }
        #todo-input:focus { outline: none; border-color: var(--gold); }
        .todo-add-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 0 10px; margin-left: 5px; font-family: 'Cinzel'; font-size: 0.6rem; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body onclick="closeModals(); closeMenu();">

    <div id="status-display">GOTHIC ARCHIVE</div>
    <nav id="top-nav">
        <button id="back-btn" class="nav-link" onclick="goBack()" style="display:none;">← BACK</button>
        <a href="oracle.html" class="nav-link">ORACLE</a>
        <button class="nav-link" onclick="event.stopPropagation(); showCalc()">%</button>
        <button class="nav-link" onclick="event.stopPropagation(); showSummon()">SUMMON</button>
        <button id="edit-toggle" class="nav-link" onclick="event.stopPropagation(); toggleEdit()">EDIT</button>
    </nav>

    <main id="archive-grid"></main>

    <div id="todo-container" onclick="event.stopPropagation()">
        <div id="todo-header">
            <span>📜 SCROLL OF TASKS</span>
            <button class="todo-toggle-btn" onclick="toggleTodoCollapse()">[ - ]</button>
        </div>
        <div id="todo-body">
            <ul id="todo-list"></ul>
            <form id="todo-form" onsubmit="addTodoItem(event)">
                <input type="text" id="todo-input" placeholder="Inscribe Task..." autocomplete="off">
                <button type="submit" class="todo-add-btn">+</button>
            </form>
        </div>
    </div>

    <div id="calc-modal" class="modal-overlay" onclick="event.stopPropagation()"><div class="modal-content"><div class="close-ritual" onclick="closeModals()">BANISH</div><input type="number" id="calc-amount" class="modal-input" placeholder="Amount"><input type="number" id="calc-percent" class="modal-input" value="20"><button class="ritual-btn" onclick="runCalcRitual()">CALCULATE RITUAL</button></div></div>
    <div id="summon-modal" class="modal-overlay" onclick="event.stopPropagation()"><div class="modal-content"><div class="close-ritual" onclick="closeModals()">BANISH</div><input type="text" id="sum-name" class="modal-input" placeholder="Name"><input type="text" id="sum-url" class="modal-input" placeholder="URL"><select id="sum-type" class="modal-input"><option value="relic">Relic</option><option value="folder">Folder</option></select><input type="file" id="sum-file" class="modal-input"><button class="ritual-btn" onclick="runSummonRitual()">COMMEMORATE</button></div></div>
    
    <div id="context-menu" onclick="event.stopPropagation()">
        <div class="menu-item" onclick="menuRename()">Rename</div>
        <div class="menu-item" onclick="document.getElementById('img-swap').click()">Upload Image</div>
        <div class="menu-item" onclick="toggleMoveMenu()">Move to Folder...</div>
        <div id="move-sub-menu" style="display:none; background:#050505;"></div>
        <div class="menu-item" onclick="menuSnapOriginal()">Snap Original</div>
        <div class="menu-item" onclick="menuDelete()" style="color:var(--crimson)">Banish</div>
    </div>
    <input type="file" id="img-swap" style="display:none" onchange="swapImage(this)">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAuNbY1Xv_ZF3kJah20qqPBz-IiiMAR9gE",
            authDomain: "aidenstartpage.firebaseapp.com",
            databaseURL: "https://aidenstartpage-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenstartpage"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        let isEditMode = false, currentFolder = 'root', allRelics = {}, activeMenuId = null;
        let dragEl = null, startX, startY, initialX, initialY, hasMoved = false;
        
        let todoItems = [];
        let isTodoCollapsed = false;
        let todoDragActive = false, todoStartX, todoStartY, todoInitX, todoInitY;

        const isMobile = () => window.innerWidth <= 600;
        const getPlatformKey = () => isMobile() ? 'mobile' : 'tablet';

        firebase.auth().onAuthStateChanged(user => { 
            if (user) {
                rtdb.ref('relics').on('value', snap => { 
                    allRelics = snap.val() || {}; 
                    render(); 
                });
                rtdb.ref('todos').on('value', snap => {
                    todoItems = snap.val() || [];
                    renderTodos();
                });
                rtdb.ref(`todo_position/${getPlatformKey()}`).on('value', snap => {
                    const pos = snap.val();
                    const container = document.getElementById('todo-container');
                    if (pos && container && !todoDragActive) {
                        container.style.left = pos.x + 'px';
                        container.style.top = pos.y + 'px';
                        container.style.bottom = 'auto';
                    }
                });
            } else {
                firebase.auth().signInAnonymously();
            }
        });

        function render() {
            const grid = document.getElementById('archive-grid');
            if (!grid) return; 
            grid.innerHTML = '';
            const platform = getPlatformKey();
            document.body.classList.toggle('is-editing', isEditMode);
            document.getElementById('edit-toggle').innerText = isEditMode ? "LOCK" : "EDIT";

            renderTodos();

            const items = Object.entries(allRelics).filter(([id, r]) => r.parent === currentFolder);

            items.forEach(([id, r], index) => {
                const wrap = document.createElement('div');
                wrap.className = 'relic-wrapper';
                const layout = (r.layouts && r.layouts[platform]) ? r.layouts[platform] : {};
                
                let px = layout.vx !== undefined ? (layout.vx * window.innerWidth / 100) : (r.vx !== undefined ? (r.vx * window.innerWidth / 100) : (index % 4) * (window.innerWidth / 4.5) + 20);
                let py = layout.vy !== undefined ? (layout.vy * window.innerHeight / 100) : (r.vy !== undefined ? (r.vy * window.innerHeight / 100) : Math.floor(index / 4) * 110 + 80);
                let pWidth = layout.w || r.w || null;

                wrap.style.left = px + 'px';
                wrap.style.top = py + 'px';
                if(pWidth) wrap.style.width = pWidth + 'px';

                wrap.innerHTML = `
                    <div class="${r.type === 'folder' ? 'folder-frame' : 'relic-frame'}" style="width:${pWidth?pWidth+'px':''}; height:${pWidth?pWidth+'px':''};">
                        ${r.imgUrl ? `<img src="${r.imgUrl}">` : `<span style="color:var(--gold); font-family:Cinzel;">${r.type[0]}</span>`}
                    </div>
                    <span class="relic-name">${r.name}</span>
                    <div class="resize-handle"></div>
                `;

                wrap.onpointerdown = (e) => {
                    if (e.target.classList.contains('resize-handle')) { handleResize(e, wrap, id); return; }
                    hasMoved = false;
                    const now = Date.now();
                    
                    if (isEditMode && now - (wrap.lastTap || 0) < 300) { 
                        activeMenuId = id; 
                        showMenu(e); 
                        return; 
                    }
                    wrap.lastTap = now;
                    
                    if (isEditMode) { 
                        dragEl = wrap; 
                        startX = e.clientX; 
                        startY = e.clientY; 
                        initialX = wrap.offsetLeft; 
                        initialY = wrap.offsetTop; 
                        wrap.classList.add('dragging'); 
                        wrap.setPointerCapture(e.pointerId); 
                    }
                };

                wrap.onpointermove = (e) => { 
                    if (!dragEl) return; 
                    if (Math.abs(e.clientX - startX) > 3 || Math.abs(e.clientY - startY) > 3) {
                        hasMoved = true; 
                    }
                    let nx = Math.round((initialX + (e.clientX - startX))/10)*10; 
                    let ny = Math.round((initialY + (e.clientY - startY))/10)*10; 
                    wrap.style.left = nx + 'px'; 
                    wrap.style.top = ny + 'px'; 
                };

                wrap.onpointerup = (e) => {
                    if (dragEl) {
                        wrap.releasePointerCapture(e.pointerId);
                        dragEl.classList.remove('dragging');
                        rtdb.ref(`relics/${id}/layouts/${getPlatformKey()}`).update({ 
                            vx: (parseInt(wrap.style.left)/window.innerWidth)*100, 
                            vy: (parseInt(wrap.style.top)/window.innerHeight)*100 
                        });
                        dragEl = null;
                    } else if (!hasMoved) {
                        if (r.type === 'folder') {
                            enterFolder(id, r.name);
                        } else if (r.url) {
                            window.open(r.url.startsWith('http') ? r.url : 'https://' + r.url, '_blank');
                        }
                    }
                    hasMoved = false; 
                };
                grid.appendChild(wrap);
            });
        }

        /* DRAGGABLE TASK FRAME LOGIC */
        const todoHeader = document.getElementById('todo-header');
        const todoContainer = document.getElementById('todo-container');

        todoHeader.onpointerdown = (e) => {
            if (e.target.classList.contains('todo-toggle-btn')) return;
            todoDragActive = true;
            todoStartX = e.clientX;
            todoStartY = e.clientY;
            todoInitX = todoContainer.offsetLeft;
            todoInitY = todoContainer.offsetTop;
            todoContainer.setPointerCapture(e.pointerId);
        };
        todoHeader.onpointermove = (e) => {
            if (!todoDragActive) return;
            let nx = todoInitX + (e.clientX - todoStartX);
            let ny = todoInitY + (e.clientY - todoStartY);
            
            if (nx < 0) nx = 0;
            if (nx + todoContainer.offsetWidth > window.innerWidth) nx = window.innerWidth - todoContainer.offsetWidth;
            if (ny < 0) ny = 0;
            if (ny + todoContainer.offsetHeight > window.innerHeight) ny = window.innerHeight - todoContainer.offsetHeight;

            todoContainer.style.left = nx + 'px';
            todoContainer.style.top = ny + 'px';
            todoContainer.style.bottom = 'auto';
        };
        todoHeader.onpointerup = (e) => {
            if (!todoDragActive) return;
            todoContainer.releasePointerCapture(e.pointerId);
            todoDragActive = false;
            rtdb.ref(`todo_position/${getPlatformKey()}`).set({
                x: todoContainer.offsetLeft,
                y: todoContainer.offsetTop
            });
        };

        function toggleTodoCollapse() {
            isTodoCollapsed = !isTodoCollapsed;
            document.getElementById('todo-body').style.display = isTodoCollapsed ? 'none' : 'flex';
            document.querySelector('.todo-toggle-btn').innerText = isTodoCollapsed ? '[ + ]' : '[ - ]';
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');
            if (!list) return;
            list.innerHTML = '';

            todoItems.forEach((todo, index) => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <div class="todo-label-group">
                        <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodoComplete(${index})">
                        <span class="todo-text">${todo.text}</span>
                    </div>
                    <div class="todo-controls">
                        <button class="todo-btn" onclick="editTodoItem(${index})">✎</button>
                        <button class="todo-btn" onclick="moveTodoOrder(${index}, -1)">▲</button>
                        <button class="todo-btn" onclick="moveTodoOrder(${index}, 1)">▼</button>
                        <button class="todo-btn del" onclick="deleteTodoItem(${index})">✕</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function addTodoItem(e) {
            e.preventDefault();
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if (!text) return;
            todoItems.push({ text, completed: false });
            input.value = '';
            rtdb.ref('todos').set(todoItems);
        }

        function toggleTodoComplete(index) {
            todoItems[index].completed = !todoItems[index].completed;
            rtdb.ref('todos').set(todoItems);
        }

        function editTodoItem(index) {
            const newText = prompt("Modify item definition:", todoItems[index].text);
            if (newText !== null && newText.trim() !== "") {
                todoItems[index].text = newText.trim();
                rtdb.ref('todos').set(todoItems);
            }
        }

        function deleteTodoItem(index) {
            if (confirm("Purge task from history?")) {
                todoItems.splice(index, 1);
                rtdb.ref('todos').set(todoItems);
            }
        }

        function moveTodoOrder(index, direction) {
            const targetIndex = index + direction;
            if (targetIndex >= 0 && targetIndex < todoItems.length) {
                const temp = todoItems[index];
                todoItems[index] = todoItems[targetIndex];
                todoItems[targetIndex] = temp;
                rtdb.ref('todos').set(todoItems);
            }
        }

        function handleResize(e, el, id) { e.stopPropagation(); const platform = getPlatformKey(); const frame = el.querySelector('.relic-frame, .folder-frame'); const startW = frame.offsetWidth; const sX = e.clientX; const onM = (ev) => { const nw = Math.max(40, startW + (ev.clientX - sX)); frame.style.width = nw + 'px'; frame.style.height = nw + 'px'; el.style.width = nw + 'px'; }; const onU = () => { window.removeEventListener('pointermove', onM); window.removeEventListener('pointerup', onU); rtdb.ref(`relics/${id}/layouts/${platform}`).update({ w: parseInt(frame.style.width) }); }; window.addEventListener('pointermove', onM); window.addEventListener('pointerup', onU); }
        
        function showMenu(e) { 
            const m = document.getElementById('context-menu'); 
            m.style.display = 'block'; 
            document.getElementById('move-sub-menu').style.display = 'none';

            let targetX = e.clientX;
            let targetY = e.clientY;

            if (targetX + 190 > window.innerWidth) targetX = window.innerWidth - 190;
            if (targetY + 220 > window.innerHeight) targetY = window.innerHeight - 220;
            if (targetY < 0) targetY = 10;

            m.style.left = targetX + 'px'; 
            m.style.top = targetY + 'px'; 
            m.scrollTop = 0;
        }

        function toggleMoveMenu() { 
            const sub = document.getElementById('move-sub-menu'); 
            sub.innerHTML = `<div class="menu-item" onclick="moveRelic('root')">🏛 INDEX</div>`; 
            Object.entries(allRelics).forEach(([id, r]) => { 
                if(r.type === 'folder' && id !== activeMenuId) {
                    sub.innerHTML += `<div class="menu-item" onclick="moveRelic('${id}')">📁 ${r.name.toUpperCase()}</div>`; 
                }
            }); 
            sub.style.display = sub.style.display === 'none' ? 'block' : 'none'; 
        }

        function moveRelic(dest) { rtdb.ref(`relics/${activeMenuId}`).update({ parent: dest }); closeMenu(); }
        function showCalc() { document.getElementById('calc-modal').style.display = 'flex'; }
        function showSummon() { document.getElementById('summon-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        function menuDelete() { if(confirm("Banish?")) rtdb.ref(`relics/${activeMenuId}`).remove(); closeMenu(); }
        function menuRename() { const n = prompt("New Name:", allRelics[activeMenuId].name); if(n) rtdb.ref(`relics/${activeMenuId}`).update({name: n}); closeMenu(); }
        function menuSnapOriginal() { rtdb.ref(`relics/${activeMenuId}/layouts/${getPlatformKey()}`).update({w: null}); closeMenu(); }
        function swapImage(input) { if(input.files[0]) { const r = new FileReader(); r.onload = (e) => rtdb.ref(`relics/${activeMenuId}`).update({imgUrl: e.target.result}); r.readAsDataURL(input.files[0]); } closeMenu(); }
        function runCalcRitual() { const a = parseFloat(document.getElementById('calc-amount').value); const p = parseFloat(document.getElementById('calc-percent').value); if (!isNaN(a)) alert(`Tithe: ${(a * (p/100)).toFixed(2)}`); closeModals(); }
        function runSummonRitual() { const name = document.getElementById('sum-name').value; const url = document.getElementById('sum-url').value; const type = document.getElementById('sum-type').value; const file = document.getElementById('sum-file').files[0]; if (!name) return; const save = (img) => { rtdb.ref('relics').push({ name, url, type, parent: currentFolder, imgUrl: img || "", layouts: { mobile: {vx: 10, vy: 15}, tablet: {vx: 10, vy: 15} } }); closeModals(); }; if (file) { const r = new FileReader(); r.onload = (e) => save(e.target.result); r.readAsDataURL(file); } else save(""); }
        function toggleEdit() { isEditMode = !isEditMode; render(); }
        function enterFolder(id, name) { currentFolder = id; document.getElementById('status-display').innerText = name.toUpperCase(); document.getElementById('back-btn').style.display = 'inline-block'; render(); }
        function goBack() { currentFolder = 'root'; document.getElementById('status-display').innerText = "GOTHIC ARCHIVE"; document.getElementById('back-btn').style.display = 'none'; render(); }
        window.onresize = render;
    </script>
</body>
</html>
