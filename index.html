<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/compass--v1.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --obsidian: #050505; --crimson: #7a0000; --gold: #8c7340; --text: #a19a89; --panel-bg: rgba(10, 10, 10, 0.95); }
        
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: var(--obsidian); color: var(--text);
            font-family: 'Playfair Display', serif; overflow-x: hidden;
            -webkit-user-select: none; user-select: none; touch-action: none; 
        }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), 
                              url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
            display: flex; flex-direction: column; min-height: 100vh;
        }

        #top-controls { 
            width: 100%; padding: 15px; display: flex; gap: 12px;
            align-items: center; justify-content: center; z-index: 3000; 
            padding-top: env(safe-area-inset-top, 15px);
        }

        /* Nav Buttons from Screenshot */
        .nav-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 20px; font-family: 'Cinzel'; font-size: 0.7rem; border-radius: 4px;
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .edit-btn { position: absolute; right: 20px; top: 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); padding: 5px 15px; border-radius: 4px; font-family: 'Cinzel'; font-size: 0.65rem; }

        #archive-grid { 
            position: relative; width: 100%; max-width: 1200px; margin: 0 auto;
            flex-grow: 1; padding: 20px; display: flex; flex-wrap: wrap; gap: 25px;
            justify-content: center; align-content: flex-start;
        }

        /* Icons styling */
        .relic-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; width: 80px; }
        .relic-frame, .folder-frame { 
            width: 70px; height: 70px; border-radius: 18px; overflow: hidden; 
            background: #111; border: 1.5px solid var(--crimson); box-shadow: 0 0 10px rgba(122,0,0,0.3);
        }
        .relic-frame img, .folder-frame img { width: 100%; height: 100%; object-fit: cover; }
        .relic-name { margin-top: 6px; font-family: 'Cinzel'; font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-content {
            background: var(--obsidian); border: 1px solid var(--gold); border-radius: 8px;
            width: 90%; max-width: 400px; padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,1);
        }
        .modal-input {
            width: 100%; background: #111; border: 1px solid #333; color: #fff;
            padding: 12px; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box;
            font-family: 'Playfair Display';
        }
        .modal-select { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 10px; border-radius: 6px; }
        .ritual-btn {
            width: 100%; background: var(--crimson); color: #fff; border: none;
            padding: 15px; border-radius: 6px; font-family: 'Cinzel'; 
            cursor: pointer; text-transform: uppercase; font-weight: bold;
        }

        /* Drag & UI logic */
        .dragging { opacity: 0.7; z-index: 5000 !important; position: fixed !important; pointer-events: none; }
        .placeholder { opacity: 0; pointer-events: none; }
        #context-menu { position: fixed; display: none; background: #0a0a0a; border: 1px solid var(--gold); z-index: 5000; width: 200px; }
        .menu-item { padding: 12px; color: var(--gold); font-family: 'Cinzel'; border-bottom: 1px solid #1a1a1a; cursor: pointer; text-align: center; }
    </style>
</head>
<body onclick="closeModals(); closeMenu();">

    <button id="edit-toggle" class="edit-btn" onclick="event.stopPropagation(); toggleEdit()">EDIT</button>

    <div id="top-controls">
        <button id="back-btn" class="nav-btn" onclick="goBack()" style="display:none;">←</button>
        <a href="oracle.html" class="nav-btn">ORACLE</a>
        <button class="nav-btn" onclick="event.stopPropagation(); showCalc()">CALCULATOR</button>
        <button class="nav-btn" onclick="event.stopPropagation(); showSummon()">SUMMON</button>
    </div>

    <main id="archive-grid"></main>

    <div id="calc-modal" class="modal-overlay" onclick="event.stopPropagation()">
        <div class="modal-content">
            <input type="number" id="calc-amount" class="modal-input" placeholder="Amount">
            <input type="number" id="calc-percent" class="modal-input" value="20">
            <button class="ritual-btn" onclick="runCalcRitual()">CALCULATE RITUAL</button>
        </div>
    </div>

    <div id="summon-modal" class="modal-overlay" onclick="event.stopPropagation()">
        <div class="modal-content">
            <input type="text" id="sum-name" class="modal-input" placeholder="Name">
            <input type="text" id="sum-url" class="modal-input" placeholder="URL">
            <select id="sum-type" class="modal-select">
                <option value="relic">Relic</option>
                <option value="folder">Folder</option>
            </select>
            <input type="file" id="sum-file" class="modal-input">
            <button class="ritual-btn" onclick="runSummonRitual()">COMMEMORATE</button>
        </div>
    </div>

    <div id="context-menu" onclick="event.stopPropagation()">
        <div class="menu-item" onclick="menuRename()">Rename</div>
        <div class="menu-item" onclick="document.getElementById('img-swap').click()">Change Image</div>
        <div class="menu-item" onclick="menuSnapOriginal()">Snap Original</div>
        <div class="menu-item" onclick="menuDelete()" style="color:var(--crimson)">Banish</div>
    </div>
    <input type="file" id="img-swap" style="display:none" onchange="swapImage(this)">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAuNbY1Xv_ZF3kJah20qqPBz-IiiMAR9gE",
            authDomain: "aidenstartpage.firebaseapp.com",
            databaseURL: "https://aidenstartpage-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenstartpage"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();

        let isEditMode = false, currentFolder = 'root', allRelics = {}, activeMenuId = null;
        let dragEl = null, placeholder = null, startX, startY, initialX, initialY;

        auth.onAuthStateChanged(user => { if (user) syncData(); else auth.signInAnonymously(); });
        function syncData() { rtdb.ref('relics').on('value', snap => { allRelics = snap.val() || {}; renderGrid(); }); }

        function renderGrid() {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            document.getElementById('edit-toggle').innerText = isEditMode ? "LOCK" : "EDIT";

            const items = Object.entries(allRelics)
                .filter(([id, r]) => r.parent === currentFolder)
                .sort((a, b) => (a[1].sortOrder || 0) - (b[1].sortOrder || 0));

            items.forEach(([id, r]) => {
                const wrap = document.createElement('div');
                wrap.className = 'relic-wrapper'; wrap.dataset.id = id;
                wrap.style.width = (r.w || 80) + 'px';
                wrap.innerHTML = `
                    <div class="${r.type === 'folder' ? 'folder-frame' : 'relic-frame'}" style="width:${r.w||70}px; height:${r.h||70}px;">
                        ${r.imgUrl ? `<img src="${r.imgUrl}">` : `<span style="color:var(--gold); font-family:Cinzel; font-size:20px;">${r.type[0].toUpperCase()}</span>`}
                    </div>
                    <span class="relic-name">${r.name}</span>
                `;

                wrap.onpointerdown = (e) => {
                    if (!isEditMode) {
                        if (r.type === 'folder') enterFolder(id, r.name);
                        else if (r.url) window.open(r.url.startsWith('http') ? r.url : 'https://' + r.url, '_blank');
                        return;
                    }
                    const now = Date.now();
                    if (now - (wrap.lastTap || 0) < 300) { activeMenuId = id; showMenu(e); return; }
                    wrap.lastTap = now;

                    dragEl = wrap; const rect = wrap.getBoundingClientRect(); startX = e.clientX; startY = e.clientY; initialX = rect.left; initialY = rect.top;
                    placeholder = wrap.cloneNode(true); placeholder.classList.add('placeholder'); wrap.before(placeholder);
                    wrap.classList.add('dragging'); wrap.style.left = initialX + 'px'; wrap.style.top = initialY + 'px'; wrap.setPointerCapture(e.pointerId);
                };

                wrap.onpointermove = (e) => {
                    if (!dragEl || dragEl !== wrap) return;
                    wrap.style.left = (initialX + (e.clientX - startX)) + 'px';
                    wrap.style.top = (initialY + (e.clientY - startY)) + 'px';
                    const target = document.elementFromPoint(e.clientX, e.clientY);
                    const over = target?.closest('.relic-wrapper:not(.dragging):not(.placeholder)');
                    if (over && over !== placeholder) {
                        const children = Array.from(grid.children);
                        if (children.indexOf(over) > children.indexOf(placeholder)) over.after(placeholder);
                        else over.before(placeholder);
                    }
                };

                wrap.onpointerup = (e) => {
                    if (!dragEl || dragEl !== wrap) return;
                    wrap.releasePointerCapture(e.pointerId);
                    placeholder.after(wrap); placeholder.remove();
                    const order = Array.from(grid.querySelectorAll('.relic-wrapper:not(.placeholder)')).map(el => el.dataset.id);
                    const updates = {}; order.forEach((fid, i) => { if(fid) updates[`relics/${fid}/sortOrder`] = i; });
                    rtdb.ref().update(updates);
                    wrap.classList.remove('dragging'); wrap.style.position = ''; wrap.style.left = ''; wrap.style.top = '';
                    dragEl = null;
                };
                grid.appendChild(wrap);
            });
        }

        // Modal Handlers
        function showCalc() { document.getElementById('calc-modal').style.display = 'flex'; }
        function showSummon() { document.getElementById('summon-modal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        function runCalcRitual() {
            const a = parseFloat(document.getElementById('calc-amount').value);
            const p = parseFloat(document.getElementById('calc-percent').value);
            if (!isNaN(a)) alert(`Tithe Result: ${(a * (p/100)).toFixed(2)}`);
            closeModals();
        }

        function runSummonRitual() {
            const name = document.getElementById('sum-name').value;
            const url = document.getElementById('sum-url').value;
            const type = document.getElementById('sum-type').value;
            const file = document.getElementById('sum-file').files[0];

            if (!name) return;
            const finish = (imgData) => {
                rtdb.ref('relics').push({ name, url, type, parent: currentFolder, imgUrl: imgData || "", w: 70, h: 70, sortOrder: Date.now() });
                closeModals();
            };

            if (file) {
                const reader = new FileReader(); reader.onload = (e) => finish(e.target.result); reader.readAsDataURL(file);
            } else finish("");
        }

        function showMenu(e) { const m = document.getElementById('context-menu'); m.style.display = 'block'; m.style.left = e.clientX + 'px'; m.style.top = e.clientY + 'px'; }
        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        function menuDelete() { if(confirm("Banish?")) rtdb.ref(`relics/${activeMenuId}`).remove(); closeMenu(); }
        function menuRename() { const n = prompt("New Name:", allRelics[activeMenuId].name); if(n) rtdb.ref(`relics/${activeMenuId}`).update({name: n}); closeMenu(); }
        function menuSnapOriginal() { rtdb.ref(`relics/${activeMenuId}`).update({w:70, h:70}); closeMenu(); }
        function swapImage(input) { if(input.files[0]) { const r = new FileReader(); r.onload = (e) => rtdb.ref(`relics/${activeMenuId}`).update({imgUrl: e.target.result}); r.readAsDataURL(input.files[0]); } closeMenu(); }
        
        function toggleEdit() { isEditMode = !isEditMode; renderGrid(); }
        function enterFolder(id, name) { currentFolder = id; document.getElementById('back-btn').style.display = 'block'; renderGrid(); }
        function goBack() { currentFolder = 'root'; document.getElementById('back-btn').style.display = 'none'; renderGrid(); }
    </script>
</body>
</html>
