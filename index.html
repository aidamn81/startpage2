<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Gothic Archive</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/compass--v1.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --obsidian: #050505; --crimson: #7a0000; --gold: #8c7340; --text: #a19a89;
        }
        
        html, body { 
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: var(--obsidian);
            color: var(--text); font-family: 'Playfair Display', serif;
            overflow-x: hidden; overflow-y: auto;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
        }

        .lock-scroll { overflow: hidden !important; }

        body {
            background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), 
                              url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
            min-height: 100vh; display: flex; flex-direction: column;
        }

        #top-controls { 
            width: 100%; padding: 10px 15px; display: flex; gap: 8px;
            align-items: center; border-bottom: 1px solid #1a1a1a; background: #000; 
            box-sizing: border-box; z-index: 3000; position: sticky; top: 0;
            padding-top: env(safe-area-inset-top, 10px);
        }

        #archive-grid { 
            position: relative; width: 100%; flex-grow: 1;
            box-sizing: border-box; z-index: 5; padding: 15px;
            display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start;
            justify-content: flex-start;
        }

        @keyframes wiggle {
            0% { transform: rotate(-1deg); }
            50% { transform: rotate(1deg); }
            100% { transform: rotate(-1deg); }
        }
        .is-editing .relic-wrapper:not(.dragging) { animation: wiggle 0.3s infinite ease-in-out; }

        .relic-wrapper { 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; cursor: pointer; z-index: 10;
            flex-shrink: 0; transition: transform 0.2s ease; touch-action: none;
        }
        .dragging { opacity: 0.2; transform: scale(0.8); animation: none !important; }

        .relic-frame, .folder-frame { 
            border-radius: 15%; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            background: #111; border: 1.5px solid #222; position: relative;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6); pointer-events: none;
        }
        .folder-frame::after {
            content: ""; position: absolute; inset: 0;
            background-size: 100% 100%;
        }
        .relic-frame img, .folder-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .relic-name { 
            margin-top: 6px; font-family: 'Cinzel'; 
            font-size: 0.7rem; color: #fff; text-align: center; width: 100%;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
        }

        .resize-handle {
            position: absolute; bottom: -12px; right: -12px; width: 38px; height: 38px;
            background: var(--gold); border-radius: 50%; z-index: 50; display: none;
            border: 3px solid #000; pointer-events: auto;
        }
        .is-editing .resize-handle { display: block; }

        /* Admin Modal */
        #admin-modal, #calc-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 6000; padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: #0a0a0a; border: 2px solid var(--gold); width: 100%; max-width: 400px;
            padding: 25px; border-radius: 12px; font-family: 'Cinzel';
        }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #111;
            border: 1px solid #333; color: var(--gold); border-radius: 5px; box-sizing: border-box;
        }

        /* Percentage Calculator Styles */
        #calc-result { font-size: 1.5rem; color: var(--gold); text-align: center; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }

        /* Context Menu */
        #context-menu {
            position: fixed; display: none; background: #0a0a0a; border: 1px solid var(--gold);
            border-radius: 8px; z-index: 5000; width: 220px; box-shadow: 0 0 40px #000;
            max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .menu-item { padding: 14px; color: var(--gold); font-family: 'Cinzel'; font-size: 0.85rem; border-bottom: 1px solid #1a1a1a; cursor: pointer; text-align: center; flex-shrink: 0; }
        .menu-item:last-child { border-bottom: none; color: var(--crimson); }
        
        #folder-list-container { 
            max-height: 200px; overflow-y: auto; background: #050505;
            border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold);
        }

        .toggle-btn { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 7px 12px; font-family: 'Cinzel'; font-size: 0.75rem; border-radius: 6px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="closeMenu()">

    <div id="top-controls">
        <button id="back-btn" class="toggle-btn" style="display:none;" onclick="goBack()">←</button>
        <span id="status-text" style="font-family:'Cinzel'; color:var(--gold); flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Gothic Archive</span>
        <button class="toggle-btn" onclick="openCalc()">%</button>
        <a href="oracle.html" class="toggle-btn">Oracle</a>
        <button class="toggle-btn" onclick="openAdmin()">Summon</button>
        <button id="edit-toggle" class="toggle-btn">Edit</button>
    </div>

    <div id="calc-modal" onclick="if(event.target==this) closeCalc()">
        <div class="modal-content">
            <h2 style="color: var(--gold); margin-top: 0; text-align: center;">Tithe Calculator</h2>
            <label style="font-size: 0.7rem; color: var(--gold);">Base Number</label>
            <input type="number" id="calc-base" placeholder="Enter amount..." oninput="runCalc()">
            <label style="font-size: 0.7rem; color: var(--gold);">Percentage (%)</label>
            <input type="number" id="calc-percent" value="20" oninput="runCalc()">
            <div id="calc-result">Result: 0</div>
            <button class="toggle-btn" style="width:100%; margin-top: 15px;" onclick="closeCalc()">Dismiss</button>
        </div>
    </div>

    <input type="file" id="image-upload" style="display:none;" accept="image/*">
    <input type="file" id="modal-upload" style="display:none;" accept="image/*">

    <div id="admin-modal" onclick="if(event.target==this) closeAdmin()">
        <div class="modal-content">
            <h2>New Creation</h2>
            <select id="creation-type" onchange="toggleRelicFields()">
                <option value="relic">Relic (Link)</option>
                <option value="folder">Folder</option>
            </select>
            <input type="text" id="new-name" placeholder="Name">
            <input type="text" id="new-url" id="new-url-field" placeholder="URL">
            <button class="toggle-btn" style="width:100%; margin-bottom:15px;" onclick="document.getElementById('modal-upload').click()">Upload Cover</button>
            <div id="upload-status" style="font-size:0.7rem; color:var(--gold); margin-bottom:10px; text-align:center;">No image selected</div>
            <button class="toggle-btn" style="width:100%; background:var(--gold); color:#000;" onclick="createSomething()">Manifest</button>
        </div>
    </div>

    <main id="archive-grid"></main>

    <div id="context-menu" style="display:none;">
        <div class="menu-item" onclick="menuRename()">Rename</div>
        <div class="menu-item" onclick="menuChangeImage()">Upload Photo</div>
        <div class="menu-item" onclick="menuSnapOriginal()">Resize to Original</div>
        <div class="menu-item" onclick="toggleMoveOptions(event)">Move to Folder...</div>
        <div id="folder-list-container" style="display:none;"></div>
        <div class="menu-item" onclick="menuDelete()">Banish (Confirm)</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAuNbY1Xv_ZF3kJah20qqPBz-IiiMAR9gE",
            authDomain: "aidenstartpage.firebaseapp.com",
            databaseURL: "https://aidenstartpage-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aidenstartpage"
        };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();
        const auth = firebase.auth();

        let isEditMode = false, currentFolder = 'root', allRelics = {}, activeMenuId = null, pendingImage = null;

        // --- Percentage Calculator Logic ---
        function openCalc() { document.getElementById('calc-modal').style.display = 'flex'; }
        function closeCalc() { document.getElementById('calc-modal').style.display = 'none'; }
        function runCalc() {
            const num = parseFloat(document.getElementById('calc-base').value) || 0;
            const perc = parseFloat(document.getElementById('calc-percent').value) || 0;
            const result = (num * (perc / 100)).toFixed(2);
            document.getElementById('calc-result').innerText = `Result: ${result}`;
        }

        auth.onAuthStateChanged(user => { if (user) syncData(); else auth.signInAnonymously(); });

        function syncData() {
            rtdb.ref('relics').on('value', snap => {
                allRelics = snap.val() || {};
                renderGrid();
            });
        }

        function renderGrid() {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            if(isEditMode) grid.classList.add('is-editing'); else grid.classList.remove('is-editing');
            
            const items = Object.entries(allRelics)
                .filter(([id, r]) => r.parent === currentFolder)
                .sort((a, b) => (a[1].sortOrder || 0) - (b[1].sortOrder || 0));

            items.forEach(([id, r]) => {
                const wrap = document.createElement('div');
                wrap.className = 'relic-wrapper';
                wrap.id = `relic-${id}`;
                const w = r.w || 80; const h = r.h || 80;
                wrap.style.width = w + 'px';

                wrap.innerHTML = `
                    <div class="${r.type === 'folder' ? 'folder-frame' : 'relic-frame'}" style="width:${w}px; height:${h}px;">
                        ${r.imgUrl ? `<img src="${r.imgUrl}">` : `<div style="color:var(--gold); font-size:1.4rem;">${r.type[0].toUpperCase()}</div>`}
                    </div>
                    <span class="relic-name">${r.name}</span>
                    <div class="resize-handle"></div>
                `;

                wrap.draggable = isEditMode;
                wrap.ondragstart = (e) => {
                    if (e.target.classList.contains('resize-handle')) return e.preventDefault();
                    e.dataTransfer.setData('text/plain', id);
                    wrap.classList.add('dragging');
                };
                wrap.ondragend = () => wrap.classList.remove('dragging');
                wrap.ondragover = (e) => { e.preventDefault(); if (!wrap.classList.contains('dragging')) wrap.style.transform = "scale(1.1)"; };
                wrap.ondragleave = () => wrap.style.transform = "scale(1)";
                wrap.ondrop = (e) => {
                    e.preventDefault(); wrap.style.transform = "scale(1)";
                    const draggedId = e.dataTransfer.getData('text/plain');
                    if (draggedId !== id) insertAt(draggedId, id);
                };

                let lastTap = 0;
                wrap.onpointerdown = (e) => {
                    if (isEditMode) {
                        if (e.target.classList.contains('resize-handle')) {
                            e.stopPropagation(); document.body.classList.add('lock-scroll');
                            handleResize(e, wrap, id);
                        } else {
                            const now = Date.now();
                            if (now - lastTap < 300) { activeMenuId = id; showMenu(e); }
                            lastTap = now;
                        }
                    }
                };

                wrap.onclick = () => {
                    if (!isEditMode) {
                        if (r.type === 'folder') enterFolder(id, r.name);
                        else if (r.url) window.open(r.url.startsWith('http') ? r.url : 'https://' + r.url, '_blank');
                    }
                };
                grid.appendChild(wrap);
            });
        }

        function insertAt(draggedId, targetId) {
            const items = Object.entries(allRelics).filter(([id, r]) => r.parent === currentFolder).sort((a, b) => (a[1].sortOrder || 0) - (b[1].sortOrder || 0)).map(([id]) => id);
            const oldIdx = items.indexOf(draggedId); const newIdx = items.indexOf(targetId);
            items.splice(oldIdx, 1); items.splice(newIdx, 0, draggedId);
            const updates = {}; items.forEach((id, i) => { updates[`relics/${id}/sortOrder`] = i; });
            rtdb.ref().update(updates);
        }

        function handleResize(e, el, id) {
            const frame = el.querySelector('.relic-frame, .folder-frame');
            const startW = frame.offsetWidth;
            const startX = e.clientX || (e.touches ? e.touches[0].clientX : e.clientX);
            const onMove = (ev) => {
                const currentX = ev.clientX || (ev.touches ? ev.touches[0].clientX : ev.clientX);
                const nw = Math.max(40, startW + (currentX - startX));
                frame.style.width = nw + 'px'; frame.style.height = nw + 'px'; el.style.width = nw + 'px';
            };
            const onEnd = () => {
                window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onEnd);
                document.body.classList.remove('lock-scroll');
                rtdb.ref(`relics/${id}`).update({ w: parseInt(frame.style.width), h: parseInt(frame.style.height) });
            };
            window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onEnd);
        }

        function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; pendingImage = null; document.getElementById('upload-status').innerText = "No image selected"; }
        
        function toggleRelicFields() {
            const type = document.getElementById('creation-type').value;
            document.getElementById('new-url').style.display = type === 'relic' ? 'block' : 'none';
        }

        document.getElementById('modal-upload').onchange = function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) { pendingImage = event.target.result; document.getElementById('upload-status').innerText = "Image Captured"; };
            reader.readAsDataURL(file);
        };

        function createSomething() {
            const type = document.getElementById('creation-type').value;
            const name = document.getElementById('new-name').value || "Unnamed";
            const url = document.getElementById('new-url').value || "";
            const newId = rtdb.ref('relics').push().key;
            rtdb.ref(`relics/${newId}`).set({
                name, url, type, parent: currentFolder, imgUrl: pendingImage || "",
                w: 80, h: 80, sortOrder: Object.keys(allRelics).length
            });
            closeAdmin();
        }

        function showMenu(e) {
            const m = document.getElementById('context-menu');
            document.getElementById('folder-list-container').style.display = 'none';
            m.style.display = 'flex';
            const clickX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clickY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            m.style.left = Math.min(clickX, window.innerWidth - 230) + 'px';
            m.style.top = Math.min(clickY, window.innerHeight - 400) + 'px';
        }
        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        function menuChangeImage() { document.getElementById('image-upload').click(); }
        document.getElementById('image-upload').onchange = function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) { rtdb.ref(`relics/${activeMenuId}`).update({ imgUrl: event.target.result }); closeMenu(); };
            reader.readAsDataURL(file);
        };

        function toggleMoveOptions(e) {
            e.stopPropagation();
            const container = document.getElementById('folder-list-container');
            container.innerHTML = `<div class="menu-item" style="background:#111; font-size:0.75rem;" onclick="moveRelic('root')">🏛 INDEX</div>`;
            Object.entries(allRelics).forEach(([id, r]) => {
                if (r.type === 'folder' && id !== activeMenuId) {
                    container.innerHTML += `<div class="menu-item" style="background:#111; font-size:0.75rem;" onclick="moveRelic('${id}')">📁 ${r.name.toUpperCase()}</div>`;
                }
            });
            container.style.display = container.style.display === 'none' ? 'block' : 'none';
        }

        function moveRelic(destId) { rtdb.ref(`relics/${activeMenuId}`).update({ parent: destId }); closeMenu(); }
        function menuRename() { const n = prompt("Name:", allRelics[activeMenuId].name); if (n) rtdb.ref(`relics/${activeMenuId}`).update({ name: n }); }
        function menuSnapOriginal() { rtdb.ref(`relics/${activeMenuId}`).update({ w: 80, h: 80 }); }
        function menuDelete() { if (confirm("Banish?")) rtdb.ref(`relics/${activeMenuId}`).remove(); }

        function enterFolder(id, name) { currentFolder = id; document.getElementById('status-text').innerText = name; document.getElementById('back-btn').style.display = 'block'; renderGrid(); }
        function goBack() { currentFolder = 'root'; document.getElementById('status-text').innerText = "Gothic Archive"; document.getElementById('back-btn').style.display = 'none'; renderGrid(); }
        document.getElementById('edit-toggle').onclick = () => { isEditMode = !isEditMode; document.getElementById('edit-toggle').innerText = isEditMode ? "Lock" : "Edit"; renderGrid(); };
    </script>
</body>
</html>
