<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Route Planner - London Departure</title>
    <style>
        :root {
            --bg-main: #0d0d11;
            --bg-card: #14141c;
            --border-color: #262636;
            --text-primary: #f1f1f6;
            --text-secondary: #8e8e9f;
            --accent-glow: #7a5cff;
            --accent-success: #10b981;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 850px;
            background: linear-gradient(145deg, #0f0f15, #12121a);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        .app-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(20, 20, 28, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title-area h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-title-area p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .back-link, .accom-link {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-link:hover, .accom-link:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .accom-link {
            background: rgba(122, 92, 255, 0.1);
            border-color: rgba(122, 92, 255, 0.3);
            color: #bfaeff;
        }

        .accom-link:hover {
            background: rgba(122, 92, 255, 0.2);
            border-color: var(--accent-glow);
            color: var(--text-primary);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .search-box label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #bfaeff;
            font-weight: 700;
        }

        .dateTime-wrapper {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
        }

        .input-field {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 2px rgba(122, 92, 255, 0.15);
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.9);
            cursor: pointer;
        }

        .search-btn {
            background: var(--accent-glow);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 4px;
        }

        .search-btn:hover {
            background: #6543fa;
        }

        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .destination-title {
            font-size: 18px;
            font-weight: 700;
            border-left: 3px solid var(--accent-glow);
            padding-left: 10px;
            margin-top: 5px;
        }

        .metric-cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: center;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 15px;
            font-weight: 600;
            color: #bfaeff;
        }

        .itinerary-card {
            background: #181826;
            border: 1px solid #31314a;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 12px;
        }

        .itinerary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .transit-type {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }

        .transit-operator {
            font-size: 11px;
            background: rgba(122, 92, 255, 0.2);
            color: #bfaeff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .itinerary-details p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .itinerary-details strong {
            color: var(--text-primary);
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-title-area">
            <h1>UK Route Planner</h1>
            <p>Departure Station: London</p>
        </div>
        <div class="header-actions">
            <a href="accom.html" class="accom-link">Accommodation</a>
            <a href="index.html" class="back-link">← Back</a>
        </div>
    </header>

    <main class="main-content">
        <section class="search-box">
            <div class="input-group">
                <label for="destInput">Destination Location</label>
                <input type="text" id="destInput" class="input-field" placeholder="e.g., Manchester, Brighton, York..." autocomplete="off">
            </div>

            <div class="dateTime-wrapper">
                <div class="input-group">
                    <label for="dateInput">Travel Date</label>
                    <input type="date" id="dateInput" class="input-field">
                </div>
                <div class="input-group">
                    <label for="timeInput">Time (Optional)</label>
                    <input type="time" id="timeInput" class="input-field">
                </div>
            </div>

            <button id="searchBtn" class="search-btn">Find Routes</button>
        </section>

        <section id="resultsWrapper" class="results-panel hidden">
            <h2 id="displayTargetName" class="destination-title">Destination</h2>
            
            <div class="metric-cards-grid">
                <div class="metric-card">
                    <span class="metric-label">Rail Distance</span>
                    <span id="railDistValue" class="metric-value">-</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Road Distance</span>
                    <span id="roadDistValue" class="metric-value">-</span>
                </div>
            </div>

            <div id="itineraryCardsContainer">
                <!-- Transit option cards will append here -->
            </div>
        </section>
    </main>
</div>

<script>
    const destInput = document.getElementById('destInput');
    const dateInput = document.getElementById('dateInput');
    const timeInput = document.getElementById('timeInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsWrapper = document.getElementById('resultsWrapper');
    const displayTargetName = document.getElementById('displayTargetName');
    const railDistValue = document.getElementById('railDistValue');
    const roadDistValue = document.getElementById('roadDistValue');
    const itineraryCardsContainer = document.getElementById('itineraryCardsContainer');

    // Default lookup database matching your required exact values
    const routeDatabase = {
        "manchester": {
            railKm: "294 km",
            roadKm: "322 km",
            options: [
                {
                    type: "Train Option",
                    operator: "Trainline / Avanti",
                    time: "2h 3m – 2h 15m",
                    details: "Direct line from London Euston to Manchester Piccadilly. Runs every 30 minutes."
                },
                {
                    type: "Bus / Coach Option",
                    operator: "FlixBus",
                    time: "4h 50m",
                    details: "Direct budget coach service from London Victoria straight to Manchester Shudehill."
                },
                {
                    type: "Bus / Coach Option",
                    operator: "National Express",
                    time: "5h 25m",
                    details: "Frequent schedule out of London Victoria to Manchester Shudehill Interchange."
                }
            ]
        },
        // Fallback placeholder data for other inputs to keep layout stable
        "default": {
            railKm: "Calculated Route",
            roadKm: "Calculated Route",
            options: [
                {
                    type: "Train Option",
                    operator: "Trainline",
                    time: "Check dynamic live schedule boards",
                    details: "Routes depart frequently from central London terminals."
                }
            ]
        }
    };

    const today = new Date();
    dateInput.value = today.toISOString().split('T')[0];

    searchBtn.addEventListener('click', processQuery);
    destInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processQuery(); });

    function processQuery() {
        const query = destInput.value.trim();
        if (!query) return;

        const key = query.toLowerCase();
        const data = routeDatabase[key] || routeDatabase["default"];

        // Toggle UI frame visibility
        resultsWrapper.classList.remove('hidden');
        displayTargetName.textContent = query.charAt(0).toUpperCase() + query.slice(1);
        
        // Render precise distances
        railDistValue.textContent = data.railKm;
        roadDistValue.textContent = data.roadKm;
        
        // Clear old list items safely
        itineraryCardsContainer.innerHTML = '';

        // Dynamically append options straight into your page layout
        data.options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'itinerary-card';
            card.innerHTML = `
                <div class="itinerary-header">
                    <span class="transit-type">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:translateY(1px);"><rect x="4" y="3" width="16" height="14" rx="2"></rect><path d="M4 11h16"></path><path d="M12 3v8"></path><path d="M8 17l-2 4"></path><path d="M16 17l2 4"></path></svg>
                        ${opt.type}
                    </span>
                    <span class="transit-operator">${opt.operator}</span>
                </div>
                <div class="itinerary-details">
                    <p>Duration: <strong>${opt.time}</strong></p>
                    <p style="margin-top:6px; font-size:12px; line-height:1.4;">${opt.details}</p>
                </div>
            `;
            itineraryCardsContainer.appendChild(card);
        });
    }
</script>

</body>
</html>
