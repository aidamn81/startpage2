<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Route Planner - London Departure</title>
    <style>
        :root {
            --bg-main: #0d0d11;
            --bg-card: #14141c;
            --border-color: #262636;
            --text-primary: #f1f1f6;
            --text-secondary: #8e8e9f;
            --accent-glow: #7a5cff;
            --accent-success: #10b981;
            --accent-alert: #ef4444;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Fixed App Boundary Container */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 850px;
            background: linear-gradient(145deg, #0f0f15, #12121a);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        /* Header Layout Zone */
        .app-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(20, 20, 28, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title-area h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-title-area p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .back-link {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        /* Scrollable Operational Container Context */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Fixed Input Control Styling */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .search-box label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #bfaeff;
            font-weight: 700;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .dateTime-wrapper {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
        }

        .input-field {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 2px rgba(122, 92, 255, 0.15);
        }

        /* Specific color tuning for system date/time native pickers */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.9);
            cursor: pointer;
        }

        .search-btn {
            background: var(--accent-glow);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 4px;
        }

        .search-btn:hover {
            background: #6543fa;
        }

        /* Absolute Boundary Results Output Panel */
        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .destination-title {
            font-size: 18px;
            font-weight: 700;
            border-left: 3px solid var(--accent-glow);
            padding-left: 10px;
            margin-top: 5px;
        }

        .metric-cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Interactive Route Option Cards */
        .itinerary-card {
            background: #181826;
            border: 1px solid #31314a;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 12px;
        }

        .itinerary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .transit-type {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #bfaeff;
        }

        .fare-badge {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
        }

        .transit-timeline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            padding: 4px 0;
        }

        .timeline-node {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .timeline-node.destination {
            align-items: flex-end;
        }

        .node-time {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .node-station {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .timeline-line {
            flex: 1;
            height: 2px;
            background: #3a3a52;
            margin: 0 16px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timeline-line::before, .timeline-line::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #525273;
            border-radius: 50%;
        }
        .timeline-line::before { left: 0; }
        .timeline-line::after { right: 0; }

        .duration-label {
            font-size: 11px;
            background: #14141c;
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .action-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background: var(--accent-glow);
            color: white;
        }

        .btn-primary:hover {
            background: #6543fa;
            box-shadow: 0 0 12px rgba(122, 92, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--text-secondary);
        }

        /* Departure Device Sync Banner Component */
        .countdown-banner {
            background: linear-gradient(90deg, #1c1340, #131324);
            border: 1px solid rgba(122, 92, 255, 0.4);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .countdown-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .countdown-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #bfaeff;
            font-weight: 700;
        }

        .countdown-clock {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            font-feature-settings: "tnum";
        }

        .countdown-cancel {
            background: transparent;
            border: none;
            color: var(--accent-alert);
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            padding: 4px;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateY(12px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-title-area">
            <h1>UK Route Planner</h1>
            <p>Departure Station: London</p>
        </div>
        <!-- Link context pointing straight back to index.html -->
        <a href="index.html" class="back-link">← Main Site</a>
    </header>

    <main class="main-content">
        <!-- Input Form Block Area -->
        <section class="search-box">
            <div class="input-group">
                <label for="destInput">Destination Location</label>
                <input type="text" id="destInput" class="input-field" placeholder="e.g., Manchester, Brighton, York..." autocomplete="off">
            </div>

            <div class="dateTime-wrapper">
                <div class="input-group">
                    <label for="dateInput">Travel Date</label>
                    <input type="date" id="dateInput" class="input-field">
                </div>
                <div class="input-group">
                    <label for="timeInput">Time (Optional)</label>
                    <input type="time" id="timeInput" class="input-field">
                </div>
            </div>

            <button id="searchBtn" class="search-btn">Find Routes</button>
        </section>

        <!-- Tracking Monitor Banner Section (iOS Shortcut Sync) -->
        <div id="countdownBanner" class="countdown-banner hidden">
            <div class="countdown-info">
                <span class="countdown-title">Device Link Countdown</span>
                <span id="countdownClock" class="countdown-clock">00m 00s remaining</span>
            </div>
            <button class="countdown-cancel" onclick="killTrackingClock()">Cancel</button>
        </div>

        <!-- Output Visual Render Target Box -->
        <section id="resultsWrapper" class="results-panel hidden">
            <h2 id="displayTargetName" class="destination-title">Manchester</h2>
            
            <div class="metric-cards-grid">
                <div class="metric-card">
                    <span class="metric-label">Geodesic Distance</span>
                    <span id="distVal" class="metric-value">-- miles</span>
                </div>
                <div class="metric-card">
                    <span class="metric-label">Estimated Transit</span>
                    <span id="timeVal" class="metric-value">-- mins</span>
                </div>
            </div>

            <div id="itineraryCardsContainer">
                <!-- Programmatically generated transit options append here -->
            </div>
        </section>
    </main>
</div>

<script>
    // Local strict dataset mapping geographic coordinates & routes from London
    const databaseUK = {
        "manchester": { name: "Manchester", distance: 163, trainTime: "2h 06m", trainMinutes: 126, trainPrice: "46.20", busTime: "4h 35m", busMinutes: 275, trainPrice: "46.20", busPrice: "14.50", trainStation: "MAN", busStation: "Coach Stn" },
        "birmingham": { name: "Birmingham", distance: 101, trainTime: "1h 22m", trainMinutes: 82, trainPrice: "29.00", busTime: "2h 45m", busMinutes: 165, trainPrice: "29.00", busPrice: "8.50", trainStation: "BHM", busStation: "Digbeth" },
        "brighton": { name: "Brighton", distance: 47, trainTime: "0h 58m", trainMinutes: 58, trainPrice: "19.80", busTime: "2h 10m", busMinutes: 130, trainPrice: "19.80", busPrice: "6.00", trainStation: "BTN", busStation: "Pool Valley" },
        "york": { name: "York", distance: 174, trainTime: "1h 51m", trainMinutes: 111, trainPrice: "54.10", busTime: "5h 20m", busMinutes: 320, trainPrice: "54.10", busPrice: "18.00", trainStation: "YRK", busStation: "Blossom St" },
        "bristol": { name: "Bristol", distance: 107, trainTime: "1h 34m", trainMinutes: 94, trainPrice: "36.50", busTime: "2h 50m", busMinutes: 170, trainPrice: "36.50", busPrice: "9.00", trainStation: "BRI", busStation: "Marlborough St" },
        "leeds": { name: "Leeds", distance: 170, trainTime: "2h 13m", trainMinutes: 133, trainPrice: "51.00", busTime: "4h 50m", busMinutes: 290, trainPrice: "51.00", busPrice: "16.20", trainStation: "LDS", busStation: "Dyer Street" },
        "liverpool": { name: "Liverpool", distance: 178, trainTime: "2h 21m", trainMinutes: 141, trainPrice: "49.50", busTime: "5h 15m", busMinutes: 315, trainPrice: "49.50", busPrice: "15.00", trainStation: "LIV", busStation: "One Bus Stn" }
    };

    const destInput = document.getElementById('destInput');
    const dateInput = document.getElementById('dateInput');
    const timeInput = document.getElementById('timeInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsWrapper = document.getElementById('resultsWrapper');
    const displayTargetName = document.getElementById('displayTargetName');
    const distVal = document.getElementById('distVal');
    const timeVal = document.getElementById('timeVal');
    const itineraryCardsContainer = document.getElementById('itineraryCardsContainer');
    const countdownBanner = document.getElementById('countdownBanner');
    const countdownClock = document.getElementById('countdownClock');

    let trackingEngine = {
        timerId: null,
        targetTime: null
    };

    // Set default placeholder values matching current active calendar date structure
    const today = new Date();
    dateInput.value = today.toISOString().split('T')[0];

    searchBtn.addEventListener('click', processQuery);
    destInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processQuery(); });

    function processQuery() {
        const query = destInput.value.trim().toLowerCase();
        if (!query) return;

        const dataMatch = databaseUK[query];

        // Resolve historical date parameters seamlessly
        let targetedDepartureBase = new Date(dateInput.value);
        if (timeInput.value) {
            const timeFragments = timeInput.value.split(':');
            targetedDepartureBase.setHours(parseInt(timeFragments[0]), parseInt(timeFragments[1]), 0, 0);
        } else {
            // Fallback default context assignment loops forward to arbitrary upcoming 10 min window if checking today
            const currentRealTime = new Date();
            if (targetedDepartureBase.toDateString() === currentRealTime.toDateString()) {
                targetedDepartureBase = new Date(currentRealTime.getTime() + 10 * 60000);
            } else {
                targetedDepartureBase.setHours(9, 0, 0, 0); // Default to a standard 09:00 morning slot for future dates
            }
        }

        if (dataMatch) {
            renderRouteMetrics(dataMatch, targetedDepartureBase);
        } else {
            const proceduralName = query.charAt(0).toUpperCase() + query.slice(1);
            const proceduralMetrics = {
                name: proceduralName,
                distance: Math.floor(Math.random() * (220 - 40) + 40),
                trainTime: "1h 45m",
                trainMinutes: 105,
                trainPrice: (Math.random() * (55 - 20) + 20).toFixed(2),
                busTime: "3h 50m",
                busMinutes: 230,
                busPrice: (Math.random() * (16 - 7) + 7).toFixed(2),
                trainStation: "UKX",
                busStation: "Stn"
            };
            renderRouteMetrics(proceduralMetrics, targetedDepartureBase);
        }
    }

    function renderRouteMetrics(data, departureBaseTime) {
        resultsWrapper.classList.remove('hidden');
        displayTargetName.textContent = data.name;
        distVal.textContent = `${data.distance} miles`;
        timeVal.textContent = data.trainTime;

        itineraryCardsContainer.innerHTML = '';

        // Train departures map standard from computed timeline anchor
        const trainDeparture = new Date(departureBaseTime.getTime());
        const trainArrival = new Date(trainDeparture.getTime() + data.trainMinutes * 60000);
        
        // Bus departures offset sequentially by a brief layout gap safely
        const busDeparture = new Date(departureBaseTime.getTime() + 15 * 60000);
        const busArrival = new Date(busDeparture.getTime() + data.busMinutes * 60000);

        const trainCard = createTransitCard('Train', data.trainTime, data.trainPrice, 'LON', data.trainStation, trainDeparture, trainArrival, 'https://www.thetrainline.com');
        const busCard = createTransitCard('National Express Bus', data.busTime, data.busPrice, 'VCS', data.busStation, busDeparture, busArrival, 'https://www.nationalexpress.com');

        itineraryCardsContainer.appendChild(trainCard);
        itineraryCardsContainer.appendChild(busCard);
    }

    function createTransitCard(type, duration, price, originCode, destCode, depTime, arrTime, externalUrl) {
        const formatClock = (d) => d.toTimeString().substring(0, 5);
        const formatDateLabel = (d) => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

        const card = document.createElement('div');
        card.className = 'itinerary-card';
        card.innerHTML = `
            <div class="itinerary-header">
                <span class="transit-type">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transform:translateY(1px);"><rect x="4" y="3" width="16" height="14" rx="2"></rect><path d="M4 11h16"></path><path d="M12 3v8"></path><path d="M8 17l-2 4"></path><path d="M16 17l2 4"></path></svg>
                    ${type} <span style="color: var(--text-secondary); font-size: 11px; margin-left: 4px;">(${formatDateLabel(depTime)})</span>
                </span>
                <span class="fare-badge">£${price}</span>
            </div>
            <div class="transit-timeline">
                <div class="timeline-node">
                    <span class="node-time">${formatClock(depTime)}</span>
                    <span class="node-station">${originCode}</span>
                </div>
                <div class="timeline-line">
                    <span class="duration-label">${duration}</span>
                </div>
                <div class="timeline-node destination">
                    <span class="node-time">${formatClock(arrTime)}</span>
                    <span class="node-station">${destCode}</span>
                </div>
            </div>
            <div class="action-row">
                <a href="${externalUrl}" target="_blank" class="btn btn-secondary">Find Tickets</a>
                <button class="btn btn-primary" onclick="armShortcutTrigger(${depTime.getTime()}, '${displayTargetName.textContent}')">Set iOS Alert</button>
            </div>
        `;
        return card;
    }

    // Proactive tracking monitor binding logic
    window.armShortcutTrigger = function(targetTimestamp, locationName) {
        if (trackingEngine.timerId) clearInterval(trackingEngine.timerId);
        
        trackingEngine.targetTime = targetTimestamp;
        
        // Immediate cross-check validation edge case: alert immediately if tracking an option whose timeline has rolled past
        const initialCheckDistance = trackingEngine.targetTime - new Date().getTime();
        if (initialCheckDistance <= 0) {
            triggerNativeiOSShortcut(`Departure warning: Your transport to ${locationName} leaves now!`);
            return;
        }

        countdownBanner.classList.remove('hidden');

        const evaluateTimelineClock = () => {
            const currentMillis = new Date().getTime();
            const timeDifference = trackingEngine.targetTime - currentMillis;

            if (timeDifference <= 0) {
                clearInterval(trackingEngine.timerId);
                countdownBanner.classList.add('hidden');
                triggerNativeiOSShortcut(`Departure warning: Your transport to ${locationName} leaves now!`);
                return;
            }

            const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const min = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
            const sec = Math.floor((timeDifference % (1000 * 60)) / 1000);
            
            if (days > 0) {
                countdownClock.textContent = `${days}d ${hours}h remaining`;
            } else if (hours > 0) {
                countdownClock.textContent = `${hours}h ${min}m remaining`;
            } else {
                countdownClock.textContent = `${min}m ${sec}s remaining`;
            }
        };

        evaluateTimelineClock();
        trackingEngine.timerId = setInterval(evaluateTimelineClock, 1000);
    };

    window.killTrackingClock = function() {
        if (trackingEngine.timerId) {
            clearInterval(trackingEngine.timerId);
            trackingEngine.timerId = null;
        }
        countdownBanner.classList.add('hidden');
    };

    // Native App Hand-off Protocol Layer using uniform naming key agreed
    function triggerNativeiOSShortcut(messageText) {
        const exactShortcutName = "travelalert";
        const customUrlString = `shortcuts://run-shortcut?name=${exactShortcutName}&input=text&text=${encodeURIComponent(messageText)}`;
        window.location.href = customUrlString;
    }
</script>

</body>
</html>
