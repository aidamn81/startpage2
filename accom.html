<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Accommodation Finder</title>
    <style>
        :root {
            --bg-main: #0d0d11;
            --bg-card: #14141c;
            --border-color: #262636;
            --text-primary: #f1f1f6;
            --text-secondary: #8e8e9f;
            --accent-glow: #7a5cff;
            --accent-success: #10b981;
            --accent-alert: #ef4444;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Fixed App Boundary Container */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 850px;
            background: linear-gradient(145deg, #0f0f15, #12121a);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }

        /* Header Layout Zone */
        .app-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(20, 20, 28, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title-area h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-title-area p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .back-link {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        /* Scrollable Operational Container Context */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* Input Control Styling */
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .search-box label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #bfaeff;
            font-weight: 700;
        }

        .input-field {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 2px rgba(122, 92, 255, 0.15);
        }

        .search-btn {
            background: var(--accent-glow);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 4px;
        }

        .search-btn:hover {
            background: #6543fa;
        }

        /* Output Visual Panel */
        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .destination-title {
            font-size: 18px;
            font-weight: 700;
            border-left: 3px solid var(--accent-glow);
            padding-left: 10px;
            margin-top: 5px;
        }

        /* Accommodation Visual Cards */
        .accom-card {
            background: #181826;
            border: 1px solid #31314a;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .accom-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .accom-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .accom-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .accom-type {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #bfaeff;
            font-weight: 600;
        }

        .price-badge {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            white-space: nowrap;
        }

        .accom-details {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            margin-top: 2px;
        }

        .distance-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .distance-info svg {
            color: var(--accent-glow);
        }

        .btn-book {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            background: var(--accent-glow);
            color: white;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-book:hover {
            background: #6543fa;
            box-shadow: 0 0 12px rgba(122, 92, 255, 0.4);
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-title-area">
            <h1>Stay Finder</h1>
            <p>Budget Accommodations</p>
        </div>
        <a href="index.html" class="back-link">← Main Site</a>
    </header>

    <main class="main-content">
        <!-- Input Block -->
        <section class="search-box">
            <div class="input-group">
                <label for="addressInput">Destination Address or City</label>
                <input type="text" id="addressInput" class="input-field" placeholder="e.g., Piccadilly, Manchester, Brighton..." autocomplete="off">
            </div>
            <button id="searchBtn" class="search-btn">Find Cheap Stays</button>
        </section>

        <!-- Stays Output Visual Box -->
        <section id="resultsWrapper" class="results-panel hidden">
            <h2 id="displayTargetAddress" class="destination-title">Manchester</h2>
            
            <div id="accomCardsContainer">
                <!-- Programmatically generated stay items append here -->
            </div>
        </section>
    </main>
</div>

<script>
    // Configured lookup dataset for low-budget chains and spots across core networks
    const regionalAccomDb = {
        "manchester": [
            { name: "EasyHotel Manchester City Centre", type: "Budget Hotel", price: "39", distance: "0.2 miles", url: "https://www.easyhotel.com/" },
            { name: "YHA Manchester Terminal", type: "Hostel / Shared", price: "24", distance: "0.6 miles", url: "https://www.yha.org.uk/" },
            { name: "Travelodge Manchester Ancoats", type: "Budget Hotel", price: "45", distance: "0.4 miles", url: "https://www.travelodge.co.uk/" }
        ],
        "birmingham": [
            { name: "Travelodge Birmingham Central", type: "Budget Hotel", price: "37", distance: "0.3 miles", url: "https://www.travelodge.co.uk/" },
            { name: "Ibis Budget Birmingham Centre", type: "Budget Hotel", price: "42", distance: "0.5 miles", url: "https://all.accor.com/" },
            { name: "Selina Birmingham Jewellery Quarter", type: "Boutique Hostel", price: "28", distance: "0.7 miles", url: "https://www.selina.com/" }
        ],
        "brighton": [
            { name: "YHA Brighton", type: "Hostel / Shared", price: "22", distance: "0.1 miles", url: "https://www.yha.org.uk/" },
            { name: "EasyHotel Brighton", type: "Budget Hotel", price: "40", distance: "0.4 miles", url: "https://www.easyhotel.com/" },
            { name: "Travelodge Brighton Seafront", type: "Budget Hotel", price: "49", distance: "0.3 miles", url: "https://www.travelodge.co.uk/" }
        ],
        "york": [
            { name: "YHA York City", type: "Hostel", price: "25", distance: "0.8 miles", url: "https://www.yha.org.uk/" },
            { name: "Premier Inn York City Centre", type: "Value Hotel", price: "52", distance: "0.5 miles", url: "https://www.premierinn.com/" },
            { name: "Travelodge York Central", type: "Budget Hotel", price: "44", distance: "0.4 miles", url: "https://www.travelodge.co.uk/" }
        ]
    };

    const addressInput = document.getElementById('addressInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsWrapper = document.getElementById('resultsWrapper');
    const displayTargetAddress = document.getElementById('displayTargetAddress');
    const accomCardsContainer = document.getElementById('accomCardsContainer');

    searchBtn.addEventListener('click', processAccomQuery);
    addressInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processAccomQuery(); });

    function processAccomQuery() {
        const fullAddress = addressInput.value.trim();
        if (!fullAddress) return;

        const lowerQuery = fullAddress.toLowerCase();
        
        // Basic parser match on keyword tokens
        let matchedKey = Object.keys(regionalAccomDb).find(key => lowerQuery.includes(key));
        let staysData = [];

        if (matchedKey) {
            staysData = regionalAccomDb[matchedKey];
        } else {
            // Smooth procedural data generation fallback if parsing a bespoke custom address block
            staysData = [
                { 
                    name: `Travelodge Central Core`, 
                    type: "Budget Hotel", 
                    price: Math.floor(Math.random() * (25) + 35).toString(), 
                    distance: (Math.random() * 0.7 + 0.1).toFixed(1) + " miles",
                    url: "https://www.travelodge.co.uk/" 
                },
                { 
                    name: `Local Hub B&B / Hostel`, 
                    type: "Hostel Alternative", 
                    price: Math.floor(Math.random() * (15) + 20).toString(), 
                    distance: (Math.random() * 1.2 + 0.3).toFixed(1) + " miles",
                    url: "https://www.booking.com" 
                }
            ];
        }

        renderAccommodations(fullAddress, staysData);
    }

    function renderAccommodations(addressTitle, items) {
        resultsWrapper.classList.remove('hidden');
        displayTargetAddress.textContent = addressTitle;
        accomCardsContainer.innerHTML = '';

        items.forEach(stay => {
            const card = document.createElement('div');
            card.className = 'accom-card';
            card.innerHTML = `
                <div class="accom-header">
                    <div class="accom-meta">
                        <span class="accom-type">${stay.type}</span>
                        <span class="accom-name">${stay.name}</span>
                    </div>
                    <span class="price-badge">£${stay.price}/nt</span>
                </div>
                <div class="accom-details">
                    <div class="distance-info">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <span>${stay.distance} from destination</span>
                    </div>
                    <a href="${stay.url}" target="_blank" class="btn-book">Book Slot</a>
                </div>
            `;
            accomCardsContainer.appendChild(card);
        });
    }
</script>

</body>
</html>
