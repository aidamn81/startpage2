<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GothMapper - Dark Transit Canvas</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl-js.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl-js.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0e;
            --bg-card: #111118;
            --border-glow: #2a1f4d;
            --border-subtle: #1c1c28;
            --text-primary: #e2e2ec;
            --text-secondary: #797993;
            --goth-neon: #8b5cf6;
            --goth-crimson: #ef4444;
            --goth-mint: #10b981;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 850px;
            background: linear-gradient(180deg, #0d0d14 0%, #07070a 100%);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 40px rgba(139, 92, 246, 0.05);
        }

        .app-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(17, 17, 24, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title-area h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        .header-title-area p {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .back-link {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 14px;
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .back-link:hover {
            color: #fff;
            border-color: var(--goth-neon);
        }

        /* Dedicated Map Viewport Container Box */
        #gothMapContainer {
            width: 100%;
            height: 240px;
            background: #08080c;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        /* Custom Dark Overlay Panel to darken map transitions slightly */
        .map-tint-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,14,0.1), rgba(10,10,14,0.5));
            pointer-events: none;
            z-index: 2;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #09090d;
        }

        .main-content::-webkit-scrollbar {
            width: 4px;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: var(--border-glow);
            border-radius: 2px;
        }

        .search-panel {
            background: rgba(17, 17, 24, 0.6);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            position: relative;
        }

        .input-field {
            width: 100%;
            background: #050508;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 16px 14px 40px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--goth-neon);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--text-secondary);
            stroke-width: 2;
        }

        .action-button {
            background: var(--goth-neon);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-button:hover {
            background: #7c3aed;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 700;
            padding-left: 4px;
        }

        .route-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .route-card:hover {
            border-color: var(--goth-neon);
            transform: translateY(-2px);
        }

        .route-main {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .transit-chain {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            color: #fff;
        }

        .badge-walk { background: #2e2e3a; color: var(--text-primary); }
        .badge-tube { background: #0019a8; }
        .badge-bus { background: #dc241f; }

        .chain-arrow {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .route-summary {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .route-summary strong {
            color: var(--text-primary);
        }

        .route-metrics {
            text-align: right;
            padding-left: 16px;
        }

        .time-display {
            font-size: 22px;
            font-weight: 800;
            color: var(--goth-mint);
        }

        .cost-display {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .hidden {
            display: none !important;
        }

        /* Styling for the custom Neon Goth Pin Marker */
        .goth-marker {
            width: 14px;
            height: 14px;
            background-color: var(--goth-neon);
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--goth-neon), 0 0 5px var(--goth-neon);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-title-area">
            <h1>GothMapper</h1>
            <p>Realtime Transit Canvas</p>
        </div>
        <a href="travel.html" class="back-link">← Travel</a>
    </header>

    <div id="gothMapContainer">
        <div class="map-tint-overlay"></div>
    </div>

    <main class="main-content">
        <section class="search-panel">
            <div class="input-group">
                <input type="text" id="startLoc" class="input-field" value="London, UK">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            </div>
            
            <div class="input-group">
                <input type="text" id="endLoc" class="input-field" placeholder="Where out into the night?">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
            </div>

            <button id="planRouteBtn" class="action-button">Compute Fast Lines</button>
        </section>

        <section id="resultsSection" class="results-section hidden">
            <span class="section-label">Suggested Direct Timelines</span>

            <div class="route-card">
                <div class="route-main">
                    <div class="transit-chain">
                        <span class="badge badge-walk">Walk 4m</span>
                        <span class="chain-arrow">›</span>
                        <span class="badge badge-tube">Piccadilly Line</span>
                        <span class="chain-arrow">›</span>
                        <span class="badge badge-walk">Walk 2m</span>
                    </div>
                    <div class="route-summary">Leaves station in <strong>3 mins</strong> • Platform 2</div>
                </div>
                <div class="route-metrics">
                    <div class="time-display">24m</div>
                    <div class="cost-display">£2.80</div>
                </div>
            </div>

            <div class="route-card">
                <div class="route-main">
                    <div class="transit-chain">
                        <span class="badge badge-walk">Walk 2m</span>
                        <span class="chain-arrow">›</span>
                        <span class="badge badge-bus">Bus 38</span>
                        <span class="chain-arrow">›</span>
                        <span class="badge badge-walk">Walk 5m</span>
                    </div>
                    <div class="route-summary">Arrives at stop in <strong>1 min</strong> • High frequency</div>
                </div>
                <div class="route-metrics">
                    <div class="time-display">37m</div>
                    <div class="cost-display">£1.75</div>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    // Drop your personal public token key precisely inside the quotes below
    mapboxgl.accessToken = 'pk.eyJ1IjoiYWlkYW1uODEiLCJhIjoiY21xaHpyeGhlMDFmajJxc2Zibnl0dGVyNyJ9.smCX4GZMcPtJfpBeb5To5Q';

    // Initialize the background map centered over London
    const map = new mapboxgl.Map({
        container: 'gothMapContainer',
        style: 'mapbox://styles/mapbox/dark-v11', // Perfect gothic charcoal baseline skin
        center: [-0.1276, 51.5074], // London coordinates
        zoom: 12,
        attributionControl: false
    });

    // Add a custom pulsing neon dot marker right on the map coordinates
    const el = document.createElement('div');
    el.className = 'goth-marker';
    new mapboxgl.Marker(el)
        .setLngLat([-0.1276, 51.5074])
        .addTo(map);

    const planRouteBtn = document.getElementById('planRouteBtn');
    const resultsSection = document.getElementById('resultsSection');
    const endLoc = document.getElementById('endLoc');

    planRouteBtn.addEventListener('click', () => {
        if (!endLoc.value.trim()) return;
        resultsSection.classList.remove('hidden');
        
        // Pan the map slightly to simulate movement calculation activity smoothly
        map.flyTo({
            center: [-0.1276 + (Math.random() - 0.5) * 0.05, 51.5074 + (Math.random() - 0.5) * 0.05],
            essential: true,
            zoom: 13.5
        });
    });
</script>

</body>
</html>
