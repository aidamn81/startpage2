<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GothMapper - Dark Transit Canvas</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl-js.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl-js.js"></script>
    <style>
        :root {
            --bg-main: #0a0a0e;
            --bg-card: #111118;
            --border-glow: #2a1f4d;
            --border-subtle: #1c1c28;
            --text-primary: #e2e2ec;
            --text-secondary: #797993;
            --goth-neon: #8b5cf6;
            --goth-crimson: #ef4444;
            --goth-mint: #10b981;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-stack);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 850px;
            background: linear-gradient(180deg, #0d0d14 0%, #07070a 100%);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 40px rgba(139, 92, 246, 0.05);
        }

        .app-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(17, 17, 24, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header-title-area h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        .header-title-area p {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .back-link {
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 14px;
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .back-link:hover {
            color: #fff;
            border-color: var(--goth-neon);
        }

        #gothMapContainer {
            width: 100%;
            height: 220px;
            background: #08080c;
            border-bottom: 1px solid var(--border-subtle);
            position: relative;
        }

        .map-tint-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,14,0.1), rgba(10,10,14,0.5));
            pointer-events: none;
            z-index: 2;
        }

        .london-banner {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-subtle);
            display: block;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #09090d;
        }

        /* Native Form Setup for Sandbox Bypass */
        .search-panel-form {
            background: rgba(17, 17, 24, 0.6);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-field {
            width: 100%;
            background: #050508;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 44px 14px 40px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--goth-neon);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--text-secondary);
            stroke-width: 2;
        }

        .bookmark-btn {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 18px;
            transition: color 0.2s ease, transform 0.1s ease;
            padding: 4px;
            z-index: 5;
        }
        .bookmark-btn:hover {
            color: #f59e0b;
            transform: scale(1.1);
        }

        .saved-shelf {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .shelf-pill {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .shelf-pill:hover {
            border-color: var(--goth-neon);
            background: rgba(139, 92, 246, 0.05);
        }
        .shelf-pill .delete-pill {
            color: var(--text-secondary);
            font-weight: bold;
            font-size: 10px;
            padding: 0 2px;
        }

        .action-button {
            width: 100%;
            background: var(--goth-neon);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-family: var(--font-stack);
        }

        .action-button:hover {
            background: #7c3aed;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .status-message {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            padding: 10px;
            line-height: 1.4;
        }

        .hidden {
            display: none !important;
        }

        .goth-marker {
            width: 14px;
            height: 14px;
            background-color: var(--goth-neon);
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--goth-neon), 0 0 5px var(--goth-neon);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <div class="header-title-area">
            <h1>GothMapper</h1>
            <p>Realtime Transit Canvas</p>
        </div>
        <a href="travel.html" class="back-link">← Travel</a>
    </header>

    <div id="gothMapContainer">
        <div class="map-tint-overlay"></div>
    </div>

    <img src="london.jpg" alt="London Canvas" class="london-banner">

    <main class="main-content">
        <form action="https://tfl.gov.uk/plan-a-journey/results" method="GET" target="_blank" class="search-panel-form" id="transitForm">
            <div class="input-wrapper">
                <input type="text" name="From" id="startLoc" class="input-field" placeholder="Departure location..." required>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
                <button type="button" id="bookmarkStart" class="bookmark-btn" title="Save departure">★</button>
            </div>
            
            <div class="input-wrapper">
                <input type="text" name="To" id="endLoc" class="input-field" placeholder="Where out into the night?" required>
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
                <button type="button" id="bookmarkEnd" class="bookmark-btn" title="Save destination">★</button>
            </div>

            <div id="savedShelf" class="saved-shelf hidden"></div>

            <button type="submit" class="action-button">Compute Live Lines</button>
        </form>

        <div id="statusBox" class="status-message hidden"></div>
    </main>
</div>

<script>
    (function() {
        // Mapbox Engine Activation
        mapboxgl.accessToken = 'pk.eyJ1IjoiYWlkYW1uODEiLCJhIjoiY21xaHpyeGhlMDFmajJxc2Zibnl0dGVyNyJ9.smCX4GZMcPtJfpBeb5To5Q';

        const map = new mapboxgl.Map({
            container: 'gothMapContainer',
            style: 'mapbox://styles/mapbox/dark-v11',
            center: [-0.1276, 51.5074],
            zoom: 11,
            attributionControl: false
        });

        const el = document.createElement('div');
        el.className = 'goth-marker';
        const marker = new mapboxgl.Marker(el).setLngLat([-0.1276, 51.5074]).addTo(map);

        const transitForm = document.getElementById('transitForm');
        const startLoc = document.getElementById('startLoc');
        const endLoc = document.getElementById('endLoc');
        const savedShelf = document.getElementById('savedShelf');
        const bookmarkStart = document.getElementById('bookmarkStart');
        const bookmarkEnd = document.getElementById('bookmarkEnd');

        let savedLocations = JSON.parse(localStorage.getItem('gothmapper_saved')) || [];

        renderSavedShelf();

        bookmarkStart.addEventListener('click', (e) => { e.preventDefault(); saveSpot(startLoc.value); });
        bookmarkEnd.addEventListener('click', (e) => { e.preventDefault(); saveSpot(endLoc.value); });

        function saveSpot(val) {
            const clean = val.trim();
            if (!clean || savedLocations.includes(clean)) return;
            savedLocations.push(clean);
            localStorage.setItem('gothmapper_saved', JSON.stringify(savedLocations));
            renderSavedShelf();
        }

        function removeSpot(idx, e) {
            e.stopPropagation(); 
            e.preventDefault();
            savedLocations.splice(idx, 1);
            localStorage.setItem('gothmapper_saved', JSON.stringify(savedLocations));
            renderSavedShelf();
        }

        function renderSavedShelf() {
            if (savedLocations.length === 0) {
                savedShelf.classList.add('hidden');
                return;
            }
            savedShelf.classList.remove('hidden');
            savedShelf.innerHTML = '';
            
            savedLocations.forEach((loc, index) => {
                const pill = document.createElement('div');
                pill.className = 'shelf-pill';
                pill.innerHTML = `♠ ${loc} <span class="delete-pill" data-index="${index}">×</span>`;
                
                pill.addEventListener('click', (e) => {
                    e.preventDefault();
                    endLoc.value = loc;
                    transitForm.submit();
                });

                pill.querySelector('.delete-pill').addEventListener('click', (e) => removeSpot(index, e));
                savedShelf.appendChild(pill);
            });
        }
    })();
</script>
</body>
</html>
