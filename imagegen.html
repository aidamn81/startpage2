<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Gothic Archive - Image Studio Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  :root { 
    --obsidian: #050505; 
    --panel-bg: #0b0b0b;
    --crimson: #7a0000; 
    --gold: #8c7340; 
    --text: #a19a89; 
    --bg-hover: rgba(122, 0, 0, 0.2);
  }

  body { 
    background-color: var(--obsidian); 
    background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
    background-attachment: fixed;
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    overflow: hidden; 
    font-family: 'Playfair Display', serif;
    color: var(--text);
  }

  /* Crimson/Gold Velvet Ribbon */
  #ribbonEl {
    background: linear-gradient(135deg, #4a0000 0%, var(--crimson) 100%); 
    color: #fff;
    text-align: center;
    padding: 10px;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: bold;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--gold);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    z-index: 100;
  }

  /* Split Layout Workspace */
  .workspace {
    flex: 1;
    display: flex;
    flex-direction: row;
    min-height: 0;
    width: 100%;
  }

  /* Control Terminal Left Panel */
  .control-panel {
    width: 320px;
    background: var(--panel-bg);
    border-right: 1px solid #1a1a1a;
    padding: 24px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  /* Live Display Right Panel */
  .display-panel {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 1px;
    margin: 0 0 4px 0;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(140, 115, 64, 0.2);
    padding-bottom: 6px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.5px;
  }

  input[type="text"], textarea, select {
    background: #000;
    border: 1px solid #252525;
    color: #fff;
    padding: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    border-radius: 4px;
    outline: none;
    transition: border 0.3s;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--gold);
  }

  textarea {
    resize: none;
    height: 100px;
  }

  .action-btn {
    background: linear-gradient(to bottom, #5a0000, var(--crimson));
    border: 1px solid var(--gold);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 12px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    margin-top: auto;
  }

  .action-btn:hover {
    background: var(--crimson);
    box-shadow: 0 0 10px rgba(122, 0, 0, 0.5);
  }

  /* File upload stylized container */
  .file-uploader {
    border: 1px dashed var(--gold);
    background: rgba(140, 115, 64, 0.03);
    padding: 20px 12px;
    text-align: center;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: background 0.2s;
  }
  .file-uploader:hover { background: rgba(140, 115, 64, 0.08); }

  /* Output Canvas Target Frame */
  #canvasTarget {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 15px 35px rgba(0,0,0,0.9);
    border: 1px solid #1c1c1c;
    border-radius: 4px;
    display: none;
  }

  #placeholderText {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.6;
  }

  /* Terminal Gothic Spinner Overlay */
  #summoningOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #summoningOverlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(140, 115, 64, 0.1);
    border-left-color: var(--crimson);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Floating Menu Button */
  #menuContainer {
    position: fixed;
    bottom: 45px; 
    right: 16px;
    z-index: 200;
  }
  #menuBtn {
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
  }
  #menuContent {
    position: absolute;
    bottom: 40px;
    right: 0;
    background: rgba(5, 5, 5, 0.98);
    border: 1px solid var(--crimson);
    border-radius: 4px;
    padding: 8px;
    width: 160px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    display: none;
  }
  #menuContent.open { display: block; }
  #menuContent a {
    display: block;
    color: var(--text);
    text-decoration: none;
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    padding: 6px;
  }
  #menuContent a:hover { color: #fff; background: var(--bg-hover); }

  footer {
    background: #020202;
    color: #444;
    text-align: center;
    padding: 8px;
    font-size: 10px;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
    border-top: 1px solid #111;
  }
</style>
</head>
<body>

<div id="ribbonEl">
  🔮 DIRECT INFRASTRUCTURE PIPELINE — UNRESTRICTED PRIORITY ACCESS MODE
</div>

<div class="workspace">
  <div class="control-panel">
    <div>
      <h3 class="panel-title">Media Synthesis</h3>
      
      <div class="field-group" style="margin-top:16px;">
        <label>Source Image</label>
        <div class="file-uploader" onclick="document.getElementById('fileSource').click()">
          <span id="uploadLabel">📸 Tap to Upload Image</span>
          <input type="file" id="fileSource" accept="image/*" style="display:none;" onchange="handleFileLoad(event)">
        </div>
      </div>

      <div class="field-group" style="margin-top:16px;">
        <label>Transformation Script (Prompt)</label>
        <textarea id="promptText" placeholder="Describe your creative alterations here..."></textarea>
      </div>

      <div class="field-group" style="margin-top:16px;">
        <label>Aesthetic Target Profile</label>
        <select id="styleProfile">
          <option value="Photo-to-Anime">Photo-to-Anime</option>
          <option value="Refining-Details">Refining-Details</option>
          <option value="Face-To-Cyberpunk">Face-To-Cyberpunk</option>
        </select>
      </div>
    </div>

    <button class="action-btn" onclick="executeTransformation()">Execute Mutation</button>
  </div>

  <div class="display-panel">
    <div id="placeholderText">IMAGE STUDIO STANDBY<br><span style="font-size:10px; color:#333;">Upload a source image and enter editing commands</span></div>
    <img id="canvasTarget" alt="Synthesized Output">

    <div id="summoningOverlay">
      <div class="spinner"></div>
      <div id="summoningStatus">ENGAGING PRIVATE HARDWARE PIPELINE...</div>
    </div>
  </div>
</div>

<div id="menuContainer">
  <button id="menuBtn" onclick="toggleMenu()">Studio Tools</button>
  <div id="menuContent">
    <a href="index.html">🏛 Back to Index</a>
  </div>
</div>

<footer>
  Gothic Studio Direct API Console Bridge
</footer>

<script>
  // Embedded write token directly feeding client runtime processing headers
  const _0x5f3e = "Hf_enyzzrRILgFZcwthIJxrJhVfxNPSBQMhgz";
  let base64ImageString = null;

  function handleFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    document.getElementById('uploadLabel').innerText = "⚡ " + file.name;
    const reader = new FileReader();
    reader.onload = function(e) {
      base64ImageString = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function executeTransformation() {
    const prompt = document.getElementById('promptText').value.trim();
    const style = document.getElementById('styleProfile').value;
    const overlay = document.getElementById('summoningOverlay');
    const displayImg = document.getElementById('canvasTarget');
    const placeholder = document.getElementById('placeholderText');

    if(!base64ImageString) { alert("Please upload an input picture first."); return; }
    if(!prompt) { alert("Please type your generation instructions into the script field."); return; }

    overlay.classList.add('active');
    
    try {
      const response = await fetch("https://qwen-qwen-image-edit-2509.hf.space/api/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${_0x5f3e}`
        },
        body: JSON.stringify({
          data: [
            base64ImageString, 
            prompt,
            style
          ]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(errText || "Server hardware infrastructure returned an error state.");
      }

      const resultData = await response.json();
      if(resultData && resultData.data && resultData.data[0]) {
        displayImg.src = resultData.data[0];
        displayImg.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        throw new Error("Invalid format returned from production nodes.");
      }

    } catch (err) {
      console.error(err);
      alert("Pipeline Exception: " + err.message);
    } finally {
      overlay.classList.remove('active');
    }
  }

  function toggleMenu() {
    const menu = document.getElementById('menuContent');
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
  }
</script>
</body>
</html>
