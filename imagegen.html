<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Gothic Archive - Hyper-Realism Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  :root { 
    --obsidian: #050505; 
    --panel-bg: #0b0b0b;
    --crimson: #7a0000; 
    --gold: #8c7340; 
    --text: #a19a89; 
    --bg-hover: rgba(122, 0, 0, 0.2);
  }

  body { 
    background-color: var(--obsidian); 
    background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
    background-attachment: fixed;
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    overflow: hidden; 
    font-family: 'Playfair Display', serif;
    color: var(--text);
  }

  #ribbonEl {
    background: linear-gradient(135deg, #4a0000 0%, var(--crimson) 100%); 
    color: #fff;
    text-align: center;
    padding: 10px;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: bold;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--gold);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    z-index: 100;
  }

  .workspace {
    flex: 1;
    display: flex;
    flex-direction: row;
    min-height: 0;
    width: 100%;
  }

  .control-panel {
    width: 325px;
    background: var(--panel-bg);
    border-right: 1px solid #1a1a1a;
    padding: 24px 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 18px;
    overflow-y: auto;
  }

  .display-panel {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px;
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 1px;
    margin: 0 0 4px 0;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(140, 115, 64, 0.2);
    padding-bottom: 6px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.5px;
    color: #888;
  }

  textarea, select {
    background: #000;
    border: 1px solid #252525;
    color: #fff;
    padding: 10px;
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    border-radius: 4px;
    outline: none;
    transition: border 0.3s;
  }

  textarea:focus, select:focus {
    border-color: var(--gold);
  }

  #promptText { height: 110px; }
  #negativePromptText { height: 65px; font-size: 0.75rem; color: #ccbba0; }

  .action-btn {
    background: linear-gradient(to bottom, #5a0000, var(--crimson));
    border: 1px solid var(--gold);
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1.5px;
    transition: all 0.2s;
    margin-top: auto;
    text-transform: uppercase;
  }

  .action-btn:hover {
    background: var(--crimson);
    box-shadow: 0 0 12px rgba(122, 0, 0, 0.6);
  }

  #canvasTarget {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 15px 40px rgba(0,0,0,0.95);
    border: 1px solid #1c1c1c;
    border-radius: 4px;
    display: none;
    object-fit: contain;
  }

  #placeholderText {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.6;
  }

  #summoningOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #summoningOverlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(140, 115, 64, 0.1);
    border-left-color: var(--crimson);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #menuContainer {
    position: fixed;
    bottom: 45px; 
    right: 16px;
    z-index: 200;
  }
  #menuBtn {
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
  }
  #menuContent {
    position: absolute;
    bottom: 40px;
    right: 0;
    background: rgba(5, 5, 5, 0.98);
    border: 1px solid var(--crimson);
    border-radius: 4px;
    padding: 8px;
    width: 160px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    display: none;
  }
  #menuContent.open { display: block; }
  #menuContent a {
    display: block;
    color: var(--text);
    text-decoration: none;
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    padding: 6px;
  }
  #menuContent a:hover { color: #fff; background: var(--bg-hover); }

  footer {
    background: #020202;
    color: #444;
    text-align: center;
    padding: 8px;
    font-size: 10px;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
    border-top: 1px solid #111;
  }
</style>
</head>
<body>

<div id="ribbonEl">
  🔮 HYPER-REALISTIC SYNTHESIS ENGINE — PRIORITY VAULT ACTIVE
</div>

<div class="workspace">
  <div class="control-panel">
    <div>
      <h3 class="panel-title">Manifestation Script</h3>
      
      <div class="field-group" style="margin-top:14px;">
        <label>Creative Prompt</label>
        <textarea id="promptText" placeholder="An elegant Victorian gothic portrait, hyper-realistic, 8k resolution, cinematic lighting, intricate details, highly detailed textures..."></textarea>
      </div>

      <div class="field-group" style="margin-top:14px;">
        <label>Negative Filter (What to exclude)</label>
        <textarea id="negativePromptText">canvas, illustration, cartoon, anime, drawing, digital art, airbrushed, deformed, low quality</textarea>
      </div>

      <div class="field-group" style="margin-top:14px;">
        <label>Aspect Ratio Frame</label>
        <select id="aspectRatio">
          <option value="portrait">Portrait Frame (3:4)</option>
          <option value="square" selected>Square Archive (1:1)</option>
          <option value="landscape">Landscape Canvas (4:3)</option>
        </select>
      </div>
    </div>

    <button class="action-btn" onclick="summonHyperRealism()">Summon Manifestation</button>
  </div>

  <div class="display-panel">
    <div id="placeholderText">HYPER-REALISM ENGINE STANDBY<br><span style="font-size:10px; color:#333;">Draft your manifestation script and execute the sequence</span></div>
    <img id="canvasTarget" alt="Synthesized Hyper-Realistic Output">

    <div id="summoningOverlay">
      <div class="spinner"></div>
      <div id="summoningStatus">RENDERING HIGH-FIDELITY PARTICLES...</div>
    </div>
  </div>
</div>

<div id="menuContainer">
  <button id="menuBtn" onclick="toggleMenu()">Studio Tools</button>
  <div id="menuContent">
    <a href="index.html">🏛 Back to Index</a>
  </div>
</div>

<footer>
  Gothic Studio Direct API Console Bridge
</footer>

<script>
  const _0x5f3e = "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";

  async function summonHyperRealism() {
    const prompt = document.getElementById('promptText').value.trim();
    const negativePrompt = document.getElementById('negativePromptText').value.trim();
    const aspect = document.getElementById('aspectRatio').value;
    const overlay = document.getElementById('summoningOverlay');
    const displayImg = document.getElementById('canvasTarget');
    const placeholder = document.getElementById('placeholderText');

    if(!prompt) { alert("Please input your manifestation script prompt."); return; }

    overlay.classList.add('active');

    // Automatically injecting structural photographic anchors to guarantee deep realism
    const structuralEnhancement = ", hyperrealistic photography, depth of field, sharp focus, 35mm photograph, cinematic textures, highly detailed skin grain";
    const absolutePrompt = prompt + structuralEnhancement;

    // Mapping exact aspect resolution layouts for hyper-realistic rendering nodes
    let width = 1024;
    let height = 1024;
    if (aspect === 'portrait') { width = 768; height = 1024; }
    if (aspect === 'landscape') { width = 1024; height = 768; }

    try {
      // Connect directly to the lightning-fast serverless infrastructure framework
      const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-3.5-large", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${_0x5f3e}`
        },
        body: JSON.stringify({
          inputs: absolutePrompt,
          parameters: {
            negative_prompt: negativePrompt,
            width: width,
            height: height,
            guidance_scale: 7.5,
            num_inference_steps: 40
          },
          options: { wait_for_model: true }
        })
      });

      if (!response.ok) {
        throw new Error("Cluster cold start or queue exception. Status code: " + response.status);
      }

      // Convert raw image streams cleanly directly into an operational display URL
      const imageBlob = await response.blob();
      const objectURL = URL.createObjectURL(imageBlob);
      
      displayImg.src = objectURL;
      displayImg.style.display = 'block';
      placeholder.style.display = 'none';

    } catch (err) {
      console.error(err);
      alert("Synthesis Exception: " + err.message + "\n\nIf the engine is waking up, wait 10 seconds and try again.");
    } finally {
      overlay.classList.remove('active');
    }
  }

  function toggleMenu() {
    const menu = document.getElementById('menuContent');
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
  }
</script>
</body>
</html>
