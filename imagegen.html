<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Character Generator</title>
    <script src="https://perchance.org/api/v1/t2i-framework-plugin-v2.js"></script>
</head>
<body>

    <script type="text/perchance-config">
        generateHTML = {import:t2i-framework-plugin-v2}

        $meta
          title = AI Character Generator
          description = AI character creator with Img2Img support.

        settings 
          pageTitle = 🧝🏽‍♀️ AI Character Generator 🧌
          introMessage = Add a description, upload an optional reference image, then click <b>generate</b>.
          numImages = [Number(input.numImages)]
          
          imageButtons
            personality = true
            privateSave = true
          
          imageOptions
            saveTitle = ([input.artStyle.getName]) [input.description]
            prompt = [input.artStyle.prompt]
            negativePrompt = [input.artStyle.negative || ""]
            resolution = [input.shape]
            image = [input.refImage || ""]
            strength = [input.imgStrength || 0.6]
          
          userInputs
            description
              label = 📝 Description 
              type = paragraph
              remember = true
              width = 100%
              enterKeyTriggersGeneration = true
            
            refImage
              label = 📷 Reference Image (Optional Img2Img)
              type = image
              remember = false
              width = 100%

            imgStrength
              label = ⚡ Image Influence Strength
              type = select
              remember = true
              visible() => return !!input.refImage;
              options
                Subtle Changes (High Strength) = 0.3
                Balanced Mix (Medium) = 0.6
                Heavy Overhaul (Low Strength) = 0.85

            artStyle
              label = 🎨 Art Style
              type = select
              remember = true
              options
                meta:import
                  from = {import:t2i-styles}

            shape
              label = 🖼️ Shape
              type = select
              remember = true
              options
                Portrait = 512x768
                Square = 768x768
                Landscape = 768x512
    </script>

</body>
</html>
