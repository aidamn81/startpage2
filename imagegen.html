<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Gothic Archive - Image Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
  :root { 
    --obsidian: #050505; 
    --crimson: #7a0000; 
    --gold: #8c7340; 
    --text: #a19a89; 
    --bg-hover: rgba(122, 0, 0, 0.2);
  }

  body { 
    background-color: var(--obsidian); 
    background-image: linear-gradient(rgba(0,0,0,0.97), rgba(0,0,0,0.97)), url('https://www.transparenttextures.com/patterns/dark-brick-wall.png');
    background-attachment: fixed;
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    overflow: hidden; 
    font-family: 'Playfair Display', serif;
    color: var(--text);
  }
  
  /* Main Container */
  #previewCtn {
    flex: 1;
    position: relative;
    width: 100%;
    background: #000;
    min-height: 0; 
  }

  /* Iframe fills the container perfectly */
  #previewCtn iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #000;
  }

  /* Gothic Loading Element */
  #loadingEl {
    position: absolute;
    inset: 0; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--obsidian);
    z-index: 50;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 1;
    transition: opacity 0.4s ease;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(140, 115, 64, 0.1);
    border-left-color: var(--crimson);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Crimson/Gold Velvet Ribbon with Integrated Vault Controls */
  #ribbonEl {
    background: linear-gradient(135deg, #4a0000 0%, var(--crimson) 100%); 
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    font-weight: bold;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--gold);
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    z-index: 100;
    position: relative; 
    transition: all 0.5s ease; 
  }

  #ribbonEl.closed {
    height: 0;
    padding: 0;
    opacity: 0;
    transform: translateY(-100%); 
    pointer-events: none;
    border-bottom: none;
  }

  .vault-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vault-input {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--gold);
    color: #fff;
    padding: 4px 8px;
    font-size: 0.7rem;
    border-radius: 3px;
    width: 180px;
    outline: none;
  }

  .vault-btn {
    background: var(--obsidian);
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 4px 10px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .vault-btn:hover {
    background: #000;
    color: #fff;
    border-color: #fff;
  }

  footer {
    background: #020202;
    color: #555;
    text-align: center;
    padding: 10px;
    font-size: 11px;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
    border-top: 1px solid #161616;
    position: relative; 
    transition: all 0.5s ease; 
  }

  footer.closed {
    height: 0;
    padding: 0;
    opacity: 0;
    transform: translateY(100%); 
    pointer-events: none;
    border-top: none;
  }

  .closeBtn {
    cursor: pointer;
    opacity: 0.5;
    font-size: 16px;
    font-weight: bold;
    padding: 0 4px;
    transition: opacity 0.2s;
    color: #fff;
  }
  .closeBtn:hover { opacity: 1; }

  /* --- Floating Menu Custom Styling --- */
  #menuContainer {
    position: fixed;
    top: 65px; 
    right: 16px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    transition: top 0.5s ease; 
  }

  #menuBtn {
    background: rgba(10, 10, 10, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center; 
    gap: 8px;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.3s;
    outline: none;
  }
  #menuBtn:hover {
    background: var(--crimson);
    color: #fff;
    border-color: var(--crimson);
  }
  
  #menuBtn svg { width: 14px; height: 14px; fill: currentColor; }

  #menuContent {
    margin-top: 8px;
    background: rgba(5, 5, 5, 0.98);
    border: 1px solid var(--crimson);
    border-radius: 4px;
    padding: 12px;
    width: 220px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    opacity: 0;
    transform: translateY(-10px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  #menuContent.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  #menuContent a, .engine-select {
    display: block;
    color: var(--text);
    text-decoration: none;
    font-size: 0.75rem;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.5px;
    padding: 6px;
    border-radius: 3px;
    transition: all 0.2s;
    cursor: pointer;
  }
  #menuContent a:hover, .engine-select:hover {
    color: #fff;
    background: var(--bg-hover);
  }

  .engine-divider {
    border-top: 1px solid #222;
    margin: 6px 0;
    padding-top: 6px;
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="ribbonEl">
  <span>🔮 IMAGE STUDIO ARCHIVE</span>
  <div class="vault-controls">
    <input type="password" id="vaultKey" class="vault-input" placeholder="Paste hf_ write token...">
    <button class="vault-btn" onclick="saveVaultKey()">Lock Vault</button>
    <a class="vault-btn" href="https://huggingface.co/settings/tokens" target="_blank">Get Key</a>
    <span class="closeBtn" onclick="closeRibbon()">&times;</span>
  </div>
</div>

<div id="menuContainer">
  <button id="menuBtn" onclick="toggleMenu()">
    <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.7 4.7C.6 7.1 1 10.1 3 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.0-1.4z"/></svg>
    <span id="menuLabel">Studio Tools</span>
  </button>

  <div id="menuContent">
    <a href="index.html">🏛 Back to Index</a>
    
    <div class="engine-divider">Swap Engine Pipeline</div>
    <div class="engine-select" onclick="switchEngine('lora')">✨ Qwen LoRAs Edition</div>
    <div class="engine-select" onclick="switchEngine('base')">🎨 Qwen Standard Edit</div>
  </div>
</div>

<div id="previewCtn">
  <iframe id="targetFrame" src="https://huggingface.co/spaces/Qwen/Qwen-Image-Edit-2509-LoRAs-Fast/embed" allow="clipboard-read; clipboard-write; camera; microphone"></iframe>
  
  <div id="loadingEl">
    <div class="spinner"></div>
    <div>CONJURING WORKSPACE...</div>
  </div>
</div>

<footer id="footerEl">
  Gothic Studio Workspace Base
  <span class="closeBtn" onclick="closeFooter()">&times;</span>
</footer>

<script>
  const ribbonEl = document.getElementById('ribbonEl');
  const footerEl = document.getElementById('footerEl');
  const loadingEl = document.getElementById('loadingEl');
  const menuContainer = document.getElementById('menuContainer');
  const targetFrame = document.getElementById('targetFrame');
  const vaultKeyInput = document.getElementById('vaultKey');

  const engines = {
    lora: "https://huggingface.co/spaces/Qwen/Qwen-Image-Edit-2509-LoRAs-Fast/embed",
    base: "https://huggingface.co/spaces/Qwen/Qwen-Image-Edit/embed"
  };

  function initWorkspace() {
    if (localStorage.ribbonClosed === 'true') ribbonEl.classList.add('closed');
    if (localStorage.footerClosed === 'true') footerEl.classList.add('closed');
    if (localStorage.hfWorkspaceKey) {
      vaultKeyInput.value = localStorage.hfWorkspaceKey;
    }
    updateMenuPosition();
  }

  function saveVaultKey() {
    const key = vaultKeyInput.value.trim();
    if(key) {
      localStorage.hfWorkspaceKey = key;
      alert("Access token safely locked into local storage environment! Refreshing engine context...");
      targetFrame.src = targetFrame.src; // Reload iframe to force authentication pass
    } else {
      delete localStorage.hfWorkspaceKey;
      alert("Vault cleared.");
    }
  }

  function switchEngine(type) {
    if(engines[type]) {
      loadingEl.style.display = 'flex';
      loadingEl.style.opacity = '1';
      targetFrame.src = engines[type];
      toggleMenu();
    }
  }
  
  initWorkspace();

  if (targetFrame) {
    targetFrame.onload = () => {
      if(loadingEl) {
        loadingEl.style.opacity = '0';
        setTimeout(() => loadingEl.style.display = 'none', 400);
      }
    };
  }

  function closeRibbon() {
    ribbonEl.classList.add('closed');
    localStorage.ribbonClosed = 'true'; 
    updateMenuPosition(); 
  }

  function closeFooter() {
    footerEl.classList.add('closed');
    localStorage.footerClosed = 'true'; 
  }

  let isMenuOpen = false;
  function toggleMenu() {
    isMenuOpen = !isMenuOpen;
    document.getElementById('menuContent').classList.toggle('open', isMenuOpen);
  }

  function updateMenuPosition() {
    menuContainer.style.top = (ribbonEl && !ribbonEl.classList.contains('closed')) ? '65px' : '16px';
  }
</script>
</body>
</html>
